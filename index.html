44 \ub9cc\ub4e4\uc5b4\uc8fc\ub294 \nFVA \uc9c0\uae08 \ub2f9\uc7a5 \ub4f1\ub85d!\n\n\ub2e4\uc591\ud55c \uc9c1\uad70\uacfc \ub098\uc774, \uad00\uc2ec\uc0ac\ub97c \uac00\uc9c4 \uc0ac\ub78c\ub4e4\uc774 \ubaa8\uc774\ub294\ub370 \ubaa9\uc801\uc740 \uac19\uc544\uc694. \ub0b4 \uba38\ub9bf\uc18d\uc5d0\ub9cc \uc788\ub358\uac78 \ud55c\ubc88 \ub9cc\ub4e4\uc5b4 \ubcf4\uace0 \uc2f6\ub2e4, \uc601\uc0c1 \uc9c1\uad70\uc5d0\uc11c \uc77c\ud558\uace0\uc2f6\ub2e4.\n\n\ud568\uaed8 \uc601\uc0c1 \ub9cc\ub4e4 \uc2a4\ud15d \uad6c\ud558\uae30, \uacbd\uac01\uc2ec \uc5bb\uae30, \uc5f4\uc815\uc5d0 \ubd88\ubd99\uc774\uae30\uc5d0\ub3c4 \ucd5c\uace0\ub85c \uc88b\uc2b5\ub2c8\ub2e4. \nFVA \uc5b4\uc11c \ube68\ub9ac \ub4f1\ub85d!", "reviewer": "zoxl***", "date": "2025.09.22"}, {"product": "FVA \ud53c\ubc14\uc544\uce74\ub370\ubbf8", "type": "\uc77c\ubc18", "rating": 5, "photo": "https://phinf.pstatic.net/checkout.phinf/20250922_270/1758518191272mhzQQ_JPEG/IMG_4952.jpeg", "content": "\uc800\ub294 \ub9c9\uc5f0\ud558\uac8c \uc601\uc0c1\uc744 \ubc30\uc6b0\uace0 \uc2f6\ub2e4\ub294 \ub9c8\uc74c\uc73c\ub85c \ud53c\ubc14 \uc218\uc5c5\uc744 \uc218\uac15\ud558\uac8c \ub418\uc5c8\uc2b5\ub2c8\ub2e4\n\n\uc218\uc5c5\uc5d0\uc11c\ub294 \uae30\uc220\uc801\uc778 \ubd80\ubd84\ubcf4\ub2e4 \uc65c \uc774\ub7f0 \ubc29\uc2dd\uc73c\ub85c \uc601\uc0c1\uc744 \uae30\ud68d\ud574\uc57c \ud558\ub294\uc9c0\uc5d0 \ub300\ud55c \uc124\uba85\uc744 \ud568\uaed8 \ud574\uc8fc\uc154\uc11c \uc800\uac19\uc740 \ucd08\ubcf4\uc790\uac00 \uc774\ud574\ud558\uae30 \uc26c\uc6e0\uc2b5\ub2c8\ub2e4 \ud2b9\ud788 \uc608\uc2dc \uc790\ub8cc\ub098 \ud604\uc7a5 \uc0ac\ub840\ub97c \ub4e4\uc5b4\uc8fc\uc154\uc11c \uc2e4\uc81c \uc791\uc5c5\uc5d0 \ubc14\ub85c \uc801\uc6a9\ud560 \uc218 \uc788\ub2e4\ub294 \uc810\uc774 \uc88b\uc558\uc2b5\ub2c8\ub2e4\n\n\ub610 \ucee4\ubba4\ub2c8\ud2f0 \ud30c\ud2f0\uac00 \uc788\uc5b4 \uc800\ubcf4\ub2e4 \ub2e4\uc591\ud55c \uacbd\ud5d8\uc744 \ud558\uc2e0 \uc218\uac15\uc0dd\ubd84\ub4e4\ub85c\ubd80\ud130 \ub9ce\uc774 \ubc30\uc6b0\uac8c \ub41c \uac83 \uac19\uc2b5\ub2c8\ub2e4 \n\n\uc601\uc0c1 \uacf5\ubd80\ub97c \ucc98\uc74c \uc2dc\uc791\ud558\uc2dc\ub294 \ubd84\ub4e4\uc774\ub098 \ubc29\ud5a5\uc744 \uc5b4\ub5bb\uac8c \uc7a1\uc544\uc57c \ud560\uc9c0 \uace0\ubbfc\uc774\uc2e0 \ubd84\ub4e4\uaed8 \ucd94\ucc9c\ub4dc\ub9bd\ub2c8\ub2e4!!", "reviewer": "kc****", "date": "2025.09.22"}, {"product": "FVA \ud53c\ubc14\uc544\uce74\ub370\ubbf8", "type": "\ud55c\ub2ec\uc0ac\uc6a9", "rating": 5, "photo": "", "content": "&ldquo;\uc601\uc0c1\uc744 \ubc30\uc6b0\ub7ec \uc654\ub2e4\uac00, \uc369\uc5b4\ube60\uc9c4 \uc815\uc2e0\uc0c1\ud0dc\ubd80\ud130 \uac1c\uc870\ub2f9\ud588\uc2b5\ub2c8\ub2e4.&rdquo;\n\uc800\ub294 12\uae30 \uc218\uc694\uc77c \uc800\ub141\ubc18\uc744 \ub4e3\uace0 \uc788\ub294 \ud559\uc0dd\uc785\ub2c8\ub2e4.\n\ucc98\uc74c\uc5d4 \ub204\uad6c\ubcf4\ub2e4 \ube68\ub9ac, \ub204\uad6c\ubcf4\ub2e4 \uc55e\uc11c \ub098\uac00\uace0 \uc2f6\ub2e4\ub294 \ub9c8\uc74c\uc73c\ub85c \ud559\uc6d0\uc5d0 \ub4f1\ub85d\ud588\uc9c0\ub9cc, \uc774\uacf3\uc5d0\uc11c \uae68\ub2ec\uc740 \uac74 \uc815\ubc18\ub300\uc600\uc2b5\ub2c8\ub2e4.\n\uc131\uacf5\uc5d0\ub294 \uc655\ub3c4\ub3c4, \uc9c0\ub984\uae38\ub3c4 \uc5c6\uc5c8\uc2b5\ub2c8\ub2e4. \uc624\uc9c1 \uafb8\uc900\ud568\uacfc \uc0ac\ud65c\uc744 \uac74 \ub178\ub825\uc774\uc57c\ub9d0\ub85c \uc720\uc77c\ud55c \uc9c0\ub984\uae38\uc774\ub77c\ub294 \uac78 \ubab8\uc73c\ub85c \ub290\ub07c\uace0 \uc788\uc2b5\ub2c8\ub2e4.\n\n\uc218\uc5c5\uc740 \ub4e3\uace0 \uccab \ubc88\uc9f8\ub85c \ubb34\ub108\uc9c4 \uac74 \ub808\ud37c\ub7f0\uc2a4\uc5d0 \ub300\ud55c \uace0\uc815\uad00\ub150\uc774\uc5c8\uc2b5\ub2c8\ub2e4.\n\uadf8\ub3d9\uc548 &lsquo;\uc21c\uc218 \ucc3d\uc791\ub9cc\uc774 \uc88b\uc740 \uc791\ud488\uc774\ub2e4&rsquo;\ub77c\uace0 \ubbff\uc5b4\uc654\ub294\ub370, \uc2e4\uc81c\ub85c\ub294 \uc5bc\ub9c8\ub098 \uc88b\uc740 \ub808\ud37c\ub7f0\uc2a4\ub97c \ubcf4\uace0, \uc5f0\uad6c\ud558\uace0, \uc790\uae30 \uac83\uc73c\ub85c \uc18c\ud654\ud574\ub0b4\ub290\ub0d0\uac00 \uc791\ud488\uc758 \uae4a\uc774\ub97c \ub9cc\ub4e0\ub2e4\ub294 \uac78 \ubc30\uc6e0\uc2b5\ub2c8\ub2e4. \uc774 \uae68\ub2ec\uc74c \ud558\ub098\ub9cc\uc73c\ub85c\ub3c4 \uc81c \ucc3d\uc791 \ud0dc\ub3c4\uac00 \uc644\uc804\ud788 \ubc14\ub00c\uc5c8\uc2b5\ub2c8\ub2e4. \ub610\ud55c \uc601\ud654\ub97c \ub9ce\uc774 \ubcf4\uae30 \uc2eb\uc5b4\uc11c \ubba4\uc9c1\ube44\ub514\uc624\ub97c \ud574\uc57c\uaca0\ub2e4\ub294 \uc800\uc758 \uc624\ub9cc\ud568\uae4c\uc9c0\ub3c4.. \ud53c\ubc14\uc5d0\uc11c \uc815\uc2e0\uac1c\uc870\ub97c \ud574\uc8fc\uc5c8\uc2b5\ub2c8\ub2e4. \uae30\ud68d\uc744 \ud560\ub54c\ub9c8\ub2e4 \ub808\ud37c\ub7f0\uc2a4\uac00 \ub5a0\uc624\ub974\uc9c0 \uc54a\uc544, \ud3c9\uc18c\uc5d0 \ub9ce\uc774 \ubd10\ub458\uac78 \ud558\uace0 \ud6c4\ud68c\uc911\uc5d0 \uc788\uc2b5\ub2c8\ub2e4...\u3160 \uc601\ud654\uac00 \ub418\uc5c8\ub4e0 \ubba4\ube44\uac00 \ub418\uc5c8\ub4e0 \uc601\uc0c1\uc744 \ub9ce\uc774 \ubcf8 \uc0ac\ub78c\uc740 \uc808\ub300 \uc774\uae38\uc218 \uc5c6\uad6c\ub098 \ub77c\ub294\uac83\uc744 \ub9e4\uc6b0 \ubf08\uc800\ub9ac\uac8c \ub290\ub07c\uace0 \uc788\uc2b5\ub2c8\ub2e4. ...\n\n\ub450 \ubc88\uc9f8\ub294, \uadf8\ub3d9\uc548 \uc8fc\ubaa9\ud558\uc9c0 \uc54a\uc558\ub358 \ud504\ub85c\ub4c0\uc11c\ub77c\ub294 \uc9c1\ucc45\uc758 \uc9c4\uc9dc \ub9e4\ub825\uc744 \uc54c\uac8c \ub418\uc5c8\ub2e4\ub294 \uc810\uc785\ub2c8\ub2e4.\n\uc774\ubc88 \ucee4\ubba4\ub2c8\ud2f0 \ud30c\ud2f0\uc5d0\uc11c \ucd08\uccad \uc5f0\uc0ac\ub85c ambience\uc758 EP\ub85c \uacc4\uc2e0 Downy Jung\uc5f0\uc0ac\ub2d8 \uac15\uc758\ub97c \ub4e4\uc744\uc218 \uc788\uc5c8\uc2b5\ub2c8\ub2e4. \uc5f0\uc0ac\ub2d8\uc758 \uac15\uc758\ub97c \ub4e4\uc744\uc218\ub85d \uac10\ub3c5\uc758 \ube44\uc804\uc774 \ud604\uc2e4\uc774 \ub418\uae30 \uc704\ud574\uc11c\ub294 \ubc18\ub4dc\uc2dc \ud504\ub85c\ub4c0\uc11c\ub77c\ub294 \uc874\uc7ac\uac00 \ud544\uc694\ud558\ub2e4\ub294 \uac78 \ub290\ub084\uc218 \ubc16\uc5d0\uc5c6\uc5c8\uc2b5\ub2c8\ub2e4. \uc6b0\ub9ac\ub098\ub77c\uc5d0\uc11c\ub294 \uc544\uc9c1 \ud504\ub85c\ub4c0\uc11c\uc758 \uc5ed\ud560\uc774 \ucda9\ubd84\ud788 \uc778\uc815\ubc1b\uc9c0 \ubabb\ud55c\ub2e4\ub294 \ud604\uc2e4\uc744 \uccb4\uac10\ud558\uace0, \uc774\ub97c \ubc14\uafb8\uae30 \uc704\ud574 \ud504\ub85c\ub4c0\uc11c\ub97c \uc911\uc2ec\uc73c\ub85c \ud55c \ud504\ub85c\ub355\uc158\uc744 \uc9c1\uc811 \uc138\uc6b0\uc168\ub2e4\ub294 \uc774\uc57c\uae30\ub97c \ub4e3\uace0, \uc790\uc2e0\uc758 \uc9c1\uc5c5\uc5d0 \ub300\ud55c \uc790\ubd80\uc2ec\uacfc \ud655\uc2e0\uc744 \uac00\uc9c4 \ubaa8\uc2b5\uc774 \uc815\ub9d0 \uc778\uc0c1\uc801\uc774\uc5c8\uc2b5\ub2c8\ub2e4. (\uc5b4\ub290 \ubd84\uc57c\uc5d0 \uc788\ub4e0 \uc774 \ubd80\ubd84\uc740 \uc815\ub9d0 \ub2ee\uace0 \uc2f6\ub2e4\uace0 \ub290\uaf08\uc2b5\ub2c8\ub2e4.)\n\uac10\ub3c5\uc774 \uadf8\ub9bc\uc744 \uadf8\ub9b0\ub2e4\uba74, \ud504\ub85c\ub4c0\uc11c\ub294 \uadf8 \uadf8\ub9bc\uc744 \ud604\uc2e4\uc758 \ubb34\ub300 \uc704\uc5d0 \uc62c\ub824\uc8fc\ub294 \uc0ac\ub78c.\n\uadf8 \uc21c\uac04, \uac10\ub3c5\uc5d0\uac8c \ud504\ub85c\ub4c0\uc11c\ub294 \uace7 \uc228\ud1b5\uc774\ub77c\ub294 \ub9d0\uc774 \uc9c4\uc2ec\uc73c\ub85c \uc640 \ub2ff\uc558\uc2b5\ub2c8\ub2e4.\n\n\uc138 \ubc88\uc9f8\ub294 \ud604\uc5c5\uc758 \uc0dd\uc0dd\ud55c \ud604\uc2e4\uc774\uc5c8\uc2b5\ub2c8\ub2e4.\n\ucee4\ubba4\ub2c8\ud2f0 \ud30c\ud2f0\ub97c \ud1b5\ud574 \uc778\ub9e5\uc744 \uc313\ub294 \uacbd\ud5d8\ub3c4 \ubb3c\ub860 \uc88b\uc9c0\ub9cc \ud604\uc5c5\uc758 \uacc4\uc2e0 \uc5f0\uc0ac\ub2d8\uc758 \uc0dd\uc0dd\ud55c \uacbd\ud5d8\uc744 \ub4e4\uc744\uc218 \uc788\ub294\uac83\uc774 \uc800\uc5d0\uac8c\ub294 \uac12\uc9c4 \uacbd\ud5d8\uc774\uc5c8\uc2b5\ub2c8\ub2e4. \ub610\ud55c \uc5ec\uae30\uc5d0 \uc815\uc8fc \uac10\ub3c5\ub2c8\uaed8\uc11c \uae30\ud68d\uc548 \uc791\uc131\ubd80\ud130 \ucd2c\uc601, \ud604\uc7a5 \uad00\ub9ac, \ud3b8\uc9d1\uae4c\uc9c0 \uac10\ub3c5\ub2d8\uc758 \ubc00\ucc29 \ud53c\ub4dc\ubc31\uc744 \ud1b5\ud574 \ub2e8\uc21c\ud55c \uc601\uc0c1 \uc774\ub860\uc774 \uc544\ub2c8\ub77c, \uc5c5\uacc4\uac00 \uc2e4\uc81c\ub85c \uc5b4\ub5bb\uac8c \uc6c0\uc9c1\uc774\ub294\uc9c0\ub97c \ud604\uc7a5\uc5d0\uc11c \ubc30\uc6b0\ub294 \ub4ef\ud55c \uacbd\ud5d8\uc744 \uc81c\uacf5\ud574\uc8fc\uc2dc\uace0 \uacc4\uc2ed\ub2c8\ub2e4.\n\ucc45\uc73c\ub85c\ub294 \uc808\ub300 \ubc30\uc6b8 \uc218 \uc5c6\ub294 \uac83\ub4e4, \ud604\uc7a5\uc5d0\uc11c \uc218\ub144\uac04 \ubd80\ub52a\uccd0\uc57c \uc54c \uc218 \uc788\ub294 \uac10\uac01\uc744 \ubbf8\ub9ac \uccb4\ud5d8\ud560 \uc218 \uc788\ub2e4\ub294 \uac8c \uac00\uc7a5 \ud070 \uc790\uc0b0\uc774\ub77c\uace0 \uc0dd\uac01\ud569\ub2c8\ub2e4.\n\uacb0\uad6d \uc81c\uac00 \uc774\uacf3\uc5d0\uc11c \uc5bb\uc740 \uac74 \ub2e8\uc21c\ud788 \uc601\uc0c1 \uae30\uc220\uc774 \uc544\ub2c8\uc5c8\uc2b5\ub2c8\ub2e4.\n\ub05d\uae4c\uc9c0 \ubc84\ud2f0\ub294 \ud798, \ud611\uc5c5\uc758 \uac10\uac01, \uadf8\ub9ac\uace0 \ud754\ub4e4\ub9ac\uc9c0 \uc54a\ub294 \uba58\ud0c8.\n\ub204\uad6c\ubcf4\ub2e4 \uc55e\uc11c\uac00\uae30 \uc704\ud574 \ub4f1\ub85d\ud588\ub358 \ud559\uc6d0\uc774\uc5c8\uc9c0\ub9cc, \uc9c0\uae08\uc740 \uc624\ud788\ub824 \ud568\uaed8 \ub098\uc544\uac00 \uc0b4\uc544\ub0a8\ub294 \uae38\uc744 \ubc30\uc6b0\uace0 \uc788\uc2b5\ub2c8\ub2e4.\nFVA\ub294 \ub2e8\uc21c\ud55c \uc601\uc0c1 \ud559\uc6d0\uc774 \uc544\ub2c8\ub77c, \ud604\uc5c5\uc5d0\uc11c \uc0b4\uc544\ub0a8\ub294 \ubc95\uc744 \uac00\ub974\uccd0\uc8fc\ub294 \uc9c4\uc9dc \ud559\uad50\uc600\uc2b5\ub2c8\ub2e4.\n\uc55e\uc73c\ub85c \ub0a8\uc740 \uacfc\uc815\uc5d0\uc11c \ub354 \ub2e8\ub2e8\ud574\uc9c0\uace0, \ub354 \uae4a\uc5b4\uc9c8 \uc81c \uc790\uc2e0\uc774 \uae30\ub300\ub429\ub2c8\ub2e4. \ud83d\udd25", "reviewer": "mung********", "date": "2025.09.22"}, {"product": "FVA \ud53c\ubc14\uc544\uce74\ub370\ubbf8", "type": "\ud55c\ub2ec\uc0ac\uc6a9", "rating": 5, "photo": "https://phinf.pstatic.net/checkout.phinf/20250921_73/1758465384243jYl0C_JPEG/IMG_2678.jpeg", "content": "\uc544 \uc218\uc5c5 \uc951\uc785\ub2c8\ub2e4! 8\uc6d4\ubd80\ud130 FVA \uc218\uc5c5\ub4e3\uace0 \uc788\ub294 12\uae30 \uc624\ud6c4\ubc18 \uc218\uac15\uc0dd\uc785\ub2c8\ub2e4. \ubaa8\uc158\uadf8\ub798\ud53d \ub514\uc790\uc774\ub108\ub85c \uc77c\uc744 \ud558\uba74\uc11c \ud56d\uc0c1 \uac08\ a74 \uc544\ucc14 \ud569\ub2c8\ub2e4..", "reviewer": "john*********", "date": "2025.08.11"}, {"product": "FVA \ud53c\ubc14\uc544\uce74\ub370\ubbf8", "type": "\ud55c\ub2ec\uc0ac\uc6a9", "rating": 5, "photo": "https://phinf.pstatic.net/checkout.phinf/20250810_135/1754837944091bT160_JPEG/1754837863441.jpg", "content": "\ub9c9\uc5f0\ud558\uac8c \uc9c4\ub85c\ub97c \uc815\ud574 \ub193\uace0\ub3c4 \uc5b4\ub5bb\uac8c \uc900\ube44\ud574\uc57c \ud560\uc9c0 \ubab0\ub77c \ud5e4\ub9e4\ub358 \uc2dc\uae30\uc5d0, \uc6b0\uc5f0\ud788 \uc778\uc2a4\ud0c0\uadf8\ub7a8\uc744 \ud1b5\ud574 \ud53c\ubc14 \uc544\uce74\ub370\ubbf8\ub97c \uc54c\uac8c \ub418\uc5c8\uc2b5\ub2c8\ub2e4.\n\uc544\uce74\ub370\ubbf8\ub97c \ub2e4\ub2c8\uae30 \uc804, \uc20f\ud3fc \uc601\ud654\uc81c\uc5d0 \ucd9c\ud488\ud55c \uacbd\ud5d8\uc740 \uc788\uc5c8\uc9c0\ub9cc, \ud55c \ub2ec\uac04\uc758 \uc218\uc5c5\uc744 \ud1b5\ud574 \uc800\uc758 \ubd80\uc871\ud55c \uc810\uacfc \uc55e\uc73c\ub85c \uc5b4\ub5a4 \uacbd\ud5d8\uc744 \uc313\uc544\uc57c \ud560\uc9c0 \ub354 \uad6c\uccb4\uc801\uc73c\ub85c \uc0dd\uac01\ud560 \uc218 \uc788\uc5c8\uc2b5\ub2c8\ub2e4.\n\n\uc601\uc0c1 \ubd84\uc57c\uc5d0\uc11c\ub294 \uc778\ub9e5\uc774 \uc911\uc694\ud558\ub2e4\uace0 \ud558\uc9c0\ub9cc, \ube44\uc804\uacf5\uc790\uc778 \uc800\uc5d0\uac8c\ub294 \uac00\uc7a5 \uc5b4\ub824\uc6b4 \ubd80\ubd84\uc774\uc5c8\uc2b5\ub2c8\ub2e4. \uadf8\ub7f0\ub370 \uac10\ub3c5\ub2d8\uaed8\uc11c \uc9c1\uc811 \uc778\ub9e5\uc744 \ub9cc\ub4e4 \uc218 \uc788\ub294 \uc790\ub9ac\uae4c\uc9c0 \ub9c8\ub828\ud574 \uc8fc\uc154\uc11c, \uc55e\uc73c\ub85c \uc88b\uc740 \ubd84\ub4e4\uacfc \ud568\uaed8 \ud504\ub85c\uc81d\ud2b8\ub97c \uc9c4\ud589\ud558\uace0 \ud3ec\ud2b8\ud3f4\ub9ac\uc624\ub97c \uc313\uc544\uac08 \uc218 \uc788\ub2e4\ub294 \uc790\uc2e0\uac10\uc774 \uc0dd\uacbc\uc2b5\ub2c8\ub2e4.\n\n\ud2b9\ud788, \ub2e4\ub978 \uacf3\uc5d0\uc11c\ub294 \uacbd\ud5d8\ud558\uae30 \ud798\ub4e0 &lsquo;\uc2e4\uc81c \ud604\uc7a5\uacfc \ubc14\ub85c \uc5f0\uacb0\ub418\ub294 \uc218\uc5c5&rsquo;\uacfc, \uac10\ub3c5\ ic.net/checkout.phinf/20250810_61/1754836686856iSKhF_JPEG/1000038984.jpg", "content": "&quot;\uae30\ud68d\uc740 \ubaa8\ub4e0 \ucd2c\uc601\uc758 \uc2dc\uc791\uc810&quot;\n\n[\uc601\uc0c1\ud3b8\uc9d1 \ud234 \uc815\ub3c4\ub9cc \uc54c\ub358 \uc81c\uac00 1\ub2ec\ub9cc\uc5d0 \uc5f0\ucd9c\uac10\ub3c5\uc774 \ub418\uc5b4 \ub0b4\uc77c \uccab \ucd2c\uc601\uc5d0 \ub4e4\uc5b4\uac11\ub2c8\ub2e4...!]\n\n\ud559\uc6d0\uc5d0 \uac00\uae30 \uc804\uc5d0 \uc544\ubb34\uac83\ub3c4 \ubaa8\ub978\ucc44\ub85c \uc640\uc11c &quot;\ubc84\ubc85\ub300\uba74 \uc5b4\uca4c\uc9c0?&quot; \ud558\uba70 \uc2a4\uc2a4\ub85c\ub97c \uc758\uc2ec\ud558\uace4 \ud588\ub294\ub370 \uc218\uc5c5\uc744 \ub4e3\uace0 \uad81\uae08\uc99d\uc774 \uc644\uc804\ud788 \ud574\uc18c\ub418\uc5c8\uc2b5\ub2c8\ub2e4. \n\uc800\ub97c \ud3ec\ud568\ud574 \uc0c1\ub2f9\uc218\uc758 \uc601\uc0c1 \ube44\uc804\uacf5\uc790\ub4e4\ub3c4 \uc774\ud574\ud558\uac8c\uc27d\uac8c\ub054 \ub9e4\ubc88 \uc774\ud574\ud558\uae30 \uc26c\uc6b4 \ub808\ud37c\ub7f0\uc2a4\ub97c \ud1b5\ud574 \uc9c8\ubb38\uc744 \ub358\uc838\uc8fc\uc2dc\uace0 \ub9db\uc788\uac8c \ubc1b\uc544\uba39\uae30\ub9cc\ud558\uba74 \uc5b4\ub290\uc0cc\uac00 \uba38\ub9ac\uc18d\uc5d0\uc11c \ud640\ub85c \ub418\uc0c8\uae40\uc9c8 \ud558\uac8c \ub429\ub2c8\ub2e4. \uadf8\ub7ec\ud55c \uacfc\uc815\uc18d\uc5d0\uc11c \uac19\uc740 \uae38\uc744 \uac77\ub294 \uc0ac\ub78c\ub4e4\uacfc \uc18c\ud1b5\ud558\uac8c \ub418\uace0, \ub610 \uc778\uc5f0\uc774 \ub418\uc5b4 \uac19\uc774 \ucd2c\uc601\uc7a5\uc5d0\ub3c4 \ub098\uac00\uba70 \uc11c\ub85c \uad50\ub958\ud560 \uc218 \uc788\ub294 \ud658\uacbd\uc774 \uad6c\ucd95\uc774 \ub418\uae30 \ub54c\ubb38\uc5d0 \ub108\ubb34\ub098\ub3c4 \ub73b \uae4a\uc740 \uc2dc\uac04\uc744 \uac16\uc744 \uc218 \uc788\uc2b5\ub2c8\ub2e4. \uc218\uc5c5 \uc678\uc801\uc73c\ub85c\ub3c4 \ubcf8\uc778\uc77c\ucc98\ub7fc \ubc24\ub0ae \uac00\ub9ac\uc9c0 \uc54a\uace0 \ud53c\ub4dc\ubc31 \ud574\uc8fc\uc2dc\uace0 \ud574\uacb0\ucc45\uc744 \uc81c\uc2dc\ud574\uc8fc\uc2dc\ub294 \uac10\ub3c5\ub2d8\uaed8 \ubb34\ud55c\ud55 ba85\uad00\ub828 \ub0b4\uc6a9\ub4e4\uc744 \uc9c1\uc811 \ubcf4\uc5ec\uc8fc\uba74\uc11c \ubcf4\ub2e4 \uc27d\uac8c \uacbd\ud5d8\ud574\ubcfc \uc218 \uc788\uc2b5\ub2c8\ub2e4! \uc6cc\ud06c\uc0f5\uc740 \uc815\ub9d0 \ub193\uce58\uba74 \ud6c4\ud68c\ud560 \ubed4 \ud588\uc2b5\ub2c8\ub2e4! \uc5ec\ub7ec \uce74\uba54\ub77c\uc640 \uc870\uba85\ub4e4\uc744 \ube44\uad50\ud558\uba74\uc11c \uc5b4\ub5a4 \ucc28\uc774\uac00 \uc788\ub294\uc9c0, \uc5b4\ub5a4\ub290\ub08c\uc744 \ub0b4\ub294\uc9c0 \uc9c1\uc811 \ubcf4\uace0 \ub290\ub084 \uc218 \uc788\ub294 \uc6cc\ud06c\uc0f5\uc774\uc5c8\uc2b5\ub2c8\ub2e4!\n\n\uc9c4\uc9dc \uc815\ub9d0 \uc601\uc0c1\uc744 \ubc30\uc6b0\uace0\uc2f6\uc73c\uc2e0 \ubd84\ub4e4, \uc790\uc2e0\uc774 \uc5c6\uc5b4\uc11c \uc2dc\uc791\uc744 \ubabb\ud558\uc2e0\ubd84\ub4e4, \ud560 \uac8c \ub9ce\uc544 \ubb50\ubd80\ud130 \ud574\uc57c \ud560\uc9c0 \ubaa8\ub974\uc2dc\uaca0\ub294\ubd84\ub4e4 \ubaa8\ub450\uc5d0\uac8c \ucd94\ucc9c\ud569\ub2c8\ub2e4!\n\n\uc800\ub294 \uc0c1\uae09\uc790\uae4c\uc9c0 \uc218\uac15\ud558\ub824\uace0 \ud569\ub2c8\ub2e4!", "reviewer": "juyo****", "date": "2025.08.10"}, {"product": "FVA \ud53c\ubc14\uc544\uce74\ub370\ubbf8", "type": "\uc77c\ubc18", "rating": 5, "photo": "https://phinf.pstatic.net/checkout.phinf/20250709_194/1751998621281YDusd_JPEG/KakaoTalk_20250709_031341832.jpg", "content": "\uc5f0\ucd9c\uc744 \ub9c9\uc5f0\ud558\uac8c \uafc8\uafb8\ub358 \uc2dc\uc810\uc5d0\uc11c \ud604\uc2e4\ub85c \uc774\ub8e8\uc5b4\uc9c0\uac8c \ub9cc\ub4e4\uc5b4\uc8fc\ub294 \uacf3\uc785\ub2c8\ub2e4.\n\ucd08\ubcf4\uc790\uc778 \uc800\ub3c4 \uac10\ub3c5\ub2d8\uc758 \ub3c4\uc6c0\uc744 \ubc1b\uc544 \ubc1c\uc804\ud574\ub098\uac08 \uc218 \uc788\uc5c8\uace0, \uc544\uce74\ub370\ubbf8\ub97c \ub2e4\ub2c8\uba74\uc11c \ub2e4\ub978 \uc218\uac15\uc0dd\ub4e4\uacfc \uad50\ub958\ud558\uace0 \ud568\uaed8 \ud611\uc5c5\ud558\ub294 \uae30\ud68c\ub97c \uc5bb\uc744 \uc218 \uc788\uc5b4 \uc88b\uc558\uc5b4\uc694.\n\ucee4\ub9ac\ud058\ub7fc\ub3c4 \uc21c\ucc28\uc801\uc73c\ub85c \uc9c4\ud589\ub418\uace0, \u c \uc218 \uc788\ub294 \uc218\uc5c5 \ud83d\udc4d\ud83d\udc4d\ud83d\udc4d \uc88b\uc740 \ud300\uc6d0 \ubd84\ub4e4 \ub9cc\ub098\uc11c \uacb0\uad6d \ucd2c\uc601\uae4c\uc9c0 \uc798 \ub9c8\ubb34\ub9ac\ud588\uc2b5\ub2c8\ub2e4! \uc774\uc81c \uc5bc\ub978 \ud3b8\uc9d1\uc758 \uae38\ub85c.. \n\n\uae30\ud68d \ub2e8\uacc4\ubd80\ud130 \ud604\uc7a5 \uccb4\ud06c\uae4c\uc9c0 \ub9ce\uc740 \uac00\ub974\uce68 \uc8fc\uc2e0 \uc815\uc8fc \uac10\ub3c5\ub2d8 \ub108\ubb34 \uac10\uc0ac\ud588\uc2b5\ub2c8\ub2e4!!!! \ud83d\udd25\ud83d\udd25\ud83d\udd25", "reviewer": "abys*******", "date": "2025.05.29"}, {"product": "FVA \ud53c\ubc14\uc544\uce74\ub370\ubbf8", "type": "\ud55c\ub2ec\uc0ac\uc6a9", "rating": 5, "photo": "", "content": "\uc601\uc0c1\uc774 \ub9cc\ub4e4\uc5b4\uc9c0\ub294 \uacfc\uc815\uc744 \ud558\ub098\ubd80\ud130 \uc5f4\uae4c\uc9c0 \uc138\uc138\ud558\uac8c \uc54c\ub824\uc8fc\uc154\uc11c \ub3c4\uc6c0\uc774 \ub9ce\uc774 \ub3fc\uc694. \ucc45\uc774\ub098 \uc778\ud130\ub137\uc5d0\uc11c \uc811\ud558\uc9c0 \ubabb\ud55c \ud301\ub3c4 \ub9ce\uc774 \uc54c\ub824\uc8fc\uc2dc\uace0 \ud559\uc0dd\ub4e4\uc5d0\uac8c \uac01\uac01 \ud544\uc694\ud55c \ub808\ud37c\ub7f0\uc2a4\uc640 \uc870\uc5b8\uc744 \uc544\ub08c\uc5c6\uc774 \uc8fc\uc154\uc11c \ub108\ubb34 \uc88b\uc2b5\ub2c8\ub2e4!", "reviewer": "hjb0***", "date": "2025.05.22"}, {"product": "FVA \ud53c\ubc14\uc544\uce74\ub370\ubbf8", "type": "\ud55c\ub2ec\uc0ac\uc6a9", "rating": 5, "photo": "", "content": "\ub2e8\uc21c\ud788 \uc601\uc0c1\uc744 \uc81c\uc791\ud558\ub294 \ubc95\uc744 \ubc30\uc6b0\ub294 \uacf3\uc774 \uc544\ub2d9\ub2c8\ub2e4. &ldquo;\ud004\ub9ac\ud2f0 \uc788\ub294&ldquo; \ud558\ub098\uc758 \uc791\ud488\uc744 \uc644\uc131\ud574\uac00\ub294 \uacfc\uc815 \uadf8 \uc790\uccb4\uc785\ub2c8\ub2e4. \n\n\uc800\ub294 \uc601\uc0c1\uc5d0\uc11c \uae30\uc220\ubcf4\ub2e4 \uba54\uc2dc\uc9c0\uc640 \uc608\uc220\uc131\uc774 \ub354 \uc911\uc694\ud558\ub2e4\uace0 \uc0dd\uac01\ud558\ub294\ub370, \uc774 \ub450 \uac00\uc9c0\ub97c \uc815\ud655\ud788 \uc9da\uc5b4\uc8fc\ub294 \ub355\ubd84\uc5d0 \ub9e4 \uc218\uc5c5\uc774 \uc815\ub9d0 \uc54c\ucc3c\uc5b4\uc694. \ub610\ud55c \ubb34\uc5c7\uc744 \uc5b4\ub5bb\uac8c \ubcf4\uc5ec\uc904 \uac83\uc778\uac00\uc5d0 \ub300\ud574 \ub2e4\uc74c\uacfc \uac19\uc774 \uba85\ud655\ud55c \uc9c0\ud5a5\uc810\uc774 \uc788\uc5b4\uc11c \uc88b\uc558\uc2b5\ub2c8\ub2e4. \n&lsquo;\ubb34\uc5c7\uc744&rsquo; : \uc88b\uc740 \uc601\uc0c1\uc774\ub780 \ubb34\uc5c7\uc778\uc9c0, \uc5b4\ub5a4 \uba54\uc2dc\uc9c0\ub97c \ub2f4\uc744 \uc218 \uc788\ub294\uc9c0\ub97c \ubcf4\ub294 \ub208\uc744 \ud0a4\uc6b8 \uc218 \uc788\uc5c8\uc2b5\ub2c8\ub2e4.\n &lsquo;\uc5b4\ub5bb\uac8c&rsquo; : \uc2e4\ubb34\uc5d0 \ubc14\ub85c \uc801\uc6a9 \uac00\ub2a5\ud55c \ud604\uc2e4\uc801\uc778 \uc81c\uc791 \ubc29\ubc95\uc744 \ubc30\uc6b0\uba70, \uc2e4\uc81c \uc791\uc5c5\uc5d0 \ub300\ud55c \uac10\uac01\ub3c4 \uc775\ud790 \uc218 \uc788\uc5c8\uc2b5\ub2c8\ub2e4. \n\n\ud604\uc7ac \uc790\uc2e0\uc758 \uc218\uc900\uc774 \uc5b4\ub5a4\uc9c0\uc5d0 \ub530\ub77c \ud544\uc694\ud55c \ubd80\ubd84\uc744 \uc720\uc5f0\ud558\uac8c \ubc30\uc6b8 \uc218 \uc788\ub2e4\ub294 \uc810\ub3c4 \uc7a5\uc810\uc785\ub2c8\ub2e4. \uc544\uc774\ub514\uc5b4\uac00 \ub9c9\ud788\ub294 \ubd84\ub4e4\uc740 &lsquo;\uc5b4\ub5bb\uac8c \ub5a0\uc62c\ub9b4\uc9c0&rsquo;\ub97c, \uc544\uc774\ub514\uc5b4\uac00 \ub118\uce58\ub294 \ubd84\ub4e4\uc740 &lsquo;\uc5b4\ub5bb\uac8c \ub2e4\ub4ec\uc744\uc9c0&rsquo;\ub97c \ubc30\uc6b8 \uc218 \uc788\uc2b5\ub2c8\ub2e4.\n\n\ubb34\uc5c7\ubcf4\ub2e4 \uc601\uc0c1\uc740 \ud63c\uc790 \ub9cc\ub4e4 \uc218 \uc5c6\uc796\uc544\uc694. \uc2e4\uc81c\ub85c \ub2e4\uc591\ud55c \ubc30\uacbd\uc758 \uc218\uac15\uc0dd\ubd84\ub4e4\uacfc \ud568\uaed8\ud558\ub294 \ud658\uacbd \ub355\ubd84\uc5d0 \uc601\uc0c1 \uc81c\uc791\uc5d0 \uc788\uc5b4 \ucee4\ubba4\ub2c8\ucf00\uc774\uc158 \ubc29\ubc95\uc744 \ubc30\uc6b8 \uc218 \uc788\uace0 \uc774\ub807\uac8c \uc601\uc0c1\uc5d0 \uc9c4\uc2ec\uc778 \uc0ac\ub78c\ub4e4\uc774 \ud55c\uc790\ub9ac\uc5d0 \ubaa8\uc778 \ud658\uacbd \uc790\uccb4\uac00, \uc790\uadf9\uc774\uc790 \uae30\ud68c\uc785\ub2c8\ub2e4. \ube44\uc804\uacf5\uc790\ub098 \ucd08\ubcf4\uc790\ub77c\uba74 \ub354\ub354\uc6b1!\n\n\ubb34\uc5b8\uac00\ub97c &ldquo;\uc774\ub807\uac8c \ud574\uc57c \ud55c\ub2e4&rdquo;\ub294 \uc2dd\uc73c\ub85c \uc815\ub2f5\uc744 \uc8fc\uae30\ubcf4\ub2e4, &lsquo;\uc640, \uc774\uac70 \uc9c4\uc9dc \uac1c\uca50\ub2e4!&rsquo; \ud558\uace0 \uc2a4\uc2a4\ub85c \uc88b\ub2e4\uace0 \uc0dd\uac01\ud558\ub294, \uc790\uc2e0\uc758 \ucde8\ud5a5\uacfc \uc5f4\uc815\uc744 \ub530\ub77c\uac00\ub3c4\ub85d \uc774\ub04c\uc5b4\uc8fc\ub294 \uc218\uc5c5\uc778 \uc810\uc774 \uac00\uc7a5 \uc88b\uc740 \uac83 \uac19\uc2b5\ub2c8\ub2e4. \n\n\ub9e4 \uc8fc \uc790\uc2e0\uc758 \uae30\ud68d\uc744 \uac1c\ubcc4 \ud53c\ub4dc\ubc31 \ubc1b\uc744 \uc218 \uc788\uae30 \ub54c\ubb38\uc5d0 \uc900\ube44\ud55c \ub9cc\ud07c \ub098\ud63c\uc790\ub9cc \ub808\ubca8\uc5c5\ud558\ub294 \uae30\ubd84\uc785\ub2c8\ub2e4. \ubc18\ub300\ub85c \ub9e4 \uc8fc \uc798\ud574\uc57c\ud55c\ub2e4\ub294 \uc555\ubc15 \ub610\ud55c \uc5c6\uc2b5\ub2c8\ub2e4. \uc900\ube44\ud55c\uac8c \uc5c6\ub2e4 \ud558\ub354\ub77c\ub3c4 \uc218\uc5c5 \ubd84\uc704\uae30\uac00 \ud3b8\uc548\ud558\uace0 \uc7ac\ubc0c\uc5b4\uc11c \ub9e4\ubc88 \uc624\ub294\uac8c \uc990\uac70\uc6cc\uc694\u314e\u314e \n\n\ud074\ub77c\uc774\uc5b8\ud2b8\uac00 \uc6d0\ud558\ub294 \uc601\uc0c1\uc774 \uc544\ub2cc, \ub0b4\uac00 \uc9c4\uc9dc \ud574\ubcf4\uace0 \uc2f6\uc5c8\ub358 \uc601\uc0c1\uc774 \uc788\ub2e4\uba74 \ud6c4\ud68c\ud558\uae30 \uc804\uc5d0 \ub3c4\uc804\ud574\ubcf4\uc138\uc694. \uc5d0\uc787! \ud558\uace0 \uc9c8\ub7ec\ubc84\ub9b0 \uc81c \uc790\uc2e0\uc5d0\uac8c \ub108\ubb34 \uace0\ub9d9\ub124\uc694\u314b\u314b\u314b", "reviewer": "sele****", "date": "2025.05.21"}, {"product": "FVA \ud53c\ubc14\uc544\uce74\ub370\ubbf8", "type": "\ud55c\ub2ec\uc0ac\uc6a9", "rating": 5, "photo": "", "content": "\uc0c1\uc0c1 \uc774\uc0c1\uc73c\ub85c \uc2e4\ubb34\uc5d0 \ub300\ud574 \uc790\uc138\ud558\uac8c \uc54c\ub824\uc8fc\uc2dc\uace0 \uacbd\ud5d8\ud560 \uc218 \uc788\ub294 \uac15\uc758\uc600 488\uc5d0 \ud604\uc7a5 \uacbd\ud5d8\uc744 \ud560 \uc218\ub3c4 \uc788\ub294 \uae30\ud68c\ub2c8 \ub193\uce58\uc9c0\ub9d0\uace0 \uc2e0\uccad\ud558\uc138\uc694! \uadf8\ub9ac\uace0 \ub298 \ud544\uc694\ud55c \ud53c\ub4dc\ubc31 \ud574\uc8fc\uc2dc\ub294 \uc815\uc8fc \uac10\ub3c5\ub2d8 \uac10\uc0ac\ud569\ub2c8\ub2e4\u314e\u314e", "reviewer": "bomn****", "date": "2025.05.17"}, {"product": "FVA \ud53c\ubc14\uc544\uce74\ub370\ubbf8", "type": "\ud55c\ub2ec\uc0ac\uc6a9", "rating": 5, "photo": "", "content": "3\uac1c\uc6d4 \uc218\uac15 \uc2e0\uccad \ud6c4, \uc774\uc81c 1\uac1c\uc6d4\uc774 \uc9c0\ub0ac\uc2b5\ub2c8\ub2e4.\n\uc601\uc0c1, \ub514\uc790\uc778 \ubaa8\ub450 \ube44\uc804\uacf5\uc790\uc778 \uc800\ub3c4 \uc774\ud574\ud558\uae30 \uc27d\uac8c,\n\uadf8\ub9ac\uace0 \uc7ac\ubc0c\uac8c \uc601\uc0c1 \uae30\ud68d, \uc81c\uc791, \uc5f0\ucd9c\uc744 \uc124\uba85\ud574 \uc8fc\uc2ed\ub2c8\ub2e4.\n\n\uba38\ub9bf\uc18d \uc0c1\uc0c1\uc744 \ud604\uc2e4\uc758 \uc601\uc0c1\uc73c\ub85c \ub9cc\ub4e4\uc5b4 \ub098\uac00\ub294 \uacfc\uc815\uc774 \ub108\ubb34 \uc990\uac81\uc2b5\ub2c8\ub2e4. \uc815\uc8fc \uac10\ub3c5\ub2d8 \ud2b9\uc720\uc758 \uc194\uc9c1\ud558\uace0, \uc7ac\uce58 \uc788\ub294 \ub9d0\uc500 \ub355\uc5d0 \uc804\ud600 \uc9c0\ub8e8\ud558\uc9c0 \uc54a\uac8c \uac15\uc758\ub97c \ub4e3\ub294 \uac83 \uac19\uc544\uc694.\n\n\uc544\uc9c1 2\uac1c\uc6d4\uc758 \uc2dc\uac04\uc774 \ub0a8\uc558\ub294\ub370, \uac19\uc774 \uc218\uac15\ud558\ub294 \ub3d9\uae30\ub4e4\uacfc \ud568\uaed8\n\ub354 \uc88b\uc740 \uc2dc\uac04, \uba4b\uc9c4 \uc601\uc0c1 \ub0a8\uae30\uace0 \uc2f6\ub124\uc694! \uc644\uc804 \uac15\ucd94\ud574 \ub4dc\ub9bd\ub2c8\ub2e4!!", "reviewer": "hh****", "date": "2025.05.17"}, {"product": "FVA \ud53c\ubc14\uc544\uce74\ub370\ubbf8", "type": "\uc77c\ubc18", "rating": 5, "photo": "https://phinf.pstatic.net/checkout.phinf/20250516_128/1747390670847EobTM_JPEG/IMG_3756.jpeg", "content": "\ud53c\ubc14 \uc544\uce74\ub370\ubbf8 9\uae30 \uc218\uac15\uc0dd\uc785\ub2c8\ub2e4. \uc544\uce74\ub370\ubbf8\uc5d0\ c30\uc6e0\uc2b5\ub2c8\ub2e4. \uac10\ub3c5\ub2d8\uaed8\uc11c \uc6cc\ub099 \ubbf8\uc801\uc778 \ubd80\ubd84\uc5d0\uc11c \ubbfc\uac10\ud558\uc2dc\uace0, \uadf8\ub7f0\uac78 \ucd94\uad6c\ud558\uc2dc\uae30 \ub54c\ubb38\uc5d0 \ub514\uc790\uc778 \uc804\uacf5\uc744 \ud55c \uc800\uc5d0\uac8c\ub294 \ub354 \ub9ce\uc740 \ub3c4\uc6c0\uc774 \ub418\uc5c8\uc2b5\ub2c8\ub2e4! (\ubbf8\uc801\uc778 \ubd80\ubd84\uc5d0 \ud2b9\ud788\ub098 \uc57d\ud558\uc2e0 \ubd84\ub4e4\ub3c4 \uadf8\ub7f0 \ubd80\ubd84\uc744 \uae30\ub97c \uc218 \uc788\ub294 \uae30\ud68c\uac00 \ub420 \uac83 \uac19\uc2b5\ub2c8\ub2e4)\n\ud2b9\ud788 \uc5ec\ub7ec\uc0ac\ub78c\ub4e4\uc758 \uae30\ud68d\uc744 \uac19\uc774 \ubcf4\uba74\uc11c \uac10\ub3c5\ub2d8\uaed8\uc11c \ud53c\ub4dc\ubc31 \ud574\uc8fc\uc2dc\ub294 \ubd80\ubd84\ub4e4\uc774 \uac00\uc7a5 \ub3c4\uc6c0\uc774 \ub9ce\uc774 \ub41c \uac83 \uac19\uc544\uc694. \uc65c \uc774 \ubd80\ubd84\uc774 \ub9e4\ub825\uc801\uc73c\ub85c \ub2e4\uac00\uc624\uc9c0\uc54a\ub294\uc9c0, \uc65c \uc544\uc26c\uc6b4 \ub290\ub08c\uc774 \ub4dc\ub294\uc9c0\uc5d0 \ub300\ud574\uc11c \uba85\ucf8c\ud558\uac8c \uc54c\ub824\uc8fc\uc154\uc11c \uac10\ub3c5\ub2d8\uc758 \ud53c\ub4dc\ubc31\uacfc \uc218\uc5c5\uc744 \uc798 \uc219\uc9c0\ud558\uba74 \uc601\uc0c1\uc744 \ubcf4\ub294 \ub208\uc744 \uae30\ub97c \uc218 \uc788\ub2e4\uace0 \uc0dd\uac01\ud569\ub2c8\ub2e4!\n\uac1c\uc778\uc801\uc73c\ub85c \uc544\uc26c\uc6b4 \uc810\uc740, \uc81c\uac00 \ucd08-\uc911\ubc18\uae4c\uc9c0 \uc218\uc5c5 \ud65c\ub3d9\uc744 \uc801\uadf9\uc801\uc73c\ub85c \ud558\uc9c0 \ubabb\ud588\ub294\ub370, \uc911\uac04\uc911\uac04 \ub2e4\ub978 \uc0ac\ub78c\ub4e4\uacfc\uc758 \ub124\ud2b8\uc6cc\ud0b9\uc774\ub098 \ud300\uc73c\ub85c \uce68\uc5ec\ud558\ub294 \uac83\uc744 \ub354 \ud65c\ubc1c\ud558\uac8c \ud588\ub2e4\uba74 \uc88b\uc558\uc744 \uac83 \uac19\uc2b5\ub2c8\ub2e4. \ud2b9\ud788 \uc800\ucc98\ub7fc \uc601\uc0c1\ubd84\uc57c\ub97c \ucc98\uc74c \uc2dc\uc791\ud558\ub294 \uc0ac\ub78c\ub4e4\uc740 \ub354\ub354\uc6b1 \uc790\uae30\uac00 \uc5b4\ub5bb\uac8c \ud574\uc57c\ud560\uc9c0 \ubaa8\ub97c\ub54c \ub2e4\ub978 \uc0ac\ub78c\ub4e4\uc758 \uac83\uc744 \ubcf4\uace0, \ubc30\uc6b0\uace0, \uc2dc\ub3c4\ud574\ubcf4\ub294\uac8c \uc911\uc694\ud55c \uac83 \uac19\uc544\uc694.\n\n\uc544\uce74\ub370\ubbf8\ub97c \ub4f1\ub85d\ud558\uae30 \uc804\uc5d0 \uc800\ub3c4 \ub9ce\uc740 \uace0\ubbfc\uc774 \uc788\uc5c8\uace0 \uc5b4\ub5bb\uac8c \ud574\uc57c\ud560\uc9c0 \ub9c9\ub9c9\ud55c \ub9c8\uc74c\uc774 \uc788\uc5c8\ub294\ub370, \uc6b0\uc120 \uc601\uc0c1\uc744 \uc81c\uc791\ud558\uae30 \uc704\ud574\uc11c\ub294 \ud63c\uc790\uac00 \uc544\ub2cc \uc5ec\ub7ec \uc0ac\ub78c\uc774 \ud544\uc694\ud558\uae30 \ub54c\ubb38\uc5d0 \uc800\ucc98\ub7fc \ud568\uaed8 \uc791\uc5c5\ud560 \ud300\uc6d0\uc774 \ud544\uc694\ud558\uac70\ub098 \uc601\uc0c1 \uc81c\uc791\uc774\ub098 \uae30\ud68d\uc758 \uacfc\uc815\uc5d0 \ub300\ud574 \ubc30\uc6b0\ub294\uac8c \ud544\uc694\ud55c \ubd84\ub4e4\uc740 \ud55c\ubc88 \uacbd\ud5d8\ud574\ubcf4\uc2dc\ub294 \uac83\uc744 \ucd94\ucc9c\ud569\ub2c8\ub2e4 !", "reviewer": "hyoj****", "date": "2025.04.24"}, {"product": "FVA \ud53c\ubc14\uc544\uce74\ub370\ubbf8", "type": "\uc77c\ubc18", "rating": 5, "photo": "https://phinf.pstatic.net/checkout.phinf/20250424_235/1745449383083OvqGi_JPEG/IMG_6080.jpeg", "content": "\uc5f0\ucd9c\uc744 \uc2dc\uc791\ud560 \ub54c \ubb34\uc5c7\uc744 \uc120\uc73c\ub85c \uc7a1\uace0 \ub098\uc544\uac00\uc57c\ud558\ub294\uc9c0\uae4a\uc774 \uc0ac\uace0\ud558\uace0 \uc6c0\uc9c1\uc77c \uc218 \uc788\ub294 \uc218\uc5c5\uc785\ub2c8\ub2e4! 3\uac1c\uc6d4 \uc218\uc5c5 \uacfc\uc815\uc740 \uc54c\uc544\uac00\ub294 \uac83 \ub9cc\ud07c, \uc7ac\ubc0c\ub294 \ub9cc\ud07c \uae4a\uc5b4\uc9c0\uace0, \uc790\uc2e0\uc758 \uc695\ub9dd\ub3c4 \uc54c\uac8c \ub418\ub294 \uac83 \uac19\uc544\uc694 ! \uadf8\ub798\uc11c \uc5c4\uccad\ub09c \uce74\uc624\uc2a4\ub97c \uc9e7\uc740 \uc2dc\uac04\ub3d9\uc548 \ub290\ub07c\uae30\ub3c4 \ud588\uc5b4\uc694. \ub2e8\uc21c\ud788 \uc601\uc0c1\uc744 \ub9cc\ub4dc\ub294 \uac8c \uc544\ub2c8\ub77c \uc5b4\ub5bb\uac8c \uc138\uc0c1\uc744 7c \ud558\ub294 \ub9cc\ud07c \uc2e4\ub825\uc774 \ub290\ub294 \uac70 \uac19\uc544\uc694. \uacfc\uc81c\uc5d0 \ub300\ud55c \ud53c\ub4dc\ubc31\ub3c4 \uaf3c\uaf3c\ud558\uac8c \uc8fc\uc154\uc11c \uc2e4\uc9c8\uc801\uc778 \uc791\uc5c5 \uacfc\uc815\uc744 \ube60\ub974\uac8c \uc2b5\ub4dd \uac00\ub2a5\ud558\ub2e4\ub294 \uc810\uc774 \uc88b\uc558\uc2b5\ub2c8\ub2e4. (+\uc601\uc0c1 \ucd08\ubcf4\uc5ec\ub3c4 \ud604\uc7a5\uacbd\ud5d8\uc744 \ud560 \uc218 \uc788\ub2e4\ub294 \uac83\ub3c4 \ub108\ubb34 \uc88b\uc740 \uac70 \uac19\uc544\uc694.)", "reviewer": "abys*******", "date": "2025.03.06"}, {"product": "FVA \ud53c\ubc14\uc544\uce74\ub370\ubbf8", "type": "\ud55c\ub2ec\uc0ac\uc6a9", "rating": 5, "photo": "", "content": "\ub2e4\uc2dc \uc601\uc0c1\uc744 \ud558\uace0\uc2f6\ub2e4\uace0 \uc0dd\uac01\ub9cc \ud558\ub2e4\uac00 \uc54c\uac8c\ub418\uc5b4 \uc218\uac15\ud558\uac8c \ub418\uc5c8\ub294\ub370 \uc81c\uac00 \uc54c\uace0\uc788\ub358 \ubc29\uc2dd\uc744 \ub354 \uc27d\uac8c \uc811\uadfc\ud560 \uc218 \uc788\ub294 \ubc29\ubc95\uc744 \uc54c\ub824\uc8fc\uc2dc\uba74\uc11c \ud558\uace0\uc2f6\uc740\uac83\uc774 \ubb34\uc5c7\uc778\uc9c0\ub97c \ub04c\uc5b4\ub0b4\uc8fc\uc2dc\ub294 \ud53c\ub4dc\ubc31\uc73c\ub85c \uc804\ubcf4\ub2e4 \ub354 \uc7ac\ubbf8\ub97c \ubd99\uc774\uace0 \uc788\uc2b5\ub2c8\ub2e4\u25dc\u25e1\u25dd", "reviewer": "1215*****", "date": "2025.03.05"}, {"product": "FVA \ud53c\ubc14\uc544\uce74\ub370\ubbf8", "type": "\ud55c\ub2ec\uc0ac\uc6a9", "rating": 5, "photo": "", "content": "\ud544\uc694\ud55c \ubd80\ubd84\uc744 \uc9d1\uc5b4\uc8fc\uc2dc\ub294 \ubd80\ubd84\uc774 \uc88b\uc2b5\ub2c8\ub2e4.\n\ud53c\ub4dc\ubc31\ub3c4 \uba85\ud655\ud574\uc11c \ub3c4\uc6c0\uc774 \ub9ce\uc774 \ub429\ub2c8\ub2e4!", "reviewer": "asdf****", "date": "2025.03.05"}, {"product": "\uc601\uc0c1 \uc5f0\ucd9c \ud559\uc6d0 FVA \ud53c\ubc14\uc544\uce74\ub370\ubbf8", "type": "\ud55c\ub2ec\uc0ac\uc6a9", "rating": 5, "photo": "", "content": "\uac15\uc758\ub97c \ub4e4\uc73c\uba70 \uc815\ub9d0 \ud6c4\ud68c \uc5c6\ub294 \uc120\ud0dd\uc774\uc5c8\ub2e4\uace0 \ub290\uaf08\uc2b5\ub2c8\ub2e4\n\n\uc774\uacf3\uc740 \ub2e8\uc21c\ud788 \uce74\uba54\ub77c \uc0ac\uc6a9\ubc95\ub9cc \uac00\ub974\uce58\ub294 \uacf3\uc774 \uc544\ub2d9\ub2c8\ub2e4.\n\uc601\uc0c1\uc5d0 \ub2f4\uae38 \uba54\uc2dc\uc9c0\ub97c \uae30\ud68d\ud558\uace0, \ubcf4\ub2e4 \uc138\ub828\ub418\uace0 \uc644\uc131\ub3c4 \ub192\uc740 \uacb0\uacfc\ubb3c\uc744 \ub9cc\ub4dc\ub294 \ubc95\uc744 \ubc30\uc6b8 \uc218 \uc788\uc5c8\uc2b5\ub2c8\ub2e4.\n\n\ube44\uc804\uacf5\uc790\uc778 \uc800\ub294 \ucc98\uc74c \uc601\uc0c1\uc744 \uc2dc\uc791\ud588\uc9c0\ub9cc, \ud55c \ub2ec \ub9cc\uc5d0 \ub208\uc5d0 \ub744\ub294 \uc131\uc7a5\uc744 \uccb4\uac10\ud560 \uc218 \uc788\uc5c8\uc2b5\ub2c8\ub2e4.\n\uadf8 \ube44\uacb0\uc740 \ubc14\ub85c \uac10\ub3c5\ub2d8\uc758 1:1 \ucf54\uce6d \ub355\ubd84\uc785\ub2c8\ub2e4.\n\uc138\uc2ec\ud55c \ud53c\ub4dc\ubc31\uacfc \ubc29\ud5a5 \uc124\uc815\uc774 \ud070 \ub3c4\uc6c0\uc774 \ub418\uc5c8\uace0, \ub355\ubd84\uc5d0 \ub354 \uae4a\uc774 \uc788\ub294 \uc791\uc5c5\uc744 \ud560 \uc218 \uc788\uc5c8\uc2b5\ub2c8\ub2e4.\n\n\uc601\uc0c1 \uc81c\uc791\uc744 \uace0\ubbfc\ud558\ub294 \ubd84\ub4e4\uc5d0\uac8c \uc9c4\uc2ec\uc73c\ub85c \ucd94\ucc9c\ud569\ub2c8\ub2e4", "reviewer": "asru***", "date": "2025.02.19"}, {"product": "FVA \ud53c\ubc14\uc544\uce74\ub370\ubbf8", "type": "\uc77c\ubc18", "rating": 5, "photo": "", "content": "\ub514\ud14c\uc77c\ud55c \uac15\uc758 \ud53c\ub4dc\ubc31\uacfc \uc124\uba85 \uac10\uc0ac\ud588\uc2b5\ub2c8\ub2e4!", "reviewer": "inde******", "date": "2025.02.02"}, {"product": "FVA \ud53c\ubc14\uc544\uce74\ub370\ubbf8", "type": "\uc77c\ubc18", "rating": 5, "photo": "", "content": "\uc81c \uac1c\uc778\uc791\ud488\uc5d0 \ub2e4\uc591\ud55c \uc758\uacac\uacfc \ucc38\uace0 \ub808\ud37c\ub7f0\uc2a4\ub97c \uc8fc\uc168\uace0 \uc218\uc5c5\ub4e3\uace0 \ud504\ub85c\uc81d\ud2b8\uc5d0 \ucc38\uc5ec\ud558\uac8c \ub418\uc5c8\uc2b5\ub2c8\ub2e4 \ub2e4\uc591\ud55c \uae30\ud68c\ub97c \uc5bb\uc744 \uc218 \uc788\ub294 \uc218\uc5c5\uc785\ub2c8\ub2e4 !!", "reviewer": "clc1***", "date": "2025.02.01"}, {"product": "\uc601\uc0c1 \uc5f0\ucd9c \ud559\uc6d0 FVA \ud53c\ubc14\uc544\uce74\ub370\ubbf8", "type": "\ud55c\ub2ec\uc0ac\uc6a9", "rating": 5, "photo": "", "content": "\uc601\uc0c1\uc744 \ud558\ub098\ub3c4 \ubaa8\ub974\ub294 \uc0c1\ud0dc\uc5d0\uc11c \ub4e3\uac8c \ub418\uc5c8\ub294\ub370 \uc815\ub9d0 \ube44\uc804\uacf5\uc790\uc5d0\uac8c \uc88b\uc740 \uc218\uc5c5 \uac19\uc2b5\ub2c8\ub2e4. \uc774\ub860\ub9cc \uc9c4\ud589\uc744 \ud558\ub294\uac8c \uc544\ub2c8\ub77c \uc774\ub860\ubc14\ud0d5\uc73c\ub85c \uc9c4\ud589\ud55c \uacfc\uc81c\ub97c \ubcf4\uba74\uc11c \uc9c1\uc811\uc801\uc73c\ub85c \ud53c\ub4dc\ubc31\uc744 \ubc1b\uc73c\ub2c8 \ub9c9\ub9c9\ud588\ub358 \uac83\ub3c4 \uc0ac\ub77c\uc9c0\ub294 \uac83 \uac19\uc2b5\ub2c8\ub2e4 ! \uac10\ub3c5\ub2d8\uaed8\uc11c \uac00\uc9c0\uace0 \uacc4\uc2e0\uac8c \uc815\ub9d0 \ub9ce\uc73c\uc2dc\uace0 \uc0dd\uac01\ubcf4\ub2e4 \uc815\uc774 \ub9ce\uc73c\uc2e0 \uac83 \uac19\uc544\uc694 \ucd5c\ub300\ud55c \ub3c4\uc6c0\uc8fc\uc2dc\ub824\ub294\uac8c \ub290\uaef4\uc84c\uc2b5\ub2c8\ub2e4 \ub2e4\ub978 \ud559\uc6d0\uc5d0\uc11c\ub294 \ub290\ub07c\uae30 \ud798\ub4e4\uc5c8\uc744 \uac83 \uac19\uc2b5\ub2c8\ub2e4 \ud83d\udc4d", "reviewer": "clc1***", "date": "2025.02.01"}, {"product": "\uc601\uc0c1 \uc5f0\ucd9c \ud559\uc6d0 FVA \ud53c\ubc14\uc544\uce74\ub370\ubbf8", "type": "\uc77c\ubc18", "rating": 5, "photo": "", "content": "\ube44\uc804\uacf5\uc790\ubd84\ub4e4, \ucd08\ubcf4\uc790\ubd84\ub4e4\ub3c4 \ucda9\ubd84\ud788 \uc218\uac15\ud560 \uc218 \uc788\ub294 \uc218\uc5c5\uc785\ub2c8\ub2e4! \uc120\uc0dd\ub2d8\uaed8\uc11c \uce5c\uc808\ud558\uace0 \uaf3c\uaf3c\ud788 \uc54c\ub824\uc8fc\uc2dc\uace0 \uc218\uac15\uc0dd\ub4e4 \ud55c \uba85, \ud55c \uba85 \ubd10\uc8fc\uc2dc\ub824\uace0 \ub178\ub825\ud558\uc2ed\ub2c8\ub2e4\u314e\u314e \uc218\uc5c5\ub3c4 \uc815\ub9d0 \uc7ac\ubbf8\uc788\uc5b4\uc694! \uc601\uc0c1\uc758 \uae30\ucd08\uc801\uc778 \ubb38\ubc95\ubd80\ud130 \ubc29\ubc95\uae4c\uc9c0 \uc54c\ub824\uc8fc\uc2dc\uc9c0\ub9cc \ubb34\uc5c7\ubcf4\ub2e4 \ud604\uc7a5\uc5d0 \ub098\uac08 \uc218 \uc788\ub2e4\ub294\uac8c \uac00\uc7a5 \uc88b\uc740 \uac83 \uac19\uc544\uc694 \uc885\uac15\ud558\uace0 \ub9e4 \uc8fc \uc218\uc5c5\ub0a0\ub9cc \uae30\ub2e4\ub9bd\ub2c8\ub2e4~~ \uc601\uc0c1\uc5d0 \uad00\uc2ec\uc788\uc73c\uc2e0 \ubd84\ub4e4\uc774\ub77c\uba74 \uc815\ub9d0 \ucd94\ucc9c\ub4dc\ub824\uc6a7!!", "reviewer": "kimd*******", "date": "2025.02.01"}, {"product": "FVA \ud53c\ubc14\uc544\uce74\ub370\ubbf8", "type": "\uc77c\ubc18", "rating": 5, "photo": "", "content": "\ube44\uc804\uacf5\uc790\ub098 \uad00\ub828\uc9c1\uc885\uc5d0 \uc815\ubcf4\uac00 \uc5c6\uc5b4\ub3c4 \uac10\ub3c5\ub2d8\uaed8\uc11c \uc544\uc8fc \uc790\uc138\ud788 \uc124\uba85\ud574\uc8fc\uc154\uc11c \uc218\uc5c5\uc774 \ud3b8\ud588\uc2b5\ub2c8\ub2e4. \uac19\uc774 \uc218\uac15 \ub4e3\ub294 \uc778\uc6d0\ub4e4 \ubaa8\ub450 \ucc38\uc5ec\ud615 \uc218\uc5c5\uc73c\ub85c \uc791\uc5c5\uacfc\uc815\uc744 \uac19\uc774 \ubcf4\uace0 \uc11c\ub85c \uc601\uac10\uc744 \uacf5\uc720\ud560\uc218 \uc788\uc5b4\uc11c \uc88b\uc558\uc2b5\ub2c8\ub2e4!", "reviewer": "by****", "date": "2025.01.31"}, {"product": "\uc601\uc0c1 \uc5f0\ucd9c \ud559\uc6d0 FVA \ud53c\ubc14\uc544\uce74\ub370\ubbf8", "type": "\ud55c\ub2ec\uc0ac\uc6a9", "rating": 5, "photo": "", "content": "\uc77c\ubc18 \uc544\uce74\ub370\ubbf8\uc640\ub294 \ub2e4\ub978 \uc2e4\ubb34\uc5d0\uc11c \uacbd\ud5d8\ud55c \ub0b4\uc6a9\uc744 \ubc14\ud0d5\uc73c\ub85c \uad50\uc721\uc744 \ubc1b\uace0 \ud53c\ub4dc\ubc31\uc744 \ubc1b\uc544\uc11c \uc88b\uc558\uc2b5\ub2c8\ub2e4.", "reviewer": "inde******", "date": "2025.01.26"}, {"product": "\uc601\uc0c1 \uc5f0\ucd9c \ud559\uc6d0 FVA \ud53c\ubc14\uc544\uce74\ub370\ubbf8", "type": "\uc77c\ubc18", "rating": 5, "photo": "", "content": "\ud559\uc6d0 \uac00\ub294 \ub0a0\uc774 \uae30\ub2e4\ub824\uc9c0\ub294 \uc218\uc5c5\uc778 \uac83 \uac19\uc2b5\ub2c8\ub2e4!\n\uc601\uc0c1\uc5d0 \uad00\uc2ec\uc774 \uc0dd\uaca8\uc11c \uacbd\ud5d8\ud574\ubcf4\uace0\uc790 \ud559\uc6d0\uc744 \ub2e4\ub2c8\uace0 \uc788\uc2b5\ub2c8\ub2e4. \uc601\uc0c1\uc758 \uae30\ubcf8\ubd80\ud130 \ud558\ub098\uc529 \uac00\ub974\uccd0\uc8fc\uc154\uc11c \ub3c4\uc6c0\uc774 \ub9ce\uc774 \ub418\uba70 \uac10\ub3c5\ub2d8\ub9cc\uc758 \ube44\ubc00\uc2a4\ud0ac\ub3c4 \uc54c\ub824\uc8fc\uc2ed\ub2c8\ub2e4. \uc55e\uc73c\ub85c \ub354 \ubc30\uc6cc\uc11c \uc601\uc0c1\uc774\ub791 \uce5c\ud574\uc9c0\uace0 \uc2f6\uc2b5\ub2c8\ub2e4:)", "reviewer": "geof***", "date": "2025.01.25"}, {"product": "\uc601\uc0c1 \uc5f0\ucd9c \ud559\uc6d0 FVA \ud53c\ubc14\uc544\uce74\ub370\ubbf8", "type": "\uc77c\ubc18", "rating": 5, "photo": "", "content": "\uc218\uc5c5\uc774 \uc54c\ucc28\uace0 \uc9dc\ub9bf\ud569\ub2c8\ub2e4! \uc9c8\ubb38\uc5d0 \uce5c\uc808\ud788 \ub2f5\ubcc0\ud574\uc8fc\uc2dc\uad6c\uc694! \ub9c9\uc5f0\ud558\uac8c \ud63c\uc790 \uace0\ubbfc\uc870\ucc28 \ubabb\ud588\ub358, \ub514\ud14c\uc77c\uc5d0 \uad00\ud55c \ubd80\ubd84\uc744 \ub9ce\uc774 \uc54c\ub824\uc8fc\uc154\uc11c \uc815\ub9d0 \uc88b\uc2b5\ub2c8\ub2e4b\u3147_\u3147b", "reviewer": "eio2***", "date": "2025.01.24"}, {"product": "\uc624\ud504\ub77c\uc778 \ud604\uc7a5\uc218\uc5c5 - \ube44\uc8fc\uc5bc \ub514\ub809\ud305 \uc6cc\ud06c\uc0f5", "type": "\uc77c\ubc18", "rating": 5, "photo": "", "content": "\uc815\ub9d0 \uae30\ub300\uac00\ub429\ub2c8\ub2e4^^", "reviewer": "omas******", "date": "2025-09-27"}, {"product": "\uc624\ud504\ub77c\uc778 \ud604\uc7a5\uc218\uc5c5 - \ube44\uc8fc\uc5bc \ub514\ub809\ud305 \uc6cc\ud06c\uc0f5", "type": "\uc77c\ubc18", "rating": 5, "photo": "", "content": "\ud53c\ubc14 \uc544\uce74\ub370\ubbf8 \ucd5d\uc624!!  \uc6b0\uc5f0\ud788 \uc778\uc2a4\ud0c0\uadf8\ub7a8 \uc54c\uace0\ub9ac\uc998\uc5d0 \ud53c\ubc14 \uc544\uce74\ub370\ubbf8\uac00 \ub5b4\uace0 \uc885\ud569\uc608\uc220\uc778 \uc601\uc0c1\uc774 \uad81\uae08\ud574 \uc6a9\uae30 \ub0b4 \ub4f1\ub85d\ud558\uac8c \ub410\uc2b5\ub2c8\ub2e4. (\ucc38\uace0\ub85c \uc800\ub294 \uc601\uc0c1 \ube44\uc804\uacf5\uc790, \uc655\ucd08\ubcf4\uc785\ub2c8\ub2e4!!)\n \uc218\uc5c5\uc740 \uc815\uc8fc \uac10\ub3c5\ub2d8\uaed8\uc11c \uc601\uc0c1\uc5d0 \uad00\ub828\ud574 \uae30\ucd08\ubd80\ud130 \ucc28\uadfc\ucc28\uadfc \uc54c\ub824\uc8fc\uc2dc\uace0, \ub9e4\uc8fc \uc2dc\ub189\uc2dc\uc2a4 \uc791\uc131\uc774\ub098 \ub370\ubaa8 \ube44\ub514\uc624 \uc81c\uc791 \uac19\uc740 \uc219\uc81c\uac00 \uc788\uc5b4 \uc9c1\uc811 \ud574\ubcf4\uace0 \ub610 \ud53c\ub4dc\ubc31\uc744 \ubc1b\uc744 \uc218 \uc788\uc5c8\uc5b4\uc694! \uacfc\uc815\uc774 \uccb4\uacc4\uc801\uc774\ub77c \uc800\ucc98\ub7fc \uc655\ucd08\ubcf4\ub3c4 \ub530\ub77c\uac00\uae30 \uc88b\uc2b5\ub2c8\ub2e4!! &gt;&lt;\n\n \ud55c\ub2ec\uc774 \uc9c0\ub098\uba74 \ub124\ud2b8\uc6cc\ud0b9 \ud30c\ud2f0&amp; \uc2e4\ubb34\uc790 \ud2b9\uac15\uc774 \uc788\ub294\ub370, \uc800\ub294 EMBIENCE\uc758 \uc815\ub2e4\uc6b4 \ud504\ub85c\ub4c0\uc11c\ub2d8(EP) \ud2b9\uac15\uc744 \ub4e4\uc744 \uc218 \uc788\uc5c8\uc5b4\uc694!! \u3137 \u3137\nEP\uc758 \uc5ed\ud560, \uc81c\uc791\ube44 \uad00\ub9ac, \uc778\ub825 \uc12d\uc678, \ub9ac\uc2a4\ud06c \uad00\ub9ac \ub4f1 \ud604\uc2e4\uc801\uc778 \uc774\uc57c\uae30\ub97c \uc790\uc138\ud788 \ub4e4\uc744 \uc218 \uc788\uc5b4 \uc815\ub9d0 \uc720\uc775\ud588\uc2b5\ub2c8\ub2e4!!!! \uadf8\ub9ac\uace0 \ub124\ud2b8\uc6cc\ud0b9 \ud30c\ud2f0\uc5d0\uc11c\ub294 \ub2e4\uc591\ud55c \ubd84\ub4e4\uacfc \uad50\ub958\ud560 \uc218 \uc788\uace0, \uc2e4\uc81c\ub85c \ucd2c\uc601\uae4c\uc9c0 \uc774\uc5b4\uc9c8 \uc218 \uc788\ub294 \ud300\ub3c4 \ub9cc\ub4e4\uc5b4\uc9d1\ub2c8\ub2e4. \uc601\uc0c1\ucabd\uc73c\ub85c \ub098\uac00\uc2e4 \ubd84\ub4e4\uc5d0\uac8c\ub294 \uc88b\uc740 \uae30\ud68c\uc758 \uc7a5\uc774 \ub418\uace0, \uc800 \uac19\uc740 \ube44\uc804\uacf5\uc790 \uc655\ucd08\ubcf4\ub3c4 \ubcf4\uc870\ub85c \ucc38\uc5ec\ud560 \uc218 \uc788\uc5b4\uc694!! \uc655\ucd08\ubcf4\ub85c \uc2dc\uc791\ud588\uc9c0\ub9cc \uc218\uc5c5\uc744 \uc798 \ub530\ub77c\uac00\uc2e0 \ubd84\ub4e4\uc740 \uac10\ub3c5\uc73c\ub85c\uc11c \uc791\ud488 \uc9c4\ud589\ub3c4 \ud558\uc2dc\ub354\ub77c\uad6c\uc694!! \ucc38\uace0!!\n\n\uc815\ub9d0 \ud004\ub9ac\ud2f0 \ub192\uc740 \uc218\uc5c5\uc744 \uc81c\uacf5\ud574\uc8fc\ub294 \ud53c\ubc14 \uc544\uce74\ub370\ubbf8!!! \ub9dd\uc124\uc774\uc9c0 \ub9d0\uace0 \uaf2d \uc218\uac15\ud574\ubcf4\uc2dc\uae38 \ucd94\ucc9c\ub4dc\ub824\uc694!!! \uc804\uacf5\uc790\ub4e0 \ube44\uc804\uacf5\uc790\ub4e0 \ud6c4\ud68c\ud558\uc9c0 \uc54a\uc73c\uc2e4 \uac70\uc608\uc694!! \uc6a9\uae30 \ub0b4\uc11c GoGo!!", "reviewer": "91mu***", "date": "2025-09-22"}, {"product": "\uc624\ud504\ub77c\uc778 \ud604\uc7a5\uc218\uc5c5 - \ube44\uc8fc\uc5bc \ub514\ub809\ud305 \uc6cc\ud06c\uc0f5", "type": "\uc77c\ubc18", "rating": 5, "photo": "", "content": "\uc218\uc5c5 \ub4e3\uace0 \ub05d\uc774 \uc544\ub2c8\ub77c \uc9c4\uc9dc \uc790\uae30 \uc791\ud488 \ub9cc\ub4e4\uc5b4 \ubcfc \uc218 \uc788\ub294 \uc218\uc5c5  \uc88b\uc740 \ud300\uc6d0 \ubd84\ub4e4 \ub9cc\ub098\uc11c \uacb0\uad6d \ucd2c\uc601\uae4c\uc9c0 \uc798 \ub9c8\ubb34\ub9ac\ud588\uc2b5\ub2c8\ub2e4! \uc774\uc81c \uc5bc\ub978 \ud3b8\uc9d1\uc758 \uae38\ub85c.. \n\n\uae30\ud68d \ub2e8\uacc4\ubd80\ud130 \ud604\uc7a5 \uccb4\ud06c\uae4c\uc9c0 \ub9ce\uc740 \uac00\ub974\uce68 \uc8fc\uc2e0 \uc815\uc8fc \uac10\ub3c5\ub2d8 \ub108\ubb34 \uac10\uc0ac\ud588\uc2b5\ub2c8\ub2e4!!!!", "reviewer": "abys*******", "date": "2025-05-29"}, {"product": "\uc624\ud504\ub77c\uc778 \ud604\uc7a5\uc218\uc5c5 - \ube44\uc8fc\uc5bc \ub514\ub809\ud305 \uc6cc\ud06c\uc0f5", "type": "\uc77c\ubc18", "rating": 5, "photo": "", "content": "3\uac1c\uc6d4 \uacb0\uc81c \ud6c4, 1\uac1c\uc6d4 \uc218\uac15 \uc644\ub8cc\ud588\uc2b5\ub2c8\ub2e4! \ub9c9\uc5f0\ud788 \uc88b\uc544\ud588\ub358 \uac83\uc5d0\uc11c \ud504\ub85c\uc758 \uc138\uacc4\ub85c \uac00\ub824\uace0 \ud558\ub2c8 \ub9c9\ub9c9\ud55c \ub9c8\uc74c\uc774 \uac00\ub4dd\ud558\uc9c0\ub9cc...! \uae38\uc7a1\uc774\ucc98\ub7fc \uac1d\uad00\uc801\uc778 \uc2dc\uc120\uc5d0\uc11c \uacc4\uc18d \ucf54\uba58\ud2b8 \ud574\uc8fc\uc154\uc11c, \ub290\ub9ac\ub354\ub77c\ub3c4 \uc870\uae08\uc529 \uc55e\uc73c\ub85c \ub098\uc544\uac00\uace0 \uc788\ub294 \uc911\uc785\ub2c8\ub2e4. \uc544\uc9c1 \ub9ce\uc774 \ud5e4\ub9e4\uace0 \uc788\uc9c0\ub9cc \uac10\ub3c5\ub2d8\uacfc \ud568\uaed8 \uc885\ucc29\uc9c0\uae4c\uc9c0 \ubb34\uc0ac\ud788 \uc644\uc8fc\ud558\uace0 \uc2f6\uc2b5\ub2c8\ub2e4", "reviewer": "chur***", "date": "2025-05-12"}, {"product": "\uc601\uc0c1 \uc5f0\ucd9c \ud559\uc6d0 FVA \ud53c\ubc14\uc544\uce74\ub370\ubbf8", "type": "\ud55c\ub2ec\uc0ac\uc6a9", "rating": 5, "photo": "", "content": "\uc77c\ubc18\uc801\uc778 \ub4e3\uae30\ub9cc \ud558\ub294 \uc218\uc5c5\uc774 \uc544\ub2c8\ub77c \ud55c\uba85\ud55c\uba85 \uaf3c\uaf3c\ud788 \ubd10\uc8fc\uc2dc\uace0 \ud559\uc0dd\uc758 \uc2a4\ud0c0\uc77c\uc5d0 \ub9de\ucdb0\uc11c \ud53c\ub4dc\ubc31 \ud574\uc8fc\uc2dc\ub294 \ubc29\uc2dd\uc774 \ub108\ubb34 \uc88b\uc558\uc2b5\ub2c8\ub2e4 \uc601\uc0c1 \uc9c0\uc2dd \ubfd0\ub9cc \uc544\ub2c8\ub77c \uc790\uc2e0\uc758 \uac1c\uc131\ub3c4 \ucc3e\uc744 \uc218 \uc788\ub294 \uc815\ub9d0 \ub3c4\uc6c0\uc774 \ub9ce\uc774 \ub418\ub294 \uc218\uc5c5\uc785\ub2c8\ub2e4 \uac15\ucd94!!", "reviewer": "dpsk***", "date": "2024.12.02"}, {"product": "\uc601\uc0c1 \uc5f0\ucd9c \ud559\uc6d0 FVA \ud53c\ubc14\uc544\uce74\ub370\ubbf8", "type": "\ud55c\ub2ec\uc0ac\uc6a9", "rating": 5, "photo": "", "content": "\uc8fc\ubcc0\uc5d0 \uc601\uc0c1\uc744 \ud558\ub294 \uc0ac\ub78c\uc774 \uc5c6\ub358 \uc81c\uac8c \ud55c\ub2ec\ub3d9\uc548\uc774\uc9c0\ub9cc \ub9ce\uc740 \ubd80\ubd84\uc774 \ud574\uc18c\ub418\uc5c8\uace0 \uac19\uc740 \uae30\uc218\ubd84\ub4e4\uacfc\ub3c4 \uc18c\ud1b5\ud560\uc218 \uc788\uac8c \ub418\uc5c8\uc73c\uba70 \uc2e4\uc81c \ud604\uc7a5\uc758 \uc5c5\ubb34 \ud504\ub85c\uc138\uc2a4 \ub4f1\uc744 \uac04\uc811\uc801\uc73c\ub85c\ub098\ub9c8 \uccb4\ud5d8\ud560 \uc218 \uc788\uc5b4\uc11c \uc88b\uc558\uc2b5\ub2c8\ub2e4. \ub610 \uc2e4\ubb34\uc801\uc73c\ub85c \ubbf8\ucc98 \ubab0\ub790\ub358 \uac83\ub4e4, \ub0b4 \uacbd\uc7c1\ub825\uc744 \ub354 \uac15\ud654\ud560 \uc218 \uc788\ub294 \ud301 \uac19\uc740 \uac83\ub4e4\uc744 \ub9ce\uc774 \uc5bb\uc5c8\uc2b5\ub2c8\ub2e4. \uc218\uc5c5\uc2dc\uac04\uc77 8\ud560 \uc218 \uc788\uc744\uae4c \uac71\uc815\ub9ce\uace0 (\uc5ec\uc804\ud788 \uadf8\ub807\uc9c0\ub9cc..) \uc120\uc0dd\ub2d8\uaed8\uc11c \uc798 \uac00\ub974\uccd0\uc8fc\uc2dc\uace0 \ud300\uc6d0\ubd84\ub4e4\uc774\ub791 \uacf5\ubaa8\uc804\ub3c4 \ub098\uac08 \uc218 \uc788\ub294 \uae30\ud68c \uc5bb\uc5b4\uc11c \uc88b\uc2b5\ub2c8\ub2e4! \uc88b\uc740 \uacbd\ud5d8\uc73c\ub85c \ud3ec\ud2b8\ud3f4\ub9ac\uc624 \ud558\ub098\uc529 \ucc44\uc6cc\uac08 \uc218 \uc788\uc744 \uac83 \uac19\uc544\uc694!", "reviewer": "alzk********", "date": "2024.10.21"}, {"product": "\uc601\uc0c1 \uc5f0\ucd9c \ud559\uc6d0 FVA \ud53c\ubc14\uc544\uce74\ub370\ubbf8", "type": "\uc77c\ubc18", "rating": 5, "photo": "https://phinf.pstatic.net/checkout.phinf/20241021_13/1729439495771XpmDu_JPEG/IMG_4501.jpeg", "content": "\uc601\uc0c1\uc744 \ucc98\uc74c \uacf5\ubd80\ud558\uba74\uc11c \ub450\ub824\uc6c0\uc774 \uc55e\uc130\ub294\ub370 \uccb4\uacc4\uc801\uc73c\ub85c \uc798 \uc9dc\uc778 \uc218\uc5c5\uacfc \uac10\ub3c5\ub2d8\uc758 \uc9d1\uc911\uc801\uc778 \ud53c\ub4dc\ubc31\uc73c\ub85c \uccab \uac78\uc74c\uc744 \ub0b4\ub51b\uae30\uc5d0 \uc815\ub9d0 \ub3c4\uc6c0\uc774 \ub9ce\uc774 \ub418\uace0 \ucd08\ubcf4\uc790\ub4e4\uc5d0\uac8c \uacbd\ud5d8\ud558\uc9c0 \uc54a\uc73c\uba74 \uc54c\uae30 \ud798\ub4e0 \ud604\uc7a5\uc758 \uc9c0\uc2dd\uacfc \uc5ec\ub7ec \uace0\ucda9\ub4e4\uc744 \uc798 \uc124\uba85\ud574\uc8fc\uc154\uc11c \ub108\ubb34 \uc88b\uc544\uc694 \ubb34\uc5c7\ubcf4\ub2e4 \uc218\uc5c5\uc774 \ub531\ub531\ud558\uc9c0 \uc54a\uace0 \uc815\ub9d0 \uc7ac\ubc0c\uc2b5\ub2c8\ub2e4 \ud559\uc0dd \ud55c\uba85\ud55c\uba85 \uc798 \ucc59\uaca8\uc8fc\uc154\uc11c \ubd99\uc784\uc131\uc774 \uc5c6\uc5b4\uc11c \ub099\uc624\ub418\uba74 \uc5b4\ub5a1\ud558\uc9c0\ub77c\ub294 \uc0dd\uac01\uc740 \uc548\ud558\uc154\ub3c4 \uad1c\ucc2e\uc744\uac70 \uac19\uc544\uc694 \uace0\ubbfc\ub418\uc2e0\ub2e4\uba74 \uace0\ubbfc\ud558\uc9c0 \ub9c8\uc138\uc694 \uc815\ub9d0 \uc88b\uc2b5\ub2c8\ub2e4!", "reviewer": "qkrt*******", "date": "2024.10.21"}, {"product": "\uc601\uc0c1 \uc5f0\ucd9c \ud559\uc6d0 FVA \ud53c\ubc14\uc544\uce74\ub370\ubbf8", "type": "\ud55c\ub2ec\uc0ac\uc6a9", "rating": 5, "photo": "", "content": "\ucee4\ub9ac\ud058\ub7fc\ub3c4 \ud0c4\ud0c4\ud558\uace0 \uc218\uc5c5 \ud6c4 \uac10\ub3c5\ub2d8\uaed8\uc11c \uac1c\uc778\ubcc4\ub85c \ud53c\ub4dc\ubc31\uc744 \ud574\uc8fc\uc154\uc11c \uc5b4\ub5a4 \uc810\uc774 \ubd80\uc871\ud55c\uc9c0 \uc54c \uc218 \uc788\uc5b4 \uc88b\uc2b5\ub2c8\ub2e4 :-) \uadf8\ub9ac\uace0 \uac10\ub3c5\ub2d8 \uc218\uc5c5\uc774 \ub108\ubb34 \uc7ac\ubc0c\uc5b4\uc694!", "reviewer": "tlsd******", "date": "2024.10.20"}, {"product": "\uc601\uc0c1 \uc5f0\ucd9c \ud559\uc6d0 FVA \ud53c\ubc14\uc544\uce74\ub370\ubbf8", "type": "\ud55c\ub2ec\uc0ac\uc6a9", "rating": 5, "photo": "", "content": "\uc218\uc5c5\uc774 \uc815\ub9d0 \uc720\uc775\ud558\uace0 \uc7ac\ubbf8\uc788\uc2b5\ub2c8\ub2e4! \uc74c\uc545\uacfc \ube44\uc8fc\uc5bc\uc774 \uacb0\ud569\ub418\ub294 \uacfc\uc815\uc744 \ubc30\uc6b0\uba74\uc11c \ucc3d\uc758\uc801\uc778 \uc0dd\uac01\uc744 \uc2dc\uac01\uc801\uc73c\ub85c \ud45c\ud604\ud558\ub294 \ubc29\ubc95\uc744 \uc775\ud790 \uc218 \uc788\uc5c8\uc2b5\ub2c8\ub2e4. \ud2b9\ud788, \uc2e4\uc81c \ubba4\uc9c1\ube44\ub514\uc624 \uc81c\uc791 \uacfc\uc815\uc744 \ub2e8\uacc4\ubcc4\ub85c \uacbd\ud5d8\ud560 \uc218 \uc788\uc5b4, \uadf8\ub3d9\uc548 \ubb34\uc2ec\ucf54 \ubcf4\ub358 \ubba4\uc9c1\ube44\ub514\uc624\uac00 \uc5b4\ub5bb\uac8c \ub9cc\ub4e4\uc5b4\uc9c0\ub294\uc9c0 \uae4a\uc774 \uc774\ud574\ud560 \uc218 \uc788\uc5c8\uc2b5\ub2c8\ub2e4. \uc218\uc5c5 \ub0b4\ub0b4 \uc790\uc720\ub85c\uc6b4 \ubd84\uc704\uae30\uc5d0\uc11c \ub2e4\uc591\ud55c \uc544\uc774\ub514\uc5b4\ub97c \uc2dc\ub3c4\ud574 \ubcfc \uc218 \uc788\uc5c8\uace0, \uc120\uc0dd\ub2d8\uc758 \ud53c\ub4dc\ubc31\ub3c4 \ub9e4\uc6b0 \uad6c\uccb4\uc801\uc774\uc5b4\uc11c \ud070 \ub3c4\uc6c0\uc774 \ub418\uc5c8\uc2b5\ub2c8\ub2e4. \ubba4\uc9c1\ube44\ub514\uc624 \uc81c\uc791\uc5d0 \uad00\uc2ec\uc774 \uc788\ub2e4\uba74 \uaf2d \ucd94\ucc9c\ud558\uace0 \uc2f6\uc740 \uc218\uc5c5 </footer>

<script>
(function() {
  var REVIEWS = JSON.parse(document.getElementById('review-data').textContent);
  var cur = 'all';
  var CHARS = ['char1.png','char2.png','char3.png','char4.png'];

  function stars(n) {
    var s = '';
    for (var i = 0; i < 5; i++) s += i < n ? '★' : '<span style="color:#2a2a2a">★</span>';
    return s;
  }

  function clean(s) {
    return (s || '')
      .replace(/&lsquo;/g, '‘').replace(/&rsquo;/g, '’')
      .replace(/&ldquo;/g, '“').replace(/&rdquo;/g, '”')
      .replace(/&hellip;/g, '…').replace(/&amp;/g, '&')
      .replace(/&lt;/g, '<').replace(/&gt;/g, '>')
      .replace(/\n/g, '<br>');
  }

  function getList() {
    if (cur === 'all') return REVIEWS;
    if (cur === 'photo') return REVIEWS.filter(function(r){ return r.photo; });
    return REVIEWS.filter(function(r){ return r.type === cur; });
  }

  function render() {
    var list = getList();
    var html = '';
    for (var i = 0; i < list.length; i++) {
      var r = list[i];
      var delay = Math.min(i * 35, 500);
      var imgHtml = '';
      if (r.photo) {
        imgHtml = '<div class="c-img" onclick="openLb(this.dataset.src)" data-src="' + r.photo + '">'
          + '<img src="' + r.photo + '" alt="" loading="lazy">'
          + '<div class="c-img-over"></div>'
          + '<div class="zoom">⊕</div>'
          + '</div>';
      } else {
        var charSrc = CHARS[i % CHARS.length];
        imgHtml = '<div class="c-img-char">'
          + '<img src="' + charSrc + '" alt="" loading="lazy">'
          + '</div>';
      }
      var cid = 'ct' + i;
      var cardClass = 'card';
      html += '<div class="' + cardClass + '" style="animation-delay:' + delay + 'ms">'
        + imgHtml
        + '<div class="c-body">'
        + '<div class="c-top">'
        + '<div class="stars">' + stars(r.rating) + '</div>'
        + '<div class="tag">' + r.type + '</div>'
        + '</div>'
        + '<div class="rev-row">'
        + '<span class="rev-name">' + r.reviewer + (r.date && (r.date.slice(0,7) === '2026-04' || r.date.slice(0,7) === '2026.04') ? '<span class="new-badge">NEW</span>' : '') + '</span>'
        + '<span class="rev-date">' + r.date + '</span>'
        + '</div>'
        + '<div class="sep"></div>'
        + '<div class="rev-text clamp" id="' + cid + '">' + clean(r.content) + '</div>'
        + '<button class="more-btn" data-id="' + cid + '" style="display:none">More +</button>'
        + '</div>'
        + '<a class="c-product" href="https://smartstore.naver.com/bowiestudios/products/12653524153" target="_blank" rel="noopener">'
        + '<div class="c-product-icon"><img src="fva_product_thumb.jpg" alt=""></div>'
        + '<div class="c-product-info">'
        + '<span class="c-product-name">' + (r.product || 'FVA 피바아카데미') + '</span>'
        + '<span class="c-product-stars">★★★★★</span>'
        + '</div>'
        + '<span class="c-product-arrow">→</span>'
        + '</a>'
        + '</div>';
    }
    document.getElementById('grid').innerHTML = html;

    // 실제로 잘리는 경우에만 More 버튼 노출
    document.querySelectorAll('.rev-text.clamp').forEach(function(el) {
      if (el.scrollHeight > el.clientHeight + 2) {
        var btn = el.nextElementSibling;
        if (btn && btn.classList.contains('more-btn')) btn.style.display = '';
      }
    });

    document.querySelectorAll('.more-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var el = document.getElementById(this.dataset.id);
        if (el.classList.contains('clamp')) {
          el.classList.remove('clamp');
          this.textContent = 'Less −';
        } else {
          el.classList.add('clamp');
          this.textContent = 'More +';
          // 다시 접었을 때도 overflow 없으면 버튼 숨김
          if (el.scrollHeight <= el.clientHeight + 2) this.style.display = 'none';
        }
      });
    });
  }

  window.openLb = function(src) {
    document.getElementById('lbImg').src = src;
    document.getElementById('lb').classList.add('open');
    document.body.style.overflow = 'hidden';
  };
  window.closeLb = function() {
    document.getElementById('lb').classList.remove('open');
    document.body.style.overflow = '';
  };
  document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeLb(); });

  document.querySelectorAll('.fbtn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      document.querySelectorAll('.fbtn').forEach(function(b){ b.classList.remove('on'); });
      this.classList.add('on');
      cur = this.dataset.f;
      render();
    });
  });

  render();
})();
</script>
</body>
</html>
