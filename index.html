<style>
:root {
  --bg: #000000;
  --s1: #000000;
  --s2: #0a0a0a;
  --border: #1a1a1a;
  --accent: #2CFF05;
  --text: #e0e0e0;
  --muted: #555;
  --sub: #888;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:'Pretendard',-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;
  background:var(--bg);color:var(--text);line-height:1.6;
  -webkit-font-smoothing:antialiased;
}

/* HEADER */
header{
  height:56px;padding:0 48px;
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:200;
  background:rgba(10,10,10,0.94);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
}
.logo img{height:22px;display:block;mix-blend-mode:screen}
.hd-right{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted)}

/* HERO */
.hero{
  padding:60px 48px 52px;
  text-align:center;
  position:relative;overflow:hidden;
}
.hero::before{
  content:'';position:absolute;
  top:-60px;left:50%;transform:translateX(-50%);
  width:600px;height:300px;
  background:radial-gradient(ellipse,rgba(44,255,5,0.06) 0%,transparent 70%);
  pointer-events:none;
}
.hero-logo{
  display:block;
  height:clamp(36px,6vw,64px);
  width:auto;
  margin:0 auto 10px;
  mix-blend-mode:screen;
}
.hero h1{
  font-size:clamp(26px,4vw,48px);font-weight:700;
  letter-spacing:-1px;line-height:1.15;
  color:#fff;margin-bottom:14px;
}
.hero h1 em{font-style:normal;color:var(--accent)}
.hero-sub{font-size:13px;color:var(--muted);letter-spacing:0.5px}
.live-dot{
  display:inline-block;width:8px;height:8px;border-radius:50%;
  background:var(--accent);flex-shrink:0;
  animation:pulse 1.8s ease-in-out infinite;
}
@keyframes pulse{
  0%,100%{opacity:1;transform:scale(1)}
  50%{opacity:.3;transform:scale(0.6)}
}

.stats-row{
  display:flex;justify-content:center;align-items:center;gap:clamp(32px,6vw,80px);
  flex-wrap:wrap;margin-top:26px;padding-top:26px;
}
.stat-num{
  font-size:clamp(16px,2.5vw,26px);font-weight:700;
  color:var(--accent);display:flex;align-items:center;letter-spacing:0;line-height:1;
}
.stat-num i{font-style:normal;font-size:0.52em;color:var(--accent);margin-left:6px}
.stat-label{
  font-size:10px;color:var(--muted);letter-spacing:0.5px;
  text-transform:uppercase;margin-top:8px;display:block;
}

/* FILTER */
.filter-bar{
  display:flex;justify-content:center;gap:0;
  overflow-x:auto;scrollbar-width:none;
  background:var(--bg);
  position:sticky;top:56px;z-index:100;
}
.filter-bar::-webkit-scrollbar{display:none}
.fbtn{
  background:none;border:none;
  border-bottom:2px solid transparent;
  color:var(--muted);
  font-size:11px;font-weight:500;letter-spacing:0.5px;text-transform:uppercase;
  padding:16px 22px 14px;
  cursor:pointer;white-space:nowrap;
  transition:color .2s,border-color .2s;
  font-family:inherit;margin-bottom:-1px;
}
.fbtn:hover{color:var(--sub)}
.fbtn.on{color:var(--accent);border-bottom-color:var(--accent)}
.fbtn .n{margin-left:5px;font-size:9px;color:var(--muted)}
.fbtn.on .n{color:var(--accent)}
@media(max-width:480px){
  .fbtn{font-size:10px;letter-spacing:1px;padding:14px 10px 12px;flex:1;text-align:center;}
}

/* GRID */
.wrap{max-width:1360px;margin:0 auto;padding:40px 20px 80px}
.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:0;
}
@media(max-width:720px){.grid{grid-template-columns:1fr}}
@media(min-width:721px) and (max-width:1060px){.grid{grid-template-columns:repeat(2,1fr)}}

/* CARD */
.card{
  background:var(--s1);overflow:hidden;
  transition:background .2s;
  animation:fadeUp .4s ease both;
}
.card:hover{background:var(--s2)}
@keyframes fadeUp{
  from{opacity:0;transform:translateY(8px)}
  to{opacity:1;transform:translateY(0)}
}

.c-img{position:relative;overflow:hidden;cursor:pointer;border-radius:10px;margin:10px 10px 0;}
.c-img img{
  width:100%;aspect-ratio:1;object-fit:cover;display:block;
  filter:brightness(.9);transition:transform .6s ease,filter .3s;
}
.card:hover .c-img img{transform:scale(1.05);filter:brightness(1)}
.c-img-char{position:relative;overflow:hidden;border-radius:10px;margin:10px 10px 0;aspect-ratio:1;cursor:default;}
.c-img-char img{
  width:100%;height:100%;object-fit:cover;display:block;
  filter:brightness(.28);
}
.c-img-over{
  position:absolute;inset:0;
  background:linear-gradient(to top,rgba(0,0,0,.55) 0%,transparent 55%);
  pointer-events:none;
}
.zoom{
  position:absolute;bottom:12px;right:12px;
  width:30px;height:30px;
  background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.15);
  display:flex;align-items:center;justify-content:center;
  font-size:13px;color:rgba(255,255,255,.7);
  opacity:0;transition:opacity .2s;
}
.card:hover .zoom{opacity:1}

.c-body{padding:20px 22px 22px}
.c-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.stars{color:var(--accent);font-size:12px;letter-spacing:1px}
.tag{
  font-size:9px;letter-spacing:2px;text-transform:uppercase;
  color:var(--muted);border:1px solid var(--border);padding:3px 9px;
}
.rev-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.rev-name{font-size:12px;font-weight:600;color:var(--sub);letter-spacing:.3px}
.rev-date{font-size:11px;color:var(--muted)}
.new-badge{
  display:inline-flex;align-items:center;justify-content:center;
  font-size:9px;font-weight:800;letter-spacing:1.5px;
  color:#000;background:var(--accent);
  padding:3px 6px;margin-left:6px;
  vertical-align:middle;line-height:1;
}
.sep{height:1px;background:var(--border);margin-bottom:12px}
.rev-text{font-size:13px;color:#888;line-height:1.85;word-break:keep-all}
.rev-text.clamp{
  display:-webkit-box;-webkit-line-clamp:5;-webkit-box-orient:vertical;overflow:hidden;
}
.more-btn{
  background:none;border:none;
  color:var(--accent);font-size:10px;letter-spacing:1.5px;text-transform:uppercase;
  cursor:pointer;padding:8px 0 0;display:block;font-family:inherit;
  opacity:.7;transition:opacity .2s;
}
.more-btn:hover{opacity:1}

/* LIGHTBOX */
.lb{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.96);z-index:9999;
  flex-direction:column;align-items:center;justify-content:center;padding:20px;
  cursor:pointer;
}
.lb.open{display:flex}
.lb img{max-width:90vw;max-height:80vh;object-fit:contain;cursor:default}
.lb-x{
  margin-top:24px;
  display:flex;align-items:center;gap:7px;
  font-size:11px;letter-spacing:1px;text-transform:uppercase;
  color:rgba(255,255,255,0.5);cursor:pointer;
  transition:color .2s;
}
.lb-x:hover{color:#fff}
.lb-x-icon{
  width:18px;height:18px;border-radius:50%;
  background:rgba(255,255,255,0.15);
  display:flex;align-items:center;justify-content:center;
  font-size:10px;
}

/* FOOTER */
footer{
  border-top:1px solid var(--border);
  padding:36px 48px;
  display:flex;justify-content:space-between;align-items:center;
  flex-wrap:wrap;gap:12px;
}
.ft-logo{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--muted)}
.ft-note{font-size:11px;color:var(--muted)}
@media(max-width:600px){
  header{padding:0 20px}
  .hero{padding:56px 20px 44px}
  footer{padding:28px 20px;flex-direction:column;align-items:flex-start}
}

/* PRODUCT FOOTER */
.c-product {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 22px 14px;
  border-top: 1px solid var(--border);
  text-decoration: none;
  transition: background .2s;
}
.c-product:hover { background: rgba(44,255,5,0.04); }
.c-product-icon {
  width: 32px; height: 32px;
  background: var(--border);
  border-radius: 4px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  overflow: hidden;
}
.c-product-icon img { width: 100%; height: 100%; object-fit: cover; }
.c-product-info { flex: 1; min-width: 0; }
.c-product-name {
  font-size: 10px;
  color: var(--sub);
  letter-spacing: 0.3px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  display: block;
  margin-bottom: 3px;
}
.c-product-stars { color: #ff6b35; font-size: 10px; letter-spacing: 1px; }
.c-product-arrow {
  font-size: 10px;
  color: var(--muted);
  flex-shrink: 0;
}
</style>
</head>

, "content": "\ud53c\ubc14 \ud55c\ub2ec \ud6c4\uae30 : \uc218\uac15 \uc804, \uacfc\uc5f0 \uc81c\uac00 \uc798\ud560 \uc218 \uc788\uc744\uc9c0 \uac71\uc815\uc774 \ub9ce\uc558\uc2b5\ub2c8\ub2e4. \ubd88\uc548\ud55c \ub9c8\uc74c\uc73c\ub85c \ud53c\ubc14\ub97c \uc2dc\uc791\ud588\ub294\ub370, \uc804\ud600 \uadf8\ub7f4 \ud544\uc694 \uc5c6\uc5c8\uc2b5\ub2c8\ub2e4. \ubaa8\ub4e0 \uc77c\uc774 \uadf8\ub807\ub4ef \uc9c0\uae08 \ub2f9\uc7a5 \ubabb\ud558\ub354\ub77c\ub3c4 \uafb8\uc900\ud788 \uacbd\ud5d8\ud558\uace0 \uacf5\ubd80\ud558\uba74 \ubb34\uc5c7\uc774\ub4e0 \uc798\ud558\uac8c \ub420\ud14c\ub2c8\uae4c\uc694! \uac10\ub3c5\ub2d8\uaed8\uc11c\ub3c4 &lsquo;\ud560 \uc218 \uc788\ub2e4&lsquo; \ub77c\ub294 \uba54\uc2dc\uc9c0\ub97c \uc790\uc8fc \uc804\ud558\uc2ed\ub2c8\ub2e4. \ube44\uc804\uacf5\uc790 \ub178\ubca0\uc774\uc2a4\ub3c4 \ub9e4\uc8fc \uc6a9\uae30\ub97c \uc5bb\uc5b4\uac11\ub2c8\ub2e4. \ub610\ud55c \ud604\uc5c5\uc5d0 \uacc4\uc2e0 \uac10\ub3c5\ub2d8\uaed8\uc11c \uc9c1\uc811 \uacbd\ud5d8\ud574\ubcf4\uc9c0 \uc54a\uc73c\uba74 \ubaa8\ub97c \ud604\uc7a5 \uc774\uc57c\uae30\ub3c4 \ub9ce\uc774 \ud574\uc8fc\uc2dc\uae30 \ub54c\ubb38\uc5d0 \ucd08\ubcf4\uc790\ub77c\ub3c4 \ud3b8\ud558\uac8c \ubc30\uc6b0\uace0, \uacbd\ud5d8\ud560 \uc218 \uc788\ub294 \ud658\uacbd\uc774 \uc815\ub9d0 \uc88b\uc740 \uac83 \uac19\uc2b5\ub2c8\ub2e4. \n\n\ud53c\ubc14\ub97c \ub2e4\ub2c8\uba74\uc11c \ub610 \uc88b\uc558\ub358 \uc810\uc740.. \ub2e4\uc591\ud55c \ubd84\uc57c\uc758 \ub2e4\uc591\ud55c \ubd84\ub4e4\uacfc \uc18c\ud1b5\ud560 \uc218 \uc788\ub2e4\ub294 \uc810 \uac19\uc2b5\ub2c8\ub2e4.! \ub2e4\ub978 \uc218\uac15\uc0dd\ubd84\ub4e4\uc744 \ubcf4\uace0 \ubc30\uc6b0\ub294 \uac83\ub3c4 \ub9ce\uc774 \uc788\uace0, \uc18c\uc18c\ud55c \ud301\ub3c4 \ub098\ub220\uc8fc\uc2ed\ub2c8\ub2e4. \ub9e4\uc8fc \uc5f4\uc2ec\ud788 \ud574\uc57c\uaca0\ub2e4\ub294 \uc790\uadf9\uc744 \ub9ce\uc774 \ubc1b\uc2b5\ub2c8\ub2e4. \uc9c0\ub09c \uc8fc\ub9d0\uc5d0 \uc9c4\ud589\ub41c \ucee4\ubba4\ub2c8\ud2f0 \ud30c\ud2f0\uc5d0\uc11c\ub3c4 \uc815\ub9d0 \ub e4c&rdquo;\uc5d0 \ub300\ud55c \uc724\uacfd\uc774 \uc870\uae08\uc529 \uc7a1\ud600\uac00\ub294 \ub290\ub08c\uc774\uc5d0\uc694\n\n\ub9e4\uc8fc \uae30\ud68d\uc548 \ud53c\ub4dc\ubc31\ub3c4 \ubc1b\uc73c\ub2c8 \ud55c\ub2ec \uc804\uc774\ub791\uc740 \ud655\uc2e4\ud788 \ub2ec\ub77c\uc9c4\uac78 \uccb4\uac10\ud569\ub2c8\ub2e4! \u315c\u315c\n\n\ud55c\ub2ec\uc774 \ub05d\ub098\uac00\uace0, \ub2e4\ub978 \ubc18 \uc0ac\ub78c\ub4e4\uc774\ub791 \uc120\ubc30 \uae30\uc218\ubd84\ub4e4\uc774\ub791 \ucee4\ubba4\ub2c8\ud2f0 \ud30c\ud2f0\ub3c4 \uc9c4\ud589\ud588\ub294\ub370 \ub2e4\ub4e4 \uc9c4\uc9dc \uc5f4\uc815\uc801\uc774\uace0 \uc774 \uc77c\uc5d0 \uc9c4\uc2ec\uc778 \uac8c \ub290\uaef4\uc838\uc11c \uc9c4\uc9dc \uc624\ub79c\ub9cc\uc5d0 \ub290\uaef4\ubcf4\ub294 \uc5f4\uae30\uc5d0 \ub354 \uc5f4\uc2ec\ud788 \ud574\uc57c\uaca0\ub2e4 \uc2f6\uc5c8\uc5b4\uc694 ! \uc9c4\uc9dc!!\n\n\uad49\uc7a5\ud788 \uc778\uc0c1 \uae4a\uc5c8\ub358 \ud558\ub8e8\uc600\uc2b5\ub2c8\ub2e4.. \uc911\uac04\uc5d0 \uc218\uc774\ucf54 \uac10\ub3c5\ub2d8\uc758 \ud2b9\uac15\ub3c4 \uc815\ub9d0 \uc88b\uc558\uad6c\uc694\ud83e\udd79\n\n\uc544\ubb34\ud2bc \ud56d\uc0c1 \uc218\uc5c5\uc744 \ub4e4\uc73c\uba70 \uc88b\uc558\ub358\uac8c \uc804\uacf5\uc790 \ube44\uc804\uacf5\uc790 \ub098\ub204\ub294 \ubd84\uc704\uae30\uac00 \uc5c6\uace0 \ub2e4\ub4e4 \ud558\ub098\uc758 \ubaa9\ud45c\ub97c \ud5a5\ud574 \ub2ec\ub824\uac00\ub294 \ub3d9\ub8cc\ub4e4\ucc98\ub7fc \ub290\uaef4\uc84c\ub2e4\ub294\uac70\uc5d0\uc694. \n\n\ud63c\uc790\uc600\uc73c\uba74 \uc880 \ub9c9\ub9c9\ud588\uc744 \uc0ac\ub78c\ub4e4\ud55c\ud14c\ub3c4 \uad49\uc7a5\ud788 \uc88b\uc740 \ud658\uacbd\uc778 \uac83 \uac19\uc2b5\ub2c8\ub2e4!\n\n\uacb0\ub860\uc740\n\uc0dd\uac01\ubcf4\ub2e4 \ub354 \uc7ac\ubc0c\uace0, \ub3c4\uc6c0 \ub9ce\uc774 \ub418\uc5b4\uc11c \uc548\ub4e4\uc5c8\uc74c \uc5b4\uca4c\ub098 \ud558\ub294 \uc0dd\uac01\uc785\ub2c8\ub2e4. \uc55e\uc73c\ub85c \ub0a8\uc740 \ub450\ub2ec\uc774 \uc5b4\ub5bb\uac8c \ud718\ubab0\uc544\uce58\uace0 \uc800\ub97c \uc131\uc7a5\uc2dc\ud0ac\uc9c0 ! \uae30\ub300\ub429\ub2c8\ub2e4!\u2764\ufe0f", "reviewer": "syi0****", "date": "2026.04.07"}, {"product": "[FVA \ud53c\ubc14\uc544\uce74\ub370\ubbf8 \uc601\uc0c1 \uae30\ud68d \ud559\uc6d0] \uc624\ud504\ub77c\uc778 \ud604\uc7a5\uc218\uc5c5 - \uc601\uc0c1 \uae30\ud68d\uacfc \uc5f0\ucd9c \uc774\ub860", "type": "\ud55c\ub2ec\uc0ac\uc6a9", "rating": 5, "photo": "https://phinf.pstatic.net/checkout.phinf/20260407_287/1775490988608KXETM_JPEG/B169D85D-B8B8-478F-9872-E20D598AACB1.jpeg", "content": "\uac10\ub3c5\ub2d8\uc774 \ucc98\uc74c\ubd80\ud130 \ucc28\uadfc\ucc28\uadfc \ud544\uc694\ud55c \uac83\ub4e4\uc744 \ud575\uc2ec\uc801\uc73c\ub85c \uc9c0\ub3c4\ud574\uc8fc\uc2ed\ub2c8\ub2e4! \uc9e7\uc740 \uae30\uac04\uc774\uc9c0\ub9cc \uc5b4\uca4c\uba74 \uc804\uacf5\uc218\uc5c5\ubcf4\ub2e4 \uc2e4\uc9c8\uc801\uc73c\ub85c \ubc30\uc6cc\uac00\ub294 \uac8c \ub9ce\ub2e4\uace0 \ub290\uaf08\uc5b4\uc694. \uac71\uc815\uc774 \ubb34\uc0c9\ud558\uac8c \ud568\uaed8\ud558\ub294 \uc0ac\ub78c\ub4e4\ub3c4 \ub108\ubb34 \uc88b\uad6c\uc694, \uac10\ub3c5\ub2d8\ub3c4 \ub108\ubb34\ub108\ubb34 \uba4b\uc788\uc73c\uc2dc\uace0 \uc815\ub9d0 \ub9ce\uc740 \ub3c4\uc6c0 \uc8fc\uc154\uc694!! \uc81c\uac8c \ud53c\ubc14\ub294 \uc624\ub79c \uafc8\uc744 \uc774\ub8e8\uac8c \ud574\uc900 \uc18c\uc911\ud55c \uae30\ud68c\uc785\ub2c8\ub2f9 \ub2e4\uc2dc \ub3cc\uc544\uac00\ub3c4 \ubb34\uc870\uac74 \uc218\uac15\ud560 \uac83 \uac19\uc544\uc694 \ud83d\ude01\n\ud53c\ubc14 \ucd5c\uace0 \uac10\ub3c5\ub2d8 \uac10\uc0ac\ud569\ub2c8\ub2e4 \u314e \u314e\n\n\ub9ac\ubdf0\uac00 \uc548 \uc368\uc9c4\ub2e4\ub294 3\uac1c\uc6d4\uad8c \uc218\uac15\uc790\ub4e4\uc758 \ud6c4\uae30\ub97c \ud568\uaed8 \uc804\ud569\ub2c8\ub2e4...\n\n\uc5f0\uc8fc: \uac10\ub3c5\ub2d8\uc774 \uae30\ud68d\ubd80\ud130 \ucd2c\uc601\uae4c\uc9c0 \ub2e4 \uc54c\ub824\uc8fc\uc154\uc11c \ud604\uc7a5\uc5d0 \ub108\ubb34 \ub098\uac00\ubcf4\uace0 \uc2f6\uc5c8\ub294\ub370 \uc815\ub9d0 \ub2e4\uc591\ud55c \uacbd\ud5d8\uc744 \ud558\uace0 \uc788\uc5b4\uc11c \uc88b\uc544\uc694\n\uac10\ub3c5\ub2d8 \ucd5c\uace0\uc5d0\uc5ec \ub354 \uc5f4\uc2ec\ud788\ud574\uc11c \uac10\ub3c5\ub2d8\uc774\ub791 \uac19\uc774 \uc77c\ud558\uace0 \uc2f6\uc5b4\uc694 \uc9f1\uc9f1 \ub2e4\uc591\ud55c \ud604\uc5c5\ud558\uc2dc\ub294 \ubd84 , \uc601\uc0c1\uc5d0 \uad00\uc2ec\uc788\ub294 \uc0ac\ub78c\ub4e4\uc744 \ub9cc\ub098\ub294 \uc790\ub9ac\uc5d0\uc11c \ub2e4\uc591\ud55c \uc0ac\ub78c\uacfc \uc791\uc5c5\ud574\ubcfc \uae30\ud68c\ub3c4 \uc788\uace0 \ucd2c\uc601,\uc870\uba85\uc744 \uc9c1\uc811 \ub2e4\ub904\ubcf4\ub294 \uc6cc\ud06c\uc0f5\ub3c4 \uc788\uc5b4\uc11c \uc815\ub9d0 \uc88b\uc740 \uacbd\ud5d8\ub4e4\uc744 \ub9ce\uc774 \uc313\uace0 \uc788\uc2b5\ub2c8\ub2e4\n\n\uc608\uc194 : \uac10\ub3c5\ub2d8\uc774 \uc218\uac15\uc0dd \ud55c \uba85 \ud55c \uba85 \uc560\uc815\uc744 \uac00\uc9c0\uace0 \uc9c0\ub3c4\ud574\uc8fc\uc2ed\ub2c8\ub2e4 \uc601\uc0c1 \uc5c5\uacc4\uc5d0\uc11c \uac00\uc7a5 \uc911\uc694\ud558\ub2e4\uace0 \uaf3d\uc744 \uc218 \uc788\ub294 \uac83 \uc911 \ud558\ub098\ub294 \uc5c5\uacc4 \uc0ac\ub78c\ub4e4\uc744 \ub9cc\ub098\ub294 \uac83\uc778\ub370 \uadf8\ub7f0 \uae30\ud68c\uc758 \uc7a5\ub3c4 \ub9cc\ub4e4\uc5b4\uc8fc\uc138\uc694 \ud604\uc5c5\uc5d0 \uacc4\uc2dc\ub294 \uac10\ub3c5\ub2d8\uc774\ub77c \ub178\ud558\uc6b0\ub294 \ubb3c\ub860 \uace0\ucda9\uacfc \uc5b4\ub824\uc6c0\ub3c4 \ud568\uaed8 \uacf5\uc720\ud574\uc8fc\uc2ed\ub2c8\ub2e4 \uc218\uac15\uc0dd\ub4e4\uc774 \ub9ce\uc544 \ud53c\ub4dc\ubc31\uc5d0 \uc5b4\ub824\uc6c0\uc774 \uc788\uc744 \uc218 \uc788\ub294\ub370\ub3c4 \uc5f0\ub77d\ub4dc\ub9ac\uba74 \uc815\ub9d0 \ube68\ub9ac \ubcf4\uc2dc\uace0 \uc560\uc815\uc744 \uac00\uc9c0\uace0 \uc9c0\ub3c4\ud574\uc8fc\uc2ed\ub2c8\ub2e4 \ud53c\ubc14\uc5d0 \uacc4\uc18d \uc788\uc73c\uba74\uc11c \uc791\ud488\ud558\uace0\uc2f6\uc5b4\uc694 \ud53c\ubc14 \uc9f1 \uac10\ub3c5\ub2d8 \uc9f1\ud83e\udd79", "reviewer": "news*******", "date": "2026.04.07"}, {"product": "[FVA \ud53c\ubc14\uc544\uce74\ub370\ubbf8 \uc601\uc0c1 \uae30\ud68d \ud559\uc6d0] \uc624\ud504\ub77c\uc778 \ud604\uc7a5\uc218\uc5c5 - \uc601\uc0c1 \uae30\ud68d\uacfc \uc5f0\ucd9c \uc774\ub860", "type": "\uc77c\ubc18", "rating": 5, "photo": "https://phinf.pstatic.net/checkout.phinf/20260407_52/1775490148745X77Gb_JPEG/IMG_5552.jpeg", "content": "\ud559\uc6d0 \ub2e4\ub2c8\ub294 3\uac1c\uc6d4\ub3d9\uc548 \uac10\ub3c5\ub2d8\uaed8\uc11c \ub2e4\uc591\ud55c \uc9c0\uc2dd\ub3c4 \ub9ce\uc774 \uc54c\ub824\uc8fc\uc2dc\uace0 \uc88b\uc740 \uc778\uc5f0\ub4e4 \ub9ce\uc774 \ub9cc\ub098\uc11c \ube44\uc804\uacf5\uc790\uc778\ub370\ub3c4 \ucd2c\uc601 \uacc4\uc18d \ub098\uac00\uba74\uc11c \ud3ec\ud2b8\ud3f4\ub9ac\uc624 \uc313\uc544\uac00\uace0 \uc788\uc2b5\ub2c8\ub2e4!\n\uc601\uc0c1\uc5d0 \uad00\uc2ec\uc740 \uc788\uc5c8\uc9c0\ub9cc \ub9c8\ub545\ud788 \ubc30\uc6b8 \uacf3\uc774 \uc5c6\uc5b4 \ubabb\ud558\uace0 \uc788\uc5c8\ub294\ub370 \ud53c\ubc14 \ud559\uc6d0 \ub2e4\ub2c8\uba74\uc11c \uc815\ub9d0 \ub9ce\uc740 \uac78 \uc5bb\uace0 \uac11\ub2c8\ub3c4.. \ud53c\ubc14 \uc9f1 \uc815\uc8fc\uac10\ub3c5\ub2d8 \uc9f1\ud83d\udc4d!", "reviewer": "hamh******", "date": "2026.04.07"}, {"product": "[FVA \ud53c\ubc14\uc544\uce74\ub370\ubbf8 \uc601\uc0c1 \uae30\ud68d \ud559\uc6d0] \uc624\ud504\ub77c\uc778 \ud604\uc7a5\uc218\uc5c5 - \ud3ec\ud2b8\ud3f4\ub9ac\uc624 \uc6cc\ud06c\uc0f5", "type": "\ud55c\ub2ec\uc0ac\uc6a9", "rating": 5, "photo": "https://phinf.pstatic.net/checkout.phinf/20260407_242/1775489658391n9Ctq_JPEG/ED94BCEBB094.jpg", "content": "\ub9e8\ub545\uc5d0 \ubd80\ub52a\ud600\ubcfc \uc218 \uc788\ub294 \uc808\ud638\uc758 \ucc2c\uc2a4!\n \ub3c4\ub300\uccb4 \uc774 \uc218\uc5c5\uc744 \uc65c \uc9c0\uae08 \ub4e4\uc5c8\uc744\uae4c,, \uc800\ub294 \ube44\uc804\uacf5\uc790\uc774\uace0, \uc601\uc0c1\uc744 \uc804\uacf5\uc73c\ub85c \uc0bc\uace0 \uc2f6\ub2e4\ub294 \uc0dd\uac01 \ud558\ub098\ub85c 3\ub144\uc744 \ubc29\ud669\ud588\uc2b5\ub2c8\ub2e4. \ub2e4\ub2c8\ub358 \ud559\uad50\ub3c4 \uc790\ud1f4\ud558\uace0, \ubb34\uc791\uc815 \ub3c8\uc744 \ubc8c\uc5b4 \uc601\ud654\uacfc \uacfc\uc678 \uc218\uc5c5\uc744 \ub4e4\uc5c8\uc2b5\ub2c8\ub2e4. \ucc98\uc74c\uc5d0\uc57c \uc0c8\ub85c\uc6b4 \uc2dc\uc791\uc774 \uc124\ub808\uc5c8\uc9c0, \uc2dc\uac04\uc774 \uc9c0\ub0a0\uc218\ub85d \ub9c9\ub9c9\ud558\uace0 \ub450\ub824\uc6e0\uace0, \ubd88\uc548\ud574\uc11c \uc6b8\ub2e4\uac00 \uc7a0\ub4e0 \ub0a0\uc744 \uaf3d\uc744 \uc218\uac00 \uc5c6\uc2b5\ub2c8\ub2e4. \ubd88\ud569\uaca9\uc774\ub77c\ub294 \uc138 \uae00\uc790\ub3c4 \uba87\uc2ed\ubc88\uc774\uace0 \uc9c0\uacb9\ub3c4\ub85d \ubcf4\uace0 \ub098\ub2c8 \uc774\uc81c\ub294 \ubb34\uc11c\uc6b8 \uac83\uc774 \uc5c6\ub2e4\ub294 \uc0dd\uac01\uc774 \ub4e4\uc5c8\uace0, \ub9c8\uc9c0\ub9c9 \uc9c0\ud478\ub77c\uae30 \uc7a1\ub294 \uc2ec\uc815\uc73c\ub85c \ud53c\ubc14 \uc544\uce74\ub370\ubbf8 \uc218\uac15\uad8c\uc744 \ub04a\uc5b4\ubc84\ub838\uc2b5\ub2c8\ub2e4. \uc77c\ub2e8 \ud604\uc7a5\uc5d0\uc11c \ubd80\ub52a\ud600\ubcf4\uace0 \uc2f6\ub2e4\ub294 \uc0dd\uac01\uc774 \uac00\uc7a5 \ucef8\uace0, \uae30\uc655 \ubc29\ud669\ud560 \uac70, \ucc28\ub77c\ub9ac \uc544\uc8fc \ud06c\uac8c \ubc29\ud669\ud574\ubc84\ub9ac\uc790\uace0 \ub2e4\uc9d0\ud588\uc2b5\ub2c8\ub2e4. \uc774\uc81c\uc640\uc11c\ub294, \uadf8\ub0e5 \ucc98\uc74c\ubd80\ud130 \ud53c\ubc14\uc5d0\uc11c \uc800\uc9c8\ub7ec\ubcfc\uac78 \ud558\ub294 \uc544\uc26c\uc6c0\ub3c4 \ub4e4\uc9c0\ub9cc \uc9c0\uae08\uc774\ub77c\ub3c4 \uc774\uacf3\uc744 \ucc3e\uac8c\ub41c \uac83\uc744 \ud070 \ud589\uc6b4\uc774\ub77c\uace0 \uc0dd\uac01\ud569\ub2c8\ub2e4. \uc800\ub294 \ud604\uc7ac \uc218\uc5c5\uc744 \ub4e4\uc740\uc9c0 1\uac1c\uc6d4\uc5d0 \uc811\uc5b4\ub4e4\uc5c8\uc2b5\ub2c8\ub2e4. \uc9c0\uae08\uae4c\uc9c0 \ub290\uaf08\ub358 \uc810\ub4e4\uc744 \uc194\uc9c1\ud558\uac8c \uc801\uc5b4\ubcf4\uaca0\uc2b5\ub2c8\ub2e4. \n \uac10\ub3c5\ub2d8\uaed8\uc11c \ud604\uc7a5 \uc2e4\ubb34 \uacbd\ud5d8\uc744 \uae30\ubc18\uc73c\ub85c \uc544\uc8fc \uc194\uc9c1\ud558\uace0 \uc801\ub098\ub77c\ud55c \uc218\uc5c5\uc744 \ud574\uc8fc\uc2dc\ub294\ub370, \uc774 \uc810\uc744 \ucd5c\uace0\uc758 \uc7a5\uc810\uc73c\ub85c \uaf3d\uace0 \uc2f6\uc2b5\ub2c8\ub2e4. \uc218\uc5c5 \uc911 \uc2e4\ubb34 \uacbd\ud5d8\uc774 \ubd80\uc871\ud558\uac70\ub098 \uc601\uc0c1\uc5d0 \ub9c9 \uc785\ubb38\ud558\uc2e0 \ubd84\ub4e4\uc774 \uc27d\uac8c \uac00\uc9c8 \uc218 \uc788\uc744\ub9cc\ud55c \ud658\uc0c1\uacfc \ucc29\uac01\uc744 \uac04\ud30c\ud574\uc8fc\uc2dc\uace0, \uae68\ubd80\uc234 \uc8fc\uc2ed\ub2c8\ub2e4. \uc800 \ub610\ud55c \uc544\uc9c1 \uc774\uc81c \ub9c9 \ubc1c\uc744 \ub4e4\uc774\uae30 \uc2dc\uc791\ud55c\uc9c0\ub77c \ubaa8\ub974\ub294 \uac83\ub3c4 \ub9ce\uace0 \uc27d\uac8c \uc0dd\uac01\ud588\ub358 \uc77c\ub4e4\uc774 \ub9ce\uc558\ub294\ub370, \uac04\uc811\uc801\uc73c\ub85c\ub098\ub9c8 \ud604\uc2e4\uc744 \uc9c1\uc2dc\ud558\uace0 \uc0dd\uac01\uc744 \uace0\uce60 \uc218 \uc788\uc5b4\uc11c \uc815\ub9d0 \uc88b\uc558\uc2b5\ub2c8\ub2e4. \uae30\ud68d\ubd80\ud130 \uc2dc\uc791\ud574\uc11c \ucd2c\uc601, \ud3b8\uc9d1\uae4c\uc9c0 \uc77c\ub828\uc758 \ud604\uc7a5 \uacbd\ud5d8\uc744 \uc218\uc5c5 \uc548\uc5d0 \ubaa8\uc870\ub9ac \ub179\uc5ec\uc8fc\uc154\uc11c \uc5f4\uc2ec\ud788 \ub4e3\uace0 \uc801\uace0 \ub208\uc5d0 \ub2f4\uc73c\uba74\uc11c \uacf5\ubd80\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4. \uac10\ub3c5\ub2d8\uc758 \uc194\uc9c1\ud558\uace0 \uac1c\uc778\uc801\uc778 \uc0dd\uac01\uacfc \uacbd\ud5d8\ub2f4\uc744 \ub4e4\uc744 \uc218 \uc788\ub2e4\ub294 \uac8c \uc815\ub9d0 \ud070 \uc7a5\uc810 \uac19\uc2b5\ub2c8\ub2e4.\n \ud53c\ubc14 \ucee4\ubba4\ub2c8\ud2f0 \ud30c\ud2f0\uc5d0\uc11c 15, 16\uae30 \uc218\uac15\uc0dd\ubd84\ub4e4\uc774 \ubaa8\uc5ec \uc790\uae30\uc18c\uac1c\ub97c \ud558\uace0, \uae30\ud68d\uc548\uc744 \ubc1c\ud45c\ud558\ub294 \uc2dc\uac04\uc744 \uac00\uc9c8 \uc218 \uc788\uc5c8\uc2b5\ub2c8\ub2e4. \ud30c\ud2f0 \uc2dc\uac04 \ub3d9\uc548, \uac01\uc790 \ub2e4\ub978 \uc0c9\uae54\ub85c \uad00\uc2ec \ubd84\uc57c\uc5d0 \uc2dc\uac04\uc744 \ub4e4\uc774\uace0 \uacc4\uc2e0 \ubaa8\uc2b5\uc744 \ubcf4\uace0 \ub354 \uc5f4\uc2ec\ud788 \uc0b4\uace0 \uc2f6\ub2e4\uace0 \uc0dd\uac01\ud588\uace0, \ub610 \ud55c\ubc88 \ub3d9\ub825\uc744 \uc5bb\uc5c8\uc2b5\ub2c8\ub2e4. \ubc1c\ud45c\uac00 \ub05d\ub098\uace0\ub294 \uc218\uc774\ucf54 \ub514\ub809\ud130\ub2d8\uaed8\uc11c \ud2b9\ubcc4 \uac15\uc758\ub97c \ud574\uc8fc\uc168\uc2b5\ub2c8\ub2e4. \uac00\uc7a5 \uae30\uc5b5\uc5d0 \ub0a8\ub294 \uac15\uc758 \ub0b4\uc6a9\uc740 &lsquo;\ub2e4\uc815\ud558\uc790&rsquo; \uc600\uc2b5\ub2c8\ub2e4. \uc774 \ub124 \uae00\uc790 \ub9d0\uc744 \uc2dc\uc791\uc73c\ub85c \ub514\ub809\ud130\ub85c\uc11c \uac00\uc838\uc57c \ud560 \ub9c8\uc74c\uac00\uc9d0\uacfc \uacaa\uc5b4\uc624\uc2e0 \uc2e4\ubb34 \uacbd\ud5d8 \uc774\uc57c\uae30\ub4e4\uc744 \uc194\uc9c1\ud558\uac8c \ub098\ub220\uc8fc\uc168\ub294\ub370, \uc81c\uac00 \uac00\uc9c0\uace0 \uc788\ub294 \ub514\ub809\ud130\ub85c\uc11c\uc758 \uac00\uce58\uad00\uacfc \uc77c\uce58\ud558\ub294 \uba74\uc774 \uc788\uc5b4 \ub2e4\ud589\uc774\ub77c\ub294 \uc0dd\uac01\uc774 \ub4e6\uacfc \ub3d9\uc2dc\uc5d0, \ud3bc\uccd0\uc9c8 \uc6b0\uc5ec\uace1\uc808\uacfc \uc7a5\ubcbd\ub4e4\uc774 \uc815\ub9d0 \uac00\uae4c\uc774\uc5d0 \uc788\ub294 \uac83\ub9cc \uac19\uc544 \ub450\ub835\uae30\ub3c4 \ud588\uc2b5\ub2c8\ub2e4. \n \ud30c\ud2f0 \uc911\uc5d0\ub294 \uc218\uac15\uc0dd\ub4e4\uacfc \uc11c\ub85c \uc601\uc0c1 \uac00\uce58\uad00\uc774\ub098 \uc2e4\ubb34 \uacbd\ud5d8\uc5d0 \ub300\ud574\uc11c \uc774\uc57c\uae30 \ub098\ub20c \uc218 \uc788\uc5b4\uc11c \uc88b\uc558\uc2b5\ub2c8\ub2e4. \uc0ac\uc2e4 \uc5ec\ud0dc\uae4c\uc9c0 \ub0b4\uac00 \uc5b4\ub5a4 \uc601\uc0c1\uc744 \ud558\uace0 \uc2f6\uc740\uc9c0, \ub0b4\uac00 \ucd94\uad6c\ud558\ub294 \ubc29\ud5a5\uc774 \ubb34\uc5c7\uc778\uc9c0, \ub098\ub294 \uc5b4\ub5a4 \uc601\uc0c1\uc744 \uc88b\uc544\ud558\ub294 \uc0ac\ub78c\uc778\uc9c0 \uac00\uae4c\uc6b4 \uc0ac\ub78c\ub4e4\uacfc \uc774\uc57c\uae30 \ub098\ub20c \uc218 \uc788\ub294 \uc2dc\uac04\uc774 \uc5c6\uc5c8\uc2b5\ub2c8\ub2e4. \uadf8\ub7f0\ub370, \uc774\uacf3\uc5d0\uc11c \uc11c\ub85c \ube44\uc2b7\ud558\uc9c0\ub9cc \ub2e4\ub978 \uad00\uc2ec\uc0ac\ub97c \uac00\uc9c4 \uc0ac\ub78c\ub4e4\uc774 \uac01\uc790\uc758 \uc774\uc57c\uae30\ub97c \ub098\ub204\uba70 \ud300\uc744 \uafb8\ub9ac\uace0, \uc601\uc0c1 \ubc29\ud5a5\uc131\uc744 \uac16\ucd94\uc5b4 \uac08 \uc218 \uc788\ub2e4\ub294 \uc810\uc774 \uc815\ub9d0 \uc88b\uc558\uc2b5\ub2c8\ub2e4. \uc774\uac74 \ucd5c\uace0\uc758 \uc7a5\uc810\uc774\ub77c\uace0 \uc0dd\uac01\ud569\ub2c8\ub2e4. \ubfd0\ub9cc \uc544\ub2c8\ub77c \uc815\ub9d0 \ubc11\ubc14\ub2e5\ubd80\ud130 \ubd80\ub52a\ud600\ubcf4\uace0 \uc2f6\uc740 \uc81c\uac8c \uc774 \ucee4\ubba4\ub2c8\ud2f0\ub294 \uc0ac\ub2e4\ub9ac\uac00 \ub418\uc5b4\uc904 \uc218 \uc788\ub2e4\ub294 \uc810\uc5d0\uc11c \ucc38 \ub9e4\ub825\uc801\uc774\uc5c8\uc2b5\ub2c8\ub2e4. \ube44\uc804\uacf5\uc790\uc2dc\ub354\ub77c\ub3c4 \uc2e4\ubb34 \uacbd\ud5d8\uc744 \uc313\uace0 \uc2f6\uc73c\uc2e0 \ubd84\ub4e4\uc774\ub77c\uba74 \ubb34\uc870\uac74 \ucd94\ucc9c, 3\ub144 \uc804 \uc800\uc640 \ube44\uc2b7\ud55c \uace0\ubbfc\uc744 \ud558\uace0 \uacc4\uc2e0 \ubd84\ub4e4\uc774\ub354\ub77c\ub3c4 \ubb34\uc870\uac74 \ucd94\ucc9c\ub4dc\ub9bd\ub2c8\ub2e4. \uc55e\uc73c\ub85c \ub0a8\uc740 2\uac1c\uc6d4 \uc218\uc5c5, \ub098\uac00\uac8c \ub420 \ucd2c\uc601 \ud604\uc7a5 \ub108\ubb34 \uae30\ub300\uac00 \ub429\ub2c8\ub2e4.", "reviewer": "hell*******", "date": "2026.04.07"}, {"product": "[FVA \ud53c\ubc14\uc544\uce74\ub370\ubbf8 \uc601\uc0c1 \uae30\ud68d \ud559\uc6d0] \uc624\ud504\ub77c\uc778 \ud604\uc7a5\uc218\uc5c5 - \uc601\uc0c1 \uae30\ud68d\uacfc \uc5f0\ucd9c \uc774\ub860", "type": "\ud55c\ub2ec\uc0ac\uc6a9", "rating": 5, "photo": "https://phinf.pstatic.net/checkout.phinf/20260407_248/1775489764460Qt72O_JPEG/IMG_4759.jpeg", "content": "\uc601\uc0c1 \ud558\ub098\ub3c4 \ubaa8\ub974\uace0 \uadf8\uc800 \uad00\uc2ec\ub9cc \uc788\ub358 \ube44\uc804\uacf5\uc790 \ub300\ud559\uc0dd\uc785\ub2c8\ub2e4. \uc2dc\uc791\uc774 \uc5ca\uadf8\uc81c \uac19\uc740\ub370 \uc5b4\ub290\ub367 3\uac1c\uc6d4 \ub9c8\ubb34\ub77c\ub2c8 \ubc8c\uc368 \uc544\uc27d\uc2b5\ub2c8\ub2e4.\n\uc218\uac15\uc744 \uace0\ubbfc\ud558\uc2dc\ub294 \ubd84\ub4e4\uaed8 \ud55c\ub9c8\ub514 \uc804\ud574\ubcf4\uc790\uba74 \uc815\uc8fc \uac10\ub3c5\ub2d8\uaed8\uc11c \uc720\uba38+\uce5c\uc808+\uc0ac\ub791\uc73c\ub85c \uac00\ub974\uccd0\uc8fc\uc2dc\ub2c8 \uc800\ucc98\ub7fc \ud558\ub098\ub3c4 \ubaa8\ub974\ub294 \ubd84\ub4e4\ub3c4 \uc5f4\uc815\ub9cc \uac00\uc9c0\uace0 \uc624\uc2dc\uba74 \uc798 \ubc30\uc6b8 \uc218 \uc788\uc744 \uac70\uc608\uc694! \n\ubc30\uc6c0\ubd84\ub9cc \uc544\ub2c8\ub77c \uc778\uc801 \ub124\ud2b8\uc6cc\ud06c\ub3c4 \uc0c1\ub2f9\ud558\ub2c8 3\uac1c\uc6d4\uc774 \ubd80\ub2f4\uc774\ub77c\uba74 \uc77c\ub2e8 1\uac1c\uc6d4\uc774\ub77c\ub3c4 \uc218\uac15\ud574\ubcf4\uc2ed\uc2dc\uc624!(\uadfc\ub370 \uacb0\uad6d 3\uac1c\uc6d4 \uc5f0\uc7a5\ud558\uac8c \ub418\uc2e4 \uac81\ub2c8\ub2e4...\u314e\u314e)\n\ubaa8\ub4e0 \uc601\uc0c1\uc774 \ud558\uace0 \uc2f6\uc9c0\ub9cc \ub450\ub824\uc6c0\uc744 \uac00\uc9c0\uace0 \uc788\ub294 \ubd84\ub4e4\uaed8 \uac15\ucd94\ud569\ub2c8\ub2e4!! \ucd2c\uc601\uc7a5 \ub098\uac00\ubcf4\uace0 \uc2f6\uc796\uc544\uc694! \ub0b4 \uc601\uc0c1 \ub9cc\ub4e4\uace0 \uc2f6\uc796\uc544\uc694! \uc6b0\ub9ac \uac19\uc774 \ubc30\uc6cc\ubcf4\uc790\uad6c\uc694~!\n*\uc0ac\uc9c4\uc740 \uccab\ub0a0 \uacfc\uc81c!!", "reviewer": "kyd0*****", "date": "2026.04.07"}, {"product": "[FVA \ud53c\ubc14\uc544\uce74\ub370\ubbf8 \uc601\uc0c1 \uae30\ud68d \ud559\uc6d0] \uc624\ud504\ub77c\uc778 \ud604\uc7a5\uc218\uc5c5 - \ud3ec\ud2b8\ud3f4\ub9ac\uc624 \uc6cc\ud06c\uc0f5", "type": "\ud55c\ub2ec\uc0ac\uc6a9", "rating": 5, "photo": "https://phinf.pstatic.net/checkout.phinf/20260406_54/1775437511666XtH5C_JPEG/IMG_0487.jpeg", "content": "\ud3c9\uc18c \ubba4\ube44 \uac10\ub3c5\uc744 \uafc8\uafd4\uc654\uc9c0\ub9cc \uc800\ub294 \ube44\uc804\uacf5\uc790\uc774\uace0, \uc601\uc0c1\uc744 \ud558\ub294 \ubd84\ub3c4 \uc8fc\ubcc0\uc5d0 \uc5c6\uc5b4\uc11c \uc5b4\ub5bb\uac8c \uc2dc\uc791\ud574\uc57c\ud560\uc9c0 \ub9c9\ub9c9\ud588\uc5c8\uc2b5\ub2c8\ub2e4\u3160\u3160 \uc720\ud29c\ube0c\ub098 \ub3c5\ud559\uc73c\ub85c\ub294 \ud574\uacb0\ub418\uc9c0 \uc54a\ub294 \uc2e4\ubb34\uc801\uc778 \ubd80\ubd84\uc744 \ud574\uacb0\ud558\uae30 \uc704\ud55c \ubc29\ubc95\uc744 \ucc3e\uc544\ubcf4\ub2e4 \ud53c\ubc14 \uc544\uce74\ub370\ubbf8\ub97c \ubc1c\uacac\ud558\uac8c \ub418\uc5c8\uc2b5\ub2c8\ub2e4!\n\n\ud53c\ubc14 \uc544\uce74\ub370\ubbf8\uc5d0\uc11c \uac00\uc7a5 \ub9cc\uc871\uc2a4\ub7ec\uc6e0\ub358 \ubd80\ubd84\uc740 \uc81c\uac00 \ub9cc\ub4e4\uace0\uc2f6\uc740 \uc601\uc0c1 \uae30\ud68d\uc548\uc5d0 \ub300\ud574 \ud604\uc9c1 \uac10\ub3c5\ub2d8\uaed8\uc11c \ubc00\ucc29 \ucf54\uce6d\uc744 \ud574\uc8fc\uc2e0\ub2e4\ub294 \uc810\uc785\ub2c8\ub2e4! \ud63c\uc790 \uc601\uc0c1\uc744 \uae30\ud68d\ud558\ub2e4\ubcf4\ub2c8 \ub9c9\ud788\ub294 \ubd80\ubd84\ub3c4\uc788\uace0 \uac1d\uad00\uc801\uc778 \uc2dc\uc120\uc73c\ub85c \uae30\ud68d\uc548\uc744 \ubcf4\uae30 \uc5b4\ub824\uc6e0\ub294\ub370, \uac10\ub3c5\ub2d8\uaed8\uc11c \uc774 \ubd80\ubd84\uc744 \ubd10\uc8fc\uc2dc\uace0 \uad6c\uccb4\uc801\uc778 \ud53c\ub4dc\ubc31\uc744 \ud574\uc8fc\uc154\uc11c \uc81c\uac00 \ub9cc\ub4e4\uace0 \uc2f6\uc740 \uc601\uc0c1\ubb3c\uc5d0 \ub300\ud55c \ubc29\ud5a5\uc744 \uad6c\uccb4\ud654\ud558\uae30 \uc26c\uc6e0\uc2b5\ub2c8\ub2e4! \n\ub610\ud55c \uac10\ub3c5\ub2d8\uaed8\uc11c \uc798\ub9cc\ub4e0 \uc601\uc0c1\ubb3c\uc744 \ub418\uac8c \uc911\uc694\ud558\uac8c \uc0dd\uac01\ud558\uc154\uc11c \uc88b\uc740 \uc601\uc0c1\ubb3c\uc744 \ubcf4\ub294 \uc2dc\uc120\ub3c4 \ub9ce\uc774 \ud0a4\uc6b4 \uac83 \uac19\uc2b5\ub2c8\ub2e4 \u314e\u314e\n\n\uc5b4\uc81c \ucee4\ubba4\ub2c8\ud305 \ud30c\ud2f0\uc5d0\uc11c\ub294 \uc120\ubc30 \uae30\uc218 \ubd84\ub4e4\uacfc 16\uae30 \ub3d9\uae30\ubd84\ub4e4\uc774 \ucc38\uc5ec\ud588\ub294\ub370, \uc5ec\uae30\uc11c \uc5c4\uccad \ud070 \ud30c\uc774\ud305\uc744 \uc5bb\uc5c8\uc2b5\ub2c8\ub2e4!! \uac01\uc790 \ud558\uace0 \uc2f6\uc740 \uc601\uc0c1 \uae30\ud68d\uc548\uc744 \ubc1c\ud45c\ud558\uc2dc\ub294\ub370 \uad11\uace0\ubd80\ud130 \ubba4\ube44, \ube44\uc8fc\uc5bc\ud544\ub984\ub4f1 \ub418\uac8c \uc7a5\ub974\uac00 \ub418\uac8c \ub2e4\uc591\ud588\uc5b4\uc11c \ub2e4\uc591\ud55c \uacbd\ud5d8\uc744 \uc313\uae30 \uc88b\uaca0\ub2e4\ub294 \uc0dd\uac01\uc774 \ub4e4\uc5c8\uc2b5\ub2c8\ub2e4\n\ud53c\ubc14 \uc88b\uc740 \ubd84\ub4e4\ub3c4 \uc5f4\uc815\uc788\ub294 \ubd84\ub4e4\ub3c4 \ub108\ubb34\ub108\ubb34 \ub9ce\uc544\uc11c \uc815\ub9d0 \uc88b\uc740 \uc790\uadf9\uc744 \uc5bb\uc740 \uac83 \uac19\uc2b5\ub2c8\ub2e4\ud83e\udd79\ud83e\udd79\n\n\uc774\uc81c 2\uac1c\uc6d4 \uc218\uc5c5 \ub0a8\uc558\ub294\ub370 \uc55e\uc73c\ub85c\uc758 \uc218\uc5c5\ub3c4 \ub108\ubb34 \uae30\ub300\ub429\ub2c8\ub2e4! \uaf2d \ud53c\ubc14\uc5d0\uc11c \uc88b\uc740 \uc601\uc0c1\ubb3c \uc81c\uc791\ud574 \ub098\uac00\uaca0\uc2b5\ub2c8\ub2e4!!", "reviewer": "ekse*****", "date": "2026.04.06"}, {"product": "[FVA \ud53c\ubc14\uc544\uce74\ub370\ubbf8 \uc601\uc0c1 \uae30\ud68d \ud559\uc6d0] \uc624\ud504\ub77c\uc778 \ud604\uc7a5\uc218\uc5c5 - \ud3ec\ud2b8\ud3f4\ub9ac\uc624 \uc6cc\ud06c\uc0f5", "type": "\ud55c\ub2ec\uc0ac\uc6a9", "rating": 5, "photo": "https://phinf.pstatic.net/checkout.phinf/20260405_267/1775400722164GWiQH_JPEG/IMG_4774.jpeg", "content": "\ud63c\uc790 \uc601\uc0c1 \ucc0d\ub358 \uc0ac\ub78c\uc774 FVA \uc628 \ud6c4\uae30 \ud83c\udfac\n\n\uc720\ud29c\ube0c \ubcf4\uace0 \ub3c5\ud559\uc73c\ub85c \uc601\uc0c1 \ub9cc\ub4e4\ub358 \uc0ac\ub78c\uc778\ub370, \uc694\uc998 \ud55c\uacc4\ub97c \ub9ce\uc774 \ub290\uaf08\uc2b5\ub2c8\ub2e4. \ud2b9\ud788 \uae30\ud68d\uc774 \ub9c9\ub9c9\ud55c \uc0c1\ud669\uc774\uc5c8\uc2b5\ub2c8\ub2e4. \ud234\uc744 \uac00\ub974\uccd0\uc8fc\ub294 \ud559\uc6d0\uc740 \ub9ce\uc9c0\ub9cc \uc601\uc0c1 \uae30\ud68d \uad00\ub828 \uc544\uce74\ub370\ubbf8\uac00 \uc874\uc7ac\ud55c\ub2e4\ub294 \uac78 FVA\ub85c \ucc98\uc74c \uc54c\uc558\uc2b5\ub2c8\ub2e4. \uac70\uae30\uc5d0 \uc2a4\ud0ed \uad6c\uc131 \ub4f1 \uc2e4\ubb34\uc790\uac00 \uc544\ub2c8\uba74 \ubaa8\ub974\ub294 \ubd80\ubd84\uc5d0 \ub300\ud574\uc11c \uc54c\uace0 \uc2f6\uc5b4\uc11c \ubc14\ub85c \ub4f1\ub85d\ud588\uc2b5\ub2c8\ub2e4.\n\nFVA 16\uae30 \ud55c\ub2ec \ud6c4\uae30\n\u2714 \ucee4\ub9ac\ud058\ub7fc\uc774 \ud0c4\ud0c4\ud574\uc694. \uae30\ud68d\ubd80\ud130 \uc5f0\ucd9c, \uc2dc\ub098\ub9ac\uc624, \ub808\ud37c\ub7f0\uc2a4 \ud65c\uc6a9\ubc95, \ucf58\ud2f0&middot;\uc2a4\ud1a0\ub9ac\ubcf4\ub4dc&middot;\ub370\ubaa8\ube44\ub514\uc624 \uc81c\uc791, \uadf8\ub9ac\uace0 \uc2e4\uc81c \ucd2c\uc601\ud604\uc7a5 \uc900\ube44(\uce74\uba54\ub77c \uc774\ub860, \uc870\uba85)\uae4c\uc9c0! \ub2e8\uc21c \uc774\ub860\uc774 \uc544\ub2c8\ub77c '\ud604\uc7a5\uc5d0\uc11c \uc5b4\ub5bb\uac8c \uc4f0\uc774\ub294\uac00'\ub85c \ud480\uc5b4\uc8fc\uc2dc\ub294 \uac8c \ub108\ubb34 \uc88b\uc2b5\ub2c8\ub2e4.\n\n\u2714 \uc774\ub860 \uc218\uc5c5 \ud6c4\uc5d0\ub294 \uac01\uc790 \uac00\uc838\uc628 \uc601\uc0c1 \uae30\ud68d\uc548\uc744 \ud53c\ub4dc\ubc31\ud574\uc8fc\uc2ed\ub2c8\ub2e4. \ud604\uc9c1 \uac10\ub3c5\ub2d8\uc774 \uc9c1\uc811 \ubd10\uc8fc\uc2dc\ub2c8, \ud63c\uc790\uc11c\ub294 \uc0dd\uac01\uc9c0\ub3c4 \ubabb\ud588\ub358 \uc9c0\uc810\uc5d0\uc11c \uacc4\uc18d \ubc1c\uc804\ud574\ub098\uac08 \uc218 \uc788\uc2b5\ub2c8\ub2e4. \uc0c8\uc0bc \uae30\ud68d\uc774 \uc5bc\ub9c8\ub098 \uc911\uc694\ud55c\uc9c0, \ubf08\uc800\ub9ac\uac8c \ub290\ub07c\uace0 \uc788\uc2b5\ub2c8\ub2e4. \ube68\ub9ac \uc9c4\ub3c4\ub97c \ub098\uac00\uc11c \uc798 \uc900\ube44\ud55c \ud6c4\uc5d0, \ucd2c\uc601 \ud604\uc7a5\uc5d0\ub3c4 \ub098\uac00\ubcf4\uace0 \uc2f6\uc2b5\ub2c8\ub2e4.\n\n\u2714 \uc624\ub298\uc740 \ucee4\ubba4\ub2c8\ud2f0 \ud30c\ud2f0\uac00 \uc788\ub294\ub370 15\uae30, 16\uae30\uac00 \ud55c \uc790\ub9ac\uc5d0 \ubaa8\uc600\uc2b5\ub2c8\ub2e4. \uc218\uc774\ucf54 \uac10\ub3c5\ub2d8\uaed8\uc11c \ud2b9\uac15\uc73c\ub85c \uc624\uc168\ub294\ub370 \uc815\ub9d0 \uc778\uc0c1\uae4a\uc740 \ud604\uc9c1 \uc2a4\ud1a0\ub9ac\ub97c \ud480\uc5b4\uc8fc\uc168\uc5b4\uc694. \uac10\ub3c5\uc5d0\ub3c4 \ub2e4\uc591\ud55c \uae38\uc774 \uc788\ub2e4\ub294 \uac78 \uc54c \uc218 \uc788\uc5b4\uc11c \uc88b\uc558\uc2b5\ub2c8\ub2e4. \uadf8\ub9ac\uace0 \uac01\uc790 \uc790\uae30 \uae30\ud68d\uc744 \uc18c\uac1c\ud558\uba74\uc11c \ud300 \uacb0\uc131\ub3c4 \ud560 \uc218 \uc788\ub294 \uc790\ub9ac\uc600\uc5b4\uc694. \ud63c\uc790 \uc791\uc5c5\ud558\ub358 \uc800\ud55c\ud14c\ub294 \uc774\ub7f0 \ucee4\ubba4\ub2c8\ud2f0 \uc790\uccb4\uac00 \uc5c4\uccad\ub09c \uc790\uc0b0\uc774\uc5c8\uc2b5\ub2c8\ub2e4.\n\n\uc55e\uc73c\ub85c\ub3c4 \ub9ce\uc774 \ubc30\uc6b0\uace0, \uc5ec\uae30\uc11c \uc88b\uc740 \uc791\ud488 \ub9cc\ub4e4\uc5b4\uac00\uace0 \uc2f6\uc2b5\ub2c8\ub2e4. \uc804\uacf5, \ube44\uc804\uacf5 \uc0c1\uad00\uc5c6\uc774 \uc5f4\uc2ec\ud788\ub9cc \ud55c\ub2e4\uba74 \uc5c4\uccad\ub098\uac8c \ub9ce\uc740 \uac83\ub4e4\uc744 \uc5bb\uc5b4\uac00\uc2e4 \uc218 \uc788\uc2b5\ub2c8\ub2e4. \uace0\ubbfc\ud558\ub294 \ubd84\ub4e4\uaed8 \uc9c4\uc2ec\uc73c\ub85c \ucd94\ucc9c\ud569\ub2c8\ub2e4!!", "reviewer": "isun****", "date": "2026.04.05"}, {"product": "[FVA \ud53c\ubc14\uc544\uce74\ub370\ubbf8 \uc601\uc0c1 \uae30\ud68d \ud559\uc6d0] \uc624\ud504\ub77c\uc778 \ud604\uc7a5\uc218\uc5c5 - \ud3ec\ud2b8\ud3f4\ub9ac\uc624 \uc6cc\ud06c\uc0f5", "type": "\ud55c\ub2ec\uc0ac\uc6a9", "rating": 5, "photo": "https://phinf.pstatic.net/checkout.phinf/20260202_21/1770025184437hSoUD_JPEG/KakaoTalk_20260202_183910452_01.jpg", "content": "\uc804\uacf5\uc790\uc774\uc9c0\ub9cc \uc624\ud788\ub824 \ud53c\ubc14\ub97c \ud1b5\ud574\uc11c \ub354 \ub9ce\uc740 \uacbd\ud5d8\uacfc \uc0ac\uace0\uc758 \uc804\ud658\uc744 \uacaa\uc744 \uc218 \uc788\uc5b4 \uc990\uac70\uc6e0\uc5b4\uc694!\n\n\uae30\ud68d \uc218\uc5c5\uc5d0\uc11c\ub294 \uc8fc\ub85c \ub808\ud37c\ub7f0\uc2a4\uc640 \ud074\ub9ac\uc170, \ubbf8\uc7a5\uc13c\uc744 \uc5b4\ub5bb\uac8c \ud65c\uc6a9\ud574\uc57c \ud558\ub294\uc9c0 \uac10\uac01\uc801\uc73c\ub85c \ubc30\uc6b8 \uc218 \uc788\uc5c8\uace0 \uac04\ub2e8\uba85\ub8cc\ud558\uac8c \uc124\ub4dd\ub825\uc744 \uac16\ucd98 \uc2dc\ub098\ub9ac\uc624 \uc791\ubc95\uc744 \uc911\uc2ec\uc73c\ub85c \uae30\ud68d\uc548\uc744 \ub9cc\ub4e4 \uc218 \uc788\uc5b4\uc694. \uccb4\uacc4\uc801\uc73c\ub85c \uc9dc\uc5ec\uc9c4 \ucee4\ub9ac\ud058\ub7fc\uc744 \ud1b5\ud574 \uc5f0\ucd9c\uc744 \ubcf4\ub294 \ub208\uc744 \uae30\ub974\ub294 \ub3d9\uc2dc\uc5d0 \uac1c\uc778 \uacfc\uc81c\ub97c \uc9c4\ud589\ud558\uba74\uc11c \uac10\ub3c5\ub2d8\uaed8\uc11c \uaf3c\uaf3c\ud558\uac8c \uc8fc\uc2e0 \ud53c\ub4dc\ubc31\uc73c\ub85c \uad49\uc7a5\ud788 \ud070 \ub3c4\uc6c0\uc744 \uc5bb\uc744 \uc218 \uc788\uc5c8\ub358 \uac83 \uac19\uc2b5\ub2c8\ub2e4.\n\ub610\ud55c \ucd2c\uc601&middot;\uc870\uba85 \uc6cc\ud06c\uc20d\uc744 \ud1b5\ud574 \uc2dc\ub124\ub9c8 \uce74\uba54\ub77c\uc778 ALEXA\ub97c \uba54\uc778\uc73c\ub85c \uc5ec\ub7ec \uce74\uba54\ub77c\ub97c \ud65c\uc6a9\ud55c \uc601\uc0c1 \ud604\uc7a5\uc5d0\uc11c \uc7a5\ube44\uc640 \uc138\ud2b8\uc5d0 \ub300\ud55c \uc774\ub860\uc801 \uc774\ud574\ub97c \ub118\uc5b4 \ud604\uc7a5\uc5d0\uc11c \uc5b4\ub5bb\uac8c \ud310\ub2e8\ud558\uace0 \uc6c0\uc9c1\uc5ec\uc57c \ud558\ub294\uc9c0\ub97c \ubc14\ub85c \ubab8\uc73c\ub85c \uc775\ud788\uace0 \uccb4\ud5d8\ud560 \uc218 \uc788\ub294 \uc9c0\uc810\uc774 \uc778\uc0c1 \uae4a\ub2e4\uace0 \uc0dd\uac01\ud558\uc600\uc2b5\ub2c8\ub2e4. \uc774\ub860\uacfc \uc2e4\uc2b5\uc774 \uade0\ud615 \uc788\uac8c \uad6c\uc131\ub41c \ub9cc\uc871\uc2a4\ub7ec\uc6b4 \uc218\uc5c5\uc774\uc5c8\ub358 \uac83 \uac19\uc544\uc694. \n\ub124\ud2b8\uc6cc\ud0b9\uc744 \ud1b5\ud574 \ub2e4\uc591\ud55c \uc0ac\ub78c\ub4e4\uacfc \ud504\ub85c\uc81d\ud2b8\ub4e4\uc744 \uc811\ud558\uace0 \uad50\ub958\ud558\uace0 \uc791\uc5c5\ud558\uba70 \uc2dc\uc57c\ub97c \ub113\ud790 \uae30\ud68c\ub3c4 \uc5bb\uc744 \uc218 \uc788\uc5b4 \uc88b\uc558\ub358 \uac83 \uac19\uc2b5\ub2c8\ub2e4. \uc2ec\ub3c4 \uae4a\uace0 \uc88b\uc740 \ud004\ub9ac\ud2f0\uc758 \uc601\uc0c1\uc744 \ub9cc\ub4e4\uace0 \uc2f6\ub2e4\uba74 \ud53c\ubc14 \ub4f1\ub85d\uc744 \ucd94\ucc9c\ud569\ub2c8\ub2e4.", "reviewer": "le****", "date": "2026.02.02"}, {"product": "[FVA \ud53c\ubc14\uc544\uce74\ub370\ubbf8 \uc601\uc0c1 \uae30\ud68d \ud559\uc6d0] \uc624\ud504\ub77c\uc778 \ud604\uc7a5\uc218\uc5c5 - \ud3ec\ud2b8\ud3f4\ub9ac\uc624 \uc6cc\ud06c\uc0f5", "type": "\ud55c\ub2ec\uc0ac\uc6a9", "rating": 5, "photo": "https://phinf.pstatic.net/checkout.phinf/20260202_277/1769963071984wxO0y_JPEG/1000024054.jpg", "content": "\uac1c\uc778 \uc791\uc5c5\uc758 \ud55c\uacc4\ub97c \ub118\uc5b4 '\uc6b0\ub9ac'\uac00 \ub9cc\ub4dc\ub294 \uc601\uc0c1\uc744 \ub9c8\uc8fc\ud588\uc2b5\ub2c8\ub2e4...!  '\ud53c\ubc14XSLR\ub80c\ud2b8 \uc6cc\ud06c\uc0f5'\n\uc601\uc0c1\uc774\ub77c\ub294 \uae38\uc744 \uac78\uc73c\uba70 \ub298 \ud63c\uc790\uc11c \uace0\uad70\ubd84\ud22c\ud588\uc2b5\ub2c8\ub2e4... \ucd2c\uc601 \ubca0\uc774\uc2a4\ub85c \uc2dc\uc791\ud574 \uac1c\uc778 \uc791\uc5c5\uc5d0 \uc775\uc219\ud588\ub358 \uc800\uc5d0\uac8c \uc774\ubc88 \ud53c\ubc14 \uc544\uce74\ub370\ubbf8\uc640 SLR\ub80c\ud2b8\uac00 \ud568\uaed8\ud55c \ucd2c\uc601&middot;\uc870\uba85 \uc6cc\ud06c\uc0f5\uc740 \uadf8\uc57c\ub9d0\ub85c '\uae30\ubd84 \uc88b\uc740 \ucda9\uaca9'\uc758 \uc5f0\uc18d\uc774\uc5c8\uc5b4\uc694\u315c\u315c\n\uac00\uc7a5 \ub180\ub77c\uc6e0\ub358 \uc810\uc740 \uc120\ubc30 \uae30\uc218\ubd84\ub4e4\uc774 \ubcf4\uc5ec\uc900 \uc555\ub3c4\uc801\uc778 \ud504\ub85c\ud398\uc154\ub110\ub9ac\uc998\uc774\uc5c8\uc2b5\ub2c8\ub2e4. \ubbf8\uc220, \uc870\uba85, \uc5f0\ucd9c, \ucd2c\uc601, \uadf8\ub9ac\uace0 PD\uae4c\uc9c0...!!!\n\uac01\uc790\uc758 \uc704\uce58\uc5d0\uc11c \uc9d1\uc911\ud558\ub294 \uc2a4\ud0dc\ud504\ub4e4\uc758 \ubaa8\uc2b5\uc740 \uacbd\uc774\ub86d\uae30\uae4c\uc9c0 \ud588\uc5b4\uc694\n\ub2e8\uc21c\ud788 \ucd2c\uc601\uc744 \uc798\ud558\ub294 \uac83\uc774 \uc804\ubd80\uac00 \uc544\ub2c8\ub77c\ub294 \uac83\uc744 \uae68\ub2ec\uc558\uace0 \ubbf8\uc220\uc758 \ub808\uc774\uc5b4\uac00 \uc313\uc774\uace0, \uc870\uba85\uc758 \uacb0\uc774 \ub354\ud574\uc9c0\uba70, \uc5f0\ucd9c\uc758 \uc758\ub3c4\uac00 \ucd2c\uc601\uc758 \uc6c0\uc9c1\uc784\uacfc \ub9cc\ub098\uace0 \uc561\uc158 \ub4e4\uc5b4\uac00\ub294 \uc21c\uac04 \ub098\uc624\ub294 \uadf8\ub9bc\uc774 \ubbf8\ucce4\uc5b4\uc694 \uc9c4\uc9dc!!!\n\uc313\uc774\uace0 \uc313\uc5ec \ube44\ub85c\uc18c \uc644\uc131\ub418\ub294 '\ud0a4\ube44\uc8fc\uc5bc'\uacfc \uc555\ub3c4\uc801\uc778 \ud004\ub9ac\ud2f0\ub97c \ubcf4\uba70 \uc601\uc0c1\ubbf8\uc5d0 \ub300\ud55c \uc2dc\uc57c\uac00 \uc644\uc804\ud788 \ud655\uc7a5\ub418\ub294 \uacbd\ud5d8\uc744 \ud588\uc2b5\ub2c8\ub2e4.\n\ucd2c\uc601 \ub4a4\uc5d0 \uc774\uc5b4\uc9c4 \uae30\ud68d\uc548 \ubc1c\ud45c\uc640 \ucee4\ubba4\ub2c8\ud2f0 \uc2dc\uac04\uc740 \ub610\ud55c \ub108\ubb34 \ub9cc\uc871\uc2a4\ub7ec\uc6e0\uc5b4\uc694. \uc11c\ub85c\uc758 \uae30\ud68d\uc744 \ubcf4\uba70 &quot;\uc800 \uc791\ud488\uc5d0 \uaf2d \ucc38\uc5ec\ud558\uace0 \uc2f6\ub2e4&quot;\ub294 \ub728\uac70\uc6b4 \ub3d9\uae30\ubd80\uc5ec\ub97c \uc5bb\uc5c8\uace0, \uc5f0\ub77d\ucc98\ub97c \uad50\ud658\ud558\uba70 \ud568\uaed8 \uc131\uc7a5\ud560 \ub3d9\ub8cc\ub97c \uc5bb\uc740 \uc774 \uc2dc\uac04\uc740 \ub108\ubb34 \uc18c\uc911\ud569\ub2c8\ub2e4\u314e\u314e\n\uc774\uc81c \uc218\uac15\ud55c \uc9c0 1\uac1c\uc6d4\uc774\uc9c0\ub9cc \uc774\ubc88 \uc6cc\ud06c\uc0f5\uc744 \ud1b5\ud574 \ud655\uc2e0\ud588\uc2b5\ub2c8\ub2e4. \uc55e\uc73c\ub85c\uc758 \uc218\uc5c5\ub4e4\uc774 \ub108\ubb34\ub098 \uae30\ub300\ub429\ub2c8\ub2e4. \ub354 \ub9ce\uc740 \uc81c\uc791 \uacfc\uc815\uc5d0 \ucc38\uc5ec\ud558\uc5ec \uba4b\uc9c4 \uc601\uc0c1\uc778\uc73c\ub85c \uc131\uc7a5\ud558\uace0 \uc2f6\ub2e4\ub294 \ub2e4\uc9d0\uc744 \ud558\uac8c \ub418\ub294 \uc2dc\uac04\uc774\uc5c8\uc2b5\ub2c8\ub2e4!", "reviewer": "comi*****", "date": "2026.02.02"}, {"product": "[FVA \ud53c\ubc14\uc544\uce74\ub370\ubbf8 \uc601\uc0c1 \uae30\ud68d \ud559\uc6d0] \uc624\ud504\ub77c\uc778 \ud604\uc7a5\uc218\uc5c5 - \uc601\uc0c1 \uae30\ud68d\uacfc \uc5f0\ucd9c \uc774\ub860", "type": "\uc77c\ubc18", "rating": 5, "photo": "https://phinf.pstatic.net/image.nmv/shopnbuyer_2026_02_02_3997/C7JUI9jeS1_03.jpg", "content": "\uc2e4\ubb34\uc5d0 \ud544\uc694\ud55c \uc774\ub860\uacfc \ud604\uc7a5(\uc2e4\ubb34) \uac10\uac01\uc744 \uc775\ud790 \uc218 \uc788\ub294 \uc2dc\uac04\uc740, \ubd84\uc57c\ub97c \ub9c9\ub860\ud558\uace0 \uc815\ub9d0 \uc5bb\uae30 \ud798\ub4ed\ub2c8\ub2e4. \ud558\uc9c0\ub9cc \ubaa8\ub4e0 \uacf3\uc5d0\uc11c \uadf8\ub7ec\ud55c \uacbd\ud5d8\uc744 \uc694\ud55c\ub2e4\ub294 \uac83\uc774 \ud604\uc2e4\uc785\ub2c8\ub2e4(\uacbd\ub825 \uc788\ub294 \uc2e0\uc785).\n\n\uad50\uc721 \uacfc\uc815\uc744 eckout.phinf/20260202_145/1769961284860CgYFP_JPEG/IMG_0314.jpeg", "content": "\uc601\uc0c1\uc758 \uc601\uc790\ub3c4 \ubab0\ub790\ub358 \uc81c\uac00 \uc774\uc81c\ub294 \ub2e4\uc74c \uc2a4\ud15d\uc73c\ub85c \ub098\uc544\uac08 \uc900\ube44\uac00 \ub41c \uac83 \uac19\uc2b5\ub2c8\ub2e4. \ud53c\ubc14 \uc544\uce74\ub370\ubbf8\ub97c \ud1b5\ud574 \uae30\ud68d \uc5f0\ucd9c \ubbf8\uc220 \uc870\uba85 \ucd2c\uc601 \uc81c\uc791\uae4c\uc9c0 \uc601\uc0c1\uc778\uc774\ub77c\uba74 \ub204\uad6c\ub098 \ub2f9\uc5f0\ud788 \uc54c\uc544\uc57c \ud560 \uc9c0\uc2dd\ub4e4, \ud2b9\ud788 \uc601\uc0c1\uc740 \ucd2c\uc601\uacfc \ud3b8\uc9d1\uc774 \uc804\ubd80\ub77c\ub294 \uc800\uc758 \uc5b4\ub9ac\uc11d\uc740 \uc0ac\uace0 \ubc29\uc2dd\uc744 \uc81c\ub300\ub85c \uae68\ubc84\ub9b4 \uc218 \uc788\ub294 \uae30\ud68c\ub4e4\uc774\uc5c8\uc2b5\ub2c8\ub2e4. \n\ubaa8\ub974\ub294\uac8c \uc788\uac70\ub098 \ud53c\ub4dc\ubc31 \ubc1b\uace0 \uc2f6\uc740\uac8c \uc788\uc73c\uba74 \uac10\ub3c5\ub2d8\uaed8\uc11c \uc5b8\uc81c \uc5b4\ub514\uc11c\ub4e0 \uc218\ub2e8\uacfc \ubc29\ubc95\uc744 \uac00\ub9ac\uc9c0 \uc54a\uace0 \uc790\uae30 \uc77c\ucc98\ub7fc \uc5f4\uc815\uc801\uc73c\ub85c \uc54c\ub824\uc8fc\uc2dc\uace0 \uc218\uc5c5 \uc790\uccb4\ub97c \ub208\ub192\uc774\uc5d0 \ub9de\ucdb0\uc11c \uc7ac\ubbf8\uc788\uac8c \uc124\uba85\ud574\uc8fc\uc154\uc11c \uc9c0\ub8e8\ud558\ub2e4\ub294 \ub290\ub08c\uc740 \ub4e4 \ud2c8\uc774 \uc5c6\uc2b5\ub2c8\ub2e4. \n\ub9ce\uc740 \uae30\uc218\uc758 \uc0ac\ub78c\ub4e4\uc758 \uc791\ud488\uc744 \ucc38\uc5ec\ud568\uc73c\ub85c\uc368 \ud604\uc7a5 \uacbd\ud5d8\uc744 \uc313\uc744 \uc218 \uc788\ub2e4\ub294 \uac83\uacfc \uadf8 \uacbd\ud5d8\ub4e4\uc744 \ud1b5\ud574\uc11c \ub0b4\uac00 \uc5b4\ub5a4 \ubd80\ubd84\uc5d0 \ud2b9\ud654\ub418\uc5b4 \uc788\uace0 \uc5b4\ub5a4 \ubd80\ubd84\uc744 \ubcf4\uc644\ud574\uc57c \ud560\uc9c0 \uc54c\uc544\ub0bc \uc218 \uc788\ub2e4\ub294 \uac83 \ub610\ud55c \ub108\ubb34\ub098 \ud070 \uc7a5\uc810\uc73c\ub85c \uc5ec\uaca8\uc84c\uc2b5\ub2c8\ub2e4.\n\ub098\ub294 \uc601\uc0c1 \uc5b4\ub \ud788 \ub3c8 \uac12 \ud569\ub2c8\ub2e4.", "reviewer": "l_****", "date": "2026.02.02"}, {"product": "[FVA \ud53c\ubc14\uc544\uce74\ub370\ubbf8] 14\uae30 \uc624\ud504\ub77c\uc778 \ud604\uc7a5\uc218\uc5c5 - \uc601\uc0c1 \uae30\ud68d\uacfc \uc5f0\ucd9c \uc774\ub860", "type": "\ud55c\ub2ec\uc0ac\uc6a9", "rating": 5, "photo": "https://phinf.pstatic.net/checkout.phinf/20260201_79/17699550006679i0NE_JPEG/IMG_7244.jpeg", "content": "\uc601\uc0c1 \ub3c4\uba54\uc778\uc5d0 \ucc98\uc74c \uc785\ubb38\ud558\ub294 \uc0ac\ub78c\uc5d0\uac8c \ucd94\ucc9c\ud569\ub2c8\ub2e4!\n\ud504\ub9ac\ud504\ub85c\ub355\uc158\ubd80\ud130 \ud504\ub85c\ub355\uc158\uae4c\uc9c0, \ubbf8\uc220/\uc81c\uc791/\uc5f0\ucd9c/\ucd2c\uc601&bull;\uc870\uba85 \ub4f1 \ub2e4\uc591\ud55c \ud3ec\uc9c0\uc158\uc744 \uc811\ud560 \uc218 \uc788\uae30\uc5d0 \uc720\uc77c \uc885\ud569 \uc544\uce74\ub370\ubbf8\ub77c\uace0 \ud558\ub294 \uac83 \uac19\uc2b5\ub2c8\ub2e4. \ucd2c\uc601\uc7a5\uc740 \ub098\uac00\uc11c \uacbd\ud5d8\ud574\ubcf4\ub294\ub9cc\ud07c \uc775\uc219\ud574\uc9c0\uace0 \ub610 \ub2e4\ub978 \uae30\ud68c\uac00 \uc5f4\ub9ac\uae30 \ub54c\ubb38\uc5d0 \uacbd\ud5d8\uc774 \uc5c6\uc744\uc218\ub85d \uc6b0\uc120 \uc544\uce74\ub370\ubbf8\ubd80\ud130 \ub098\uc624\uc2dc\ub294 \uac78 \ucd94\ucc9c\ub4dc\ub9bd\ub2c8\ub2e4 ! \uc88b\uc740 \uc0ac\ub78c\ub4e4\uacfc \ud568\uaed8\ud558\uba70 \uc790\uadf9\uc744 \ub9ce\uc774 \ub9ce\uc774 \uc5bb\uc744 \uc218 \uc788\uc5b4\uc11c \uc6b0\uc120 \ud55c \ubc88 \uc624\uc2dc\uba74 \uc601\uc0c1\uc77c\uc744 \uba48\ucd9c \uc218 \uc5c6\uc2b5\ub2c8\ub2e4,,", "reviewer": "lees********", "date": "2026.02.01"}, {"product": "[FVA \ud53c\ubc14\uc544\uce74\ub370\ubbf8 \uc601\uc0c1 \uae30\ud68d \ud559\uc6d0] \uc624\ud504\ub77c\uc778 \ud604\uc7a5\uc218\uc5c5 - \uc601\uc0c1 \uae30\ud68d\uacfc \uc5f0\ucd9c \uc774\ub860", "type": "\uc77c\ubc18", "rating": 5, "photo": "https://phinf.pstatic.net/checkout.phinf/20260201_245/17699540832036aPUL_JPEG/IMG_3676.jpeg", "content": "\ubbf8\ub514\uc5b4 \uc804\uacf5\uc790\uc774\uc9c0\ub9cc \ub300\ud559\uc5d0\uc11c\ub294 \ubc30\uc6b0\uc9c0 \ubabb\ud55c \uc2e4\ubb34 \uc5f0\ucd9c \uc5ed\ub7c9\uc5d0 \ub300\ud55c \uace0\ubbfc\uc744 \ud574\uacb0\ud558\uace0\uc790 \ud53c\ubc14 \uc544\uce74\ub370\ubbf8\ub97c \uc120\ud0dd\ud588\uc2b5\ub2c8\ub2e4. \ud604\uc7ac 2\uac1c\uc6d4 \ucc28 \uacfc\uc815\uc744 \ubc1f\uc73c\uba70 \ub290\ub080 \ud53c\ubc14\ub9cc\uc758 \ucc28\ubcc4\uc810 \uc138 \uac00\uc9c0\ub97c \uacf5\uc720\ud569\ub2c8\ub2e4.\n\n1. \uc2e4\ubb34 \uc911\uc2ec\uc758 \uae30\ud68d \ubc0f \uc5f0\ucd9c \uad50\uc721 : \ub2e4\ub978 \ud559\uc6d0\ucc98\ub7fc \ub2e8\uc21c \uc554\uae30\uc2dd \uc774\ub860\uc774 \uc544\ub2cc, \uc2e4\uc81c \ud604\uc7a5\uc5d0\uc11c \uc801\uc6a9 \uac00\ub2a5\ud55c \uae30\ud68d \ub178\ud558\uc6b0\uc640 \uc5f0\ucd9c\ubc95\uc744 \uc54c\ub824\uc8fc\uc2ed\ub2c8\ub2e4. \ub300\ud559 \uad50\uc721 \uacfc\uc815\uc5d0\uc11c \uc811\ud558\uae30 \ud798\ub4e0 \uac10\ub3c5\ub2d8\uc758 \uc2e4\ubb34\uc801 \uc778\uc0ac\uc774\ud2b8\ub97c \ud1b5\ud574 \uc601\uc0c1 \uae30\ud68d\uc758 \ubcf8\uc9c8\uc744 \uccab\ub2ec\ubd80\ud130 \ubc30\uc6b8 \uc218 \uc788\uace0, \ud2b9\ud788 \uac10\ub3c5\ub2d8\uaed8\uc11c \ud604\uc7a5 \uc598\uae30\ub97c \ub9ce\uc774 \ud574\uc8fc\uc154\uc11c \uc88b\uc544\uc694!\n\n2. \ucd2c\uc601\uc870\uba85 \uc6cc\ud06c\uc0f5 : 2\uac1c\uc6d4\ucc28\uc5d0 \uc811\uc5b4\ub4e4\uba74, \ucd2c\uc601\uc870\uba85 \uc6cc\ud06c\uc0f5\uc744 \ud1b5\ud574 \ud559\uc0dd \uc2e0\ubd84\uc73c\ub85c\ub294 \uc811\ud558\uae30 \uc5b4\ub824\uc6b4 \ud558\uc774\uc5d4\ub4dc \uc7a5\ube44\ub4e4\uc744 \uacbd\ud5d8\ud560 \uc218 \uc788\uc2b5\ub2c8\ub2e4. \uc2e4\uc81c \ud604\uc7a5\uc5d0\uc11c\uc758 \ubbf8\uc220, \uc870\uba85, \uce74\uba54\ub77c \uc138\ud305\uacfc \ucd2c\uc601 \uc6cc\ud06c\ud50c\ub85c\uc6b0\ub97c \uc601\uc0c1 \uc785\ubb38 \ud55c\ub2ec\ub9cc\uc5d0 \uccb4\ud5d8\ud574\ubcf4\ub294 \uacbd\ud5d8\uc740 \ub2e4\ub978 \uacf3\uc5d0\uc11c\ub294 \uacbd\ud5d8\ud574\ubcfc \uc218 \uc5c6\ub294 \uac12\uc9c4 \uacbd\ud5d8\uc774\ub77c\uace0 \uc0dd\uac01\ud569\ub2c8\ub2e4.\n\n3. \uc120\ubc30\uae30\uc218\uc640\uc758 \ub124\ud2b8\uc6cc\ud0b9: \ud53c\ubc14 \uc544\uce74\ub370\ubbf8\ub294 \uc218\uac15\uc0dd\uacfc \uc218\ub8cc\uc0dd \uac04\uc758 \ub124\ud2b8\uc6cc\ud06c\uac00 \ub9e4\uc6b0 \ud65c\ubc1c\ud569\ub2c8\ub2e4. \uc2e4\uc81c \uc791\ud488 \uc81c\uc791\uc5d0 \ucc38\uc5ec\ud560 \uc218 \uc788\ub294 \uc778\uc801 \uc778\ud504\ub77c\uac00 \uad6c\ucd95\ub418\uc5b4 \uc788\uace0, \ud604\uc9c1 \uc120\ubc30\ub4e4\uc758 \ud504\ub85c\uc81d\ud2b8\uc5d0 \ucc38\uc5ec\ud574 \uc2e4\ubb34 \ubcf4\uc870 \uacbd\ud5d8\uc744 \uc313\uc744 \uae30\ud68c\uac00 \ud48d\ubd80\ud569\ub2c8\ub2e4. \uc601\uc0c1\uc5c5\uacc4\uc5d0\uc120 \uc778\ub9e5\uc774 \uc911\uc694\ud55c\ub370, \ucd08\ubcf4\uc790\uc5d0\uac8c\ub3c4 \uc5ec\ub7ec \uae30\ud68c\ub97c \uac00\uc9c8 \uc218 \uc788\ub294 \uc7a5\uc744 \ub9ce\uc774 \ub9cc\ub4e4\uc5b4\uc8fc\uc2dc\ub294 \uac83 \uc790\uccb4 \ud558\ub098\ub9cc\uc73c\ub85c\ub3c4 \ud53c\ubc14\ub97c \ub4e3\uc9c0 \uc54a\uc744 \uc774\uc720\uac00 \uc5c6\ub294 \uac83 \uac19\uc2b5\ub2c8\ub2e4. \ub610 \ub355\uc158\uc5d0\uc11c \uc774\ubbf8 \uc77c\ud558\uace0 \uacc4\uc2e0 \uc120\ubc30\ub2d8\ub4e4\uc774 \ucd2c\uc601 \ubcf4\uc870\ub97c \uad6c\ud558\uc2dc\uae30 \ub54c\ubb38\uc5d0 \ud559\uc0dd\uc791\ubfd0\ub9cc \uc544\ub2c8\ub77c \ub300\ud615 \ud504\uc81d\uc5d0\ub3c4 \ub4e4\uc5b4\uac08 \uc218 \uc788\ub294 \uae30\ud68c\ub97c \uc5bb\uc744 \uc218 \uc788\ub294 \uac83 \uac19\uc2b5\ub2c8\ub2e4.\n\n\ub9c8\uc9c0\ub9c9\uc73c\ub85c \uc5f4\uc815 \ub118\uce58\ub294 \ubd84\uc704\uae30, \uc791\ud488\uc744 \ud558\ub098 \uc774\uc0c1 \uc791\uc5c5\ud560 \uc218 \uc788\ub2e4\ub294 \ubd84\uc704\uae30\uac00 \ud615\uc131\ub418\uc5b4 \uc788\uc5b4\uc11c \ub369\ub2ec\uc544 \uc131\uc2e4\ud574\uc9c0\ub294 \uac83\uc774 \ud53c\ubc14\uc758 \ucd5c\ub300 \uc7a5\uc810\uac19\uc2b5\ub2c8\ub2e4. \ub2e4\ub4e4 \ud53c\ubc14\ud558\uc138\uc694!", "reviewer": "sayy****", "date": "2026.02.01"}, {"product": "\uc624\ud504\ub77c\uc778 \ud604\uc7a5\uc218\uc5c5 - \ud3ec\ud2b8\ud3f4\ub9ac\uc624 \uc6cc\ud06c\uc0f5", "type": "\uc77c\ubc18", "rating": 5, "photo": "", "content": "\uc800\ub294 \uc601\uc0c1\uc744 \uc5c5\uc73c\ub85c \uc0bc\uace0\uc790 \uc601\uc0c1\uc744 \uc81c\uc791\ud558\uae30\ub3c4 \ud558\uace0, \uc601\uc0c1 \uc791\uc5c5\uc5d0 \ucc38\uc5ec\ud558\uba70 \uc774\uac83\uc800\uac83 \ud574\uc654\uc2b5\ub2c8\ub2e4. \ud558\uc9c0\ub9cc \ube44\uc804\uacf5\uc790\ub85c\uc11c \uc81c\ub300\ub85c \ub41c \uc601\uc0c1 \ud3ec\ud2b8\ud3f4\ub9ac\uc624\uc640 \uc5c5\uacc4 \uc9c0\uc778\ub4e4\uc744 \ub9cc\ub4e4\uae30 \uc5b4\ub824\uc6e0\uace0, \uadf8\ub7f0 \ubd80\ubd84\ub4e4 \ud56d\uc0c1 \uace0\ubbfc\uc774\uc5c8\ub358 \uac83 \uac19\uc2b5\ub2c8\ub2e4. \uadf8\ub7ac\ub358 \uc800\uc5d0\uac8c \ud53c\ubc14 \uc544\uce74\ub370\ubbf8\ub294 \ud55c \uc904\uae30 \ube5b\uc774\uc5c8\uc2b5\ub2c8\ub2e4! \ud504\ub85c\ub355\uc158\uacfc \uae30\ud68d\uc744 \uc81c\ub300\ub85c \ub2e4\uc2dc \ucc28\uadfc\ucc28\uadfc \ubc30\uc6cc\ub098\uac00\uace0, \uc81c\uac00 \ub9cc\ub4e0 \uae30\ud68d\uc548\uc758 \uc5b4\ub5a4 \uc9c0\uc810\ub4e4\uc774 \ubcf4\uc644\ub418\uc5b4\uc57c \ud558\ub294\uc9c0 \ud53c\ub4dc\ubc31\uc744 \uaf3c\uaf3c\ud788 \ud574\uc8fc\uc168\uc2b5\ub2c8\ub2e4. \uc774\uc804\uc5d0 \ud504\ub9ac \ud504\ub85c\ub355\uc158\uc744 \ub2e8\uc21c \uc900\ube44 \uacfc\uc815\uc73c\ub85c\ub9cc \uc595\ubd24\ub358 \uc81c \uc790\uc2e0\uc774 \uc880 \ubd80\ub044\ub7fd\uac8c \ub290\uaef4\uc9c0\uae30\ub3c4 \ud55c \uc21c\uac04\uc774\uc5c8\uc2b5\ub2c8\ub2e4. \ud655\uc2e4\ud55c \uadf8\ub9bc\uacfc \uc601\uc0c1\uc744 \ub9cc\ub4e4\uc5b4\ub0b4\uae30 \uc704\ud55c \uce58\ubc00\ud568\uc744 \ubc30\uc6b8 \uc218 \uc788\ub358 \uc218\uc5c5\uc774\uc5c8\ub358 \uac83 \uac19\uc2b5\ub2c8\ub2e4. \n\n\uadf8\ub9ac\uace0 \ud53c\ubc14 \uc544\uce74\ub370\ubbf8\uc758 \ub610 \ub2e4\ub978 \uc7a5\uc810\uc740 \uc5c5\uacc4 \uc9c0\uc778\uc744 \ub9cc\ub0a0 \uc218 \uc788\ub294 \uc6cc\ud06c\uc0f5\uacfc \ub124\ud2b8\uc6cc\ud0b9 \uc790\ub9ac\ub3c4 \ub9c8\ub828\ud574\uc900\ub2e4\ub294 \uc810\uc778\ub370\uc694! \ub124\ud2b8\uc6cc\ud0b9\uc744 \ud1b5\ud558 \ub2e4\ub978 \uae30\uc218 \ubd84\ub4e4\uc758 \uc791\ud488\ub4e4\uc744 \ubcf4\uba70 \uc790\uadf9\ub3c4 \ub418\uace0, \ud568\uaed8 \uc88b\uc740 \uc791\ud488\uc744 \ub9cc\ub4e4\uace0 \uc2f6\ub2e4\ub294 \uc0dd\uac01\uc774 \uc808\ub85c \ub4e4\uc5c8\uc2b5\ub2c8\ub2e4. \uc601\uc0c1\uc744 \uc0ac\ub791\ud558\ub294 \uc0ac\ub78c\ub4e4\uacfc \uc774\uc57c\uae30\ub97c \ub098\ub204\ub294 \uc2dc\uac04\uc744 \uac00\uc9c4\ub2e4\ub294 \uac83\ub9cc\uc73c\ub85c\ub3c4 \uc990\uac81\uace0 \uc720\uc775\ud588\ub358 \uc6cc\ud06c\uc0f5\uc774\uc5c8\uc2b5\ub2c8\ub2e4! \ub610\ud55c \ucd2c\uc601 \uc6cc\ud06c\uc0f5\uc744 \ud1b5\ud574 \uace0\uac00\uc758 \uc544\ub9ac\uc54c\ub809\uc0ac, \uc544\ub098\ubaa8\ud53d \ub80c\uc988 \ub4f1\uc758 \uc7a5\ube44\ub97c \uac00\uae4c\uc774\uc11c \ubcfc \uc218 \uc788\uc5c8\uc2b5\ub2c8\ub2e4. \ucd2c\uc601\uae4c\uc9c0 \uc774\ub8e8\uc5b4\uc9c0\ub294 \uc138\ud305 \uacfc\uc815\ub3c4 \ubcf4\uba74\uc11c \ud558\ub098\uc758 \uc7a5\uba74\uc774 \ub9cc\ub4e4\uc5b4\uc9c0\uae30 \uc704\ud574 \uc218\ub9ce\uc740 \uace0\ubbfc\uacfc \uacfc\uc815\ub4e4\uc774 \uc788\ub2e4\ub294 \uc9c0\uc810\ub3c4 \ub9e4\ub825\uc801\uc774\uc5c8\uc2b5\ub2c8\ub2e4! \n\n\ud53c\ubc14 \uc544\uce74\ub370\ubbf8\uc5d0 \ub4e4\uc5b4\uc628 \uc774\uc0c1 \uc55e\uc73c\ub85c \uc88b\uc740 \uacb0\uacfc\uc640 \uc88b\uc740 \uc0ac\ub78c\ub4e4\uc744 \ub9cc\ub0a0 \uc218 \uc788\uc73c\ub9ac\ub77c\ub294 \uae30\ub300\uac10\uc774 \uc193\uad6c\uce58\ub294\ub370\uc694.. \ube44\uc804\uacf5\uc790 \ubd84\ub4e4\ub3c4 \ub9ce\uc740 \uacbd\ud5d8 \uc313\uc544\uac00\uc2e4 \uc218 \uc788\ub294 \uc88b\uc740 \uae30\ud68c\uc640 \uc218\uc5c5\uc774\ub77c\uace0 \uc0dd\uac01\ud558\uba70 \uac15\ucd94\ub4dc\ub9bd\ub2c8\ub2e4!!", "reviewer": "nika****", "date": "2026-02-02"}, {"product": "[FVA \ud53c\ubc14\uc544\uce74\ub370\ubbf8 \uc601\uc0c1\uae30\ud68d,\uc601\uc0c1\ud559\uc6d0] 14\uae30 \uc624\ud504\ub77c\uc778 \ud604\uc7a5\uc218\uc5c5 - \ud3ec\ud2b8\ud3f4\ub9ac\uc624 \uc6cc\ud06c\uc0f5", "type": "\ud55c\ub2ec\uc0ac\uc6a9", "rating": 5, "photo": "", "content": "\ud3ec\uc2a4\ud2b8\ub355\uc158\uc5d0\uc11c \uc624\ub798 \uc77c\ud558\ub2e4 \ud1f4\uc0ac\ud6c4 14\uae30\uc5d0\uc11c \ud55c\ub2ec \uc218\uc5c5\uc744 \ub4e3\ub294 \uc911\uc774\uc5d0\uc694. \ub2e4\ub978 \uae30\uc218\uc758 \uae30\ud68d \ud604\uc7a5\uc5d0 \uc5f0\uacb0\ud574\uc8fc\uc2ed\ub2c8\ub2e4. \uc2e4\uc81c \uc5c5\ubb34 \ud604\uc7a5\uc5d0\ub3c4 \ub2e4\ub2c8\ub294\ub370 \ud55c\uc8fc\ud55c\uc8fc \uc218\uc5c5 \ub0b4\uc6a9\uc774 \uc77c\uc744 \ud558\ub294\ub370\uc5d0 \ubd84\uba85 \uc2e4\uc9c8\uc801\uc778 \ub3c4\uc6c0\uc774 \ub429\ub2c8\ub2e4. \ud504\ub86d/\uc544\ud2b8 \uc9c0\ub9dd\uc778\ub370 \uac10\ub3c5\ub2d8\uc774 \uc544\ud2b8\ub85c \uc77c\uc744 \uc624\ub798 \ud558\uc154\uc11c \uadf8 \ubd80\ubd84\ub3c4 \ub3c4\uc6c0\uc774 \ub9ce\uc774 \ub418\ub294 \uac83 \uac19\uc2b5\ub2c8\ub2e4. \uac1c\uac15 \ud140\uc774 \ub108\ubb34 \uc9e7\uc544\uc11c \uc218\uc5c5\uc774 \ubcc4\ub85c\uc77c\uae4c \uace0\ubbfc\ud588\uc5c8\ub294\ub370 \ud559\uc6d0\uc0dd\uc774 \ub9ce\uc73c\ub2c8 \ub2e4\uc591\ud55c \uae30\ud68d\ub4e4\uc744 \ub9ce\uc774 \ub9cc\ub0a0 \uc218 \uc788\uc5b4\uc11c \uc624\ud788\ub824 \uc7a5\uc810\uc73c\ub85c \uc791\uc6a9\ud558\ub294 \uac83 \uac19\uc544\uc694. \ube60\ub974\uac8c \ud504\ub9ac\ud504\ub85c\ub355\uc158\uc73c\ub85c \ubc1c\uc744 \ub4e4\uc774\uace0 \uc2f6\uc740 \ubd84\ub4e4\uaed8 \ucd94\ucc9c\ud569\ub2c8\ub2e4!", "reviewer": "b2****", "date": "2025.12.25"}, {"product": "[FVA \ud53c\ubc14\uc544\uce74\ub370\ubbf8 \uc601\uc0c1\uae30\ud68d,\uc601\uc0c1\ud559\uc6d0] 14\uae30 \uc624\ud504\ub77c\uc778 \ud604\uc7a5\uc218\uc5c5 - \ud3ec\ud2b8\ud3f4\ub9ac\uc624 \uc6cc\ud06c\uc0f5", "type": "\ud55c\ub2ec\uc0ac\uc6a9", "rating": 5, "photo": "", "content": "14\uac00\ub85c \uc218\uc5c5\uc744 \ub4e3\uace0 \uc788\uc2b5\ub2c8\ub2e4. \uc808\ub300 \uc544\uae5d\uc9c0 \uc54a\uc740 \ub3c8\uc785\ub2c8\ub2e4. \uc544\ubb34\ub370\uc11c\ub098 \ub4e4\uc744 \uc218 \uc5c6\ub294 \ud604\uc7a5\uc774\uc57c\uae30\ub97c \ub4e4\ub824\uc8fc\uc2dc\uace0, \uc9c8\ubb38\uc774\ub098 \uc0c1\ub2f4\ub3c4 \uc5b8\uc81c\ub4e0\uc9c0 \uce5c\uc808\ud558\uac8c \ubc1b\uc544\uc8fc\uc154\uc11c \ub108\ubb34 \ub3c4\uc6c0\uc774 \ub9ce\uc774 \ub418\uace0\uc788\uc2b5\ub2c8\ub2e4. \ud559\uc6d0\uc5d0 \uc624\uace0 \uc9c4\uc9dc \uc601\uc0c1\uc774 \ubb54\uc9c0 \uc54c\uac8c\ub418\uc5c8\uc2b5\ub2c8\ub2e4. \uc801\uc131\uc5d0 \ub9de\ub294\uc9c0 \ud310\ub2e8\ud560 \uc218 \uc788\uc5c8\uace0, \ud604\uc7ac\ub294 \uac10\ub3c5\ub2d8 \ub355\ubd84\uc5d0 \uc790\uc2e0\uac10\uc744 \uac00\uc9c0\uace0 \uc5f0\ucd9c\ub3c4 \ub3c4\uc804\ud558\uace0 \uc788\uc2b5\ub2c8\ub2e4.\n\uac10\ub3c5\ub2d8\uaed8 \ubc30\uc6b8 \uc218 \uc788\ub2e4\ub294 \uc810 \uc678\uc5d0\ub3c4, \uc601\uc0c1 \ud558\ub294 \uc0ac\ub78c\ub4e4\uacfc \ub9cc\ub098 \uc778\uc5f0\uc744 \uac00\uc9c4\ub2e4\ub294\uac8c \uc815\ub9d0 \ud070 \uc7a5\uc810\uc774\ub77c\uace0 \uc0dd\uac01\ud569\ub2c8\ub2e4. \uc601\uc0c1\uc740 \ud63c\uc790\ud560 \uc218 \uc5c6\uc2b5\ub2c8\ub2e4. \uadf8\ub807\uae30\uc5d0 \uc2dc\uc791\uc774 \uc5b4\ub835\uc9c0\ub9cc, \ud53c\ubc14\uc544\uce74\ub370\ubbf8\uc5d0\uc11c\ub294 \uac00\ub2a5\ud588\uae30\uc5d0 \ub108\ubb34 \uc88b\uc558\uc2b5\ub2c8\ub2e4!!", "reviewer": "dlsq********", "date": "2025.12.25"}, {"product": "FVA \ud53c\ubc14\uc544\uce74\ub370\ubbf8", "type": "\ud55c\ub2ec\uc0ac\uc6a9", "rating": 5, "photo": "https://phinf.pstatic.net/checkout.phinf/20251222_276/1766333208610gxEcA_JPEG/1000114758.jpg", "content": "\ub9c8\uc74c \uc18d \ubb35\ud600 \ub450\uc5c8\ub358 \uc0c1\uc0c1\uc758 \uafc8\uc744 \ub2e8\uae30\uac04\uc5d0 \uc2e4\ud604\uc2dc\ud0ac\uc218 \uc788\ub294 \uacf3!\n\n\uc601\uc0c1 \ube44\uc804\uacf5\uc790 or \uc601\uc0c1 \uc5c5\uacc4 \uc885\uc0ac\ud558\uc2dc\ub294 \ubd84\ub4e4\ub3c4\n\ubbf8\ucc98 \uc54c\uc9c0 \ubabb\ud588\ub358 \uc138\uc138\ud55c \ub514\ud14c\uc77c\ubd80\ud130 \uc2dc\uc791\ud574,\n\n\u2714\ufe0f\uae30\ud68d\uc758 \ud0c4\ud0c4\ud55c \uae30\ucd08\n\u2714\ufe0f\ud604\uc7a5\uc5d0\uc11c \uccb4\ud06c\ud574\uc57c \ud560 \ud544\uc218 \ud56d\ubaa9\ub4e4\n\u2714\ufe0f\uc7a5\uc18c&amp;\ubaa8\ub378 \uc120\uc815 \uae30\uc900 \ub4f1\n\n\uac10\ub3c5\ub2d8\uc758 \uacbd\ud5d8\uc5d0\uc11c \ub098\uc628 \ub178\ud558\uc6b0\ub4e4\uc744 \uc544\ub08c\uc5c6\uc774 \uc218\uac15\uc0dd \ubd84\ub4e4\uc5d0\uac8c \uc3df\uc544 \ubd80\uc5b4 \uc8fc\uc2ed\ub2c8\ub2e4!\n\n\ucee4\ubba4\ub2c8\ud2f0 \ud30c\ud2f0\ub97c \ud1b5\ud574 \uacf5\ud1b5 \uad00\uc2ec\uc0ac\uc758 \uc0ac\ub78c\ub4e4\uacfc \uc9c1\uc811 \uc18c\ud1b5\ud558\uace0 \uad50\ub958\ud558\uba70, \uac01\uc885 \uacf5\ubaa8\uc804\uc5d0\ub3c4 \ud568\uaed8 \ucc38\uc5ec\ud560 \uc218 \uc788\ub294 \uae30\ud68c!\n\uaf2d \uc7a1\uc544 \uac00\uc168\uc73c\uba74 \uc88b\uaca0\uc5b4\uc694\u263a\ufe0f\n\n\ud004\ub9ac\ud2f0 \uc88b\uc740 \uc601\uc0c1\uc744 \ub9cc\ub4e4\uba70 \uc131\uc7a5\ud558\uace0 \uc2f6\uc73c\uc2e0 \ubd84! \n\uc800\ucc98\ub7fc \uc5b4\ub514\uc11c\ubd80\ud130 \uc5b4\ub5bb\uac8c \uc2dc\uc791\ud574\uc57c \ud560\uc9c0 \ub9c9\ub9c9\ud558\uc2e0 \ubd84!\n\ud53c\ubc14\uc544\uce74\ub370\ubbf8 \uc801\uadf9 \ucd94\ucc9c \ub4dc\ub9bd\ub2c8\ub2e4\ud83d\udd25", "reviewer": "zlxl*******", "date": "2025.12.22"}, {"product": "[FVA \ud53c\ubc14\uc544\uce74\ub370\ubbf8 \uc601\uc0c1 \uae30\ud68d \ud559\uc6d0] \uc624\ud504\ub77c\uc778 \ud604\uc7a5\uc218\uc5c5 - \uc601\uc0c1 \uae30\ud68d\uacfc \uc5f0\ucd9c \uc774\ub860", "type": "\uc77c\ubc18", "rating": 5, "photo": "https://phinf.pstatic.net/checkout.phinf/20251221_277/17663164183336acjw_JPEG/54509.jpg", "content": "\uc0ac\uc9c4\uc744 \ub9ce\uc774 \uc548 \ucc0d\uc5b4\ub46c\uc11c \uc774\uac83 \ubc16\uc5d0 \uc5c6\ub124\uc694\u3160\u3160\n\n\uc77c\ub2e8 \uc800\ub294 \ub4f1\ub85d \uc804 \uace0\ubbfc\uc744 \ub9ce\uc774 \ud588\ub358 \uc0ac\ub78c\uc785\ub2c8\ub2e4. \uc624\ud508\ucc44\ud305\ubc29 \ubb38\uc758\ub85c \uc9c8\ubb38\uc744 \uadc0\ucc2e\uac8c \uc5ec\ub7ec \ubc88 \ud588\uc5c8\ub294\ub370 \ub2e4 \uce5c\uc808\ud558\uac8c \ub2f5\ud574\uc8fc\uc168\uc5b4\uc694. \uacb0\uad6d 2\uac1c\uc6d4 \uc218\uac15\uad8c \ub04a\uace0 \uc218\uc5c5 \ud55c \ub2ec \ucc28 \uc9c0\ub098\uc11c \ud55c \ub2ec \ub354 \ub04a\uc5c8\uc5b4\uc694. \uace0\ubbfc \ub05d\uc5d0 \uc218\uac15 \ub4f1\ub85d\ud55c \uac70 \uc815\ub9d0 \ud6c4\ud68c \uc548 \ud569\ub2c8\ub2e4.\n\n\uc870\uae08 \ube44\uc300\uc9c0 \ubab0\ub77c\ub3c4 \uac01\uc790 \uadf8 \uc774\uc0c1\uc758 \uac12\uc5b4\uce58\ub97c \uac00\uc838\uac08 \uc218 \uc788\ub2e4\uace0 \uc0dd\uac01\ud574\uc694. \uc800\ub294 \ud2b9\ud788\ub098 \uac19\uc740 \uc5f4\uc815\uc744 \uac00\uc9c4 \uc0ac\ub78c\ub4e4\uc744 \ub9cc\ub098\uc11c \uc778\uc744 \uc774\uc5b4\uac08 \uc218 \uc788\ub2e4\ub294 \uac8c \uac00\uc7a5 \ud070 \uba54\ub9ac\ud2b8\uc778 \uac83 \uac19\uc544\uc694. \uac19\uc774 \ud300\uc744 \uc9dc\uc11c \ucd2c\uc601 \ub4e4\uc5b4\uac00\ub294 \uac83\ub3c4, \uc5ec\ub7ec \ub124\ud2b8\uc6cc\ud0b9 \ud30c\ud2f0\uc5d0\uc11c \uc717 \uae30\uc218\uc640 \uc778\uc0ac \ub098\ub204\ub294 \uac83\ub3c4 \uc800\uc5d0\uac8c\ub294 \ub108\ubb34 \uc18c\uc911\ud55c \uc2dc\uac04\uc774\uc5c8\ub358 \uac83 \uac19\uc544\uc694.\n\n\uc218\uc5c5 \ub0b4\uc6a9\ub3c4 \uc804\uacf5\uc5d0\uc11c\ub294 \uc54c\ub824\uc8fc\uc9c0 \uc54a\uc558\ub358 \ub514\ud14c\uc77c\ub4e4\uacfc \ud604\uc7a5\uc5d0\uc11c \ube44\ub86f\ub41c \uc5ec\ub7ec \ud301\ub4e4\uc744 \ubc1b\uc544\uac08 \uc218 \uc788\uc5c8\uc2b5\ub2c8\ub2e4. \uc790\uadf9 \ubc1b\uace0 \uac00\uae30 \uc88b\uc740 \uacf3\uc785\ub2c8\ub2e4. \n\uae30\uc655 \ub4e4\uc5b4\uc628 \uac70 \ubb50\ub4e0 \ud558\uace0 \ubcf4\ub294 \uac8c \uc88b\uc740 \uac83 \uac19\uc2b5\ub2c8\ub2e4.", "reviewer": "asdf****", "date": "2025.12.21"}, {"product": "[FVA \ud53c\ubc14\uc544\uce74\ub370\ubbf8 \uc601\uc0c1 \uae30\ud68d \ud559\uc6d0] \uc624\ud504\ub77c\uc778 \ud604\uc7a5\uc218\uc5c5 - \ube44\uc8fc\uc5bc \ub514\ub809\ud305 \uc6cc\ud06c\uc0f5", "type": "\uc77c\ubc18", "rating": 4, "photo": "", "content": "\uac10\ub3c5\ub2d8\uc774 \uc218\uc5c5\ub3c4 \uc7ac\ubc0c\uace0 \uae30\ud68d \uae30\ucd08\ubd80\ud130 \uc720\uc775\ud558\uac8c \uac00\ub974\uccd0\uc8fc\uc154\uc11c \uc88b\uc558\uc2b5\ub2c8\ub2e4.\n\n\uad00\uc2ec\uc0ac\uac00 \uc77c\uce58\ud558\ub294 \ubd84\ub4e4\ub07c\ub9ac \ud611\uc5c5\ub3c4 \uc790\uc8fc \uc774\ub8e8\uc5b4\uc838\uc11c \uc601\uc0c1\uc778\uc73c\ub85c\uc11c \uc131\uc7a5 \uac00\ub2a5\uc131\ub3c4 \ubb34\uad81\ubb34\uc9c4\ud569\ub2c8\ub2e4.\n\n\ub2e4\ub9cc \uc218\uac15\uc0dd\ub07c\ub9ac \ud611\uc5c5\ud560 \ub54c \uc81c\uc791\ube44 \ubd84\ub2f4\uc5d0 \ub300\ud55c \uac00\uc774\ub4dc\ub77c\uc778\uc774 \uc874\uc7ac\ud558\uc9c0 \uc54a\uace0 \uc628\uc804\ud788 \uc218\uac15\uc0dd\ub4e4\uc758 \ud611\uc0c1 \uc5ed\ub7c9\uc5d0 \ub2ec\ub824 \uc788\uc5b4 \uc774\uc5d0 \uad00\ud55c \uacbd\ud5d8\uc774 \uc5c6\ub2e4\uba74 \uc870\uc2ec\ud574\uc57c\ud560 \uac83\uc73c\ub85c \ubcf4\uc785\ub2c8\ub2e4.", "reviewer": "kiyu**********", "date": "2025.12.18"}, {"product": "FVA \ud53c\ubc14\uc544\uce74\ub370\ubbf8", "type": "\uc77c\ubc18", "rating": 5, "photo": "https://phinf.pstatic.net/checkout.phinf/20251201_238/17645585762831ms2v_JPEG/IMG_4830.jpeg", "content": "\uc815\ub9d0 \ub3c4\uc6c0\uc774 \ub9ce\uc774 \ub429\ub2c8\ub2e4!", "reviewer": "asdd****", "date": "2025.12.01"}, {"product": "FVA \ud53c\ubc14\uc544\uce74\ub370\ubbf8", "type": "\uc77c\ubc18", "rating": 5, "photo": "https://phinf.pstatic.net/checkout.phinf/20251103_74/1762181966686LcDo3_JPEG/IMG_7431.jpeg", "content": "3\uac1c\uc6d4 \ub9cc\uc5d0, 3\ub144 \ud5e4\ub9e4\ub358 \uac8c \ud480\ub838\uc2b5\ub2c8\ub2e4. \uad50\uc721 \ud504\ub85c\uc138\uc2a4, \uc790\uc5f0\uc2a4\ub7ec\uc6b4 \ucee4\ubba4\ub2c8\ud2f0, \uc655\uba4b\uc9c4 \uac10\ub3c5\ub2d8\uae4c\uc9c0.. \uc601\uc0c1\ud558\uace0\ud508 \uc0ac\ub78c\ub4e4\uc758 \ub2c8\uc988 \uc0bc\ubc15\uc790 \ub2e4 \ub9de\ub294 \uc544\uce74\ub370\ubbf8\uc785\ub2c8\ub2e4.\n\n\uc601\uc0c1\uc740 \uc88b\uc544\ud558\ub294\ub370 \ud004\ub9ac\ud2f0\uac00 \uacc4\uc18d \uc81c\uc790\ub9ac\ub77c \uc2a4\uc2a4\ub85c \ub2f5\ub2f5\ud558\ub358 \ud0c0\uc774\ubc0d\uc5d0 \ud53c\ubc14 \uc544\uce74\ub370\ubbf8\ub97c \uc54c\uac8c \ub410\uc5b4\uc694. \uc9c0\uae08 \ub3cc\uc774\ucf1c\ubcf4\uba74, \uc774 \uc120\ud0dd\uc774 \uc81c \uc601\uc0c1 \uc778\uc0dd\uc5d0\uc11c \uc5c4\uccad\ub09c \uc804\ud658\uc810\uc774 \ub41c \uac83 \uac19\uc544\uc694.\n\n\uc601\ud654 \ub3d9\uc544\ub9ac\ubd80\ud130 \uc601\uc0c1 \uacf5\ubaa8\uc804\uae4c\uc9c0 \ud63c\uc790\uc11c \uba87 \ub144 \ub3d9\uc548 \uc774\uac83\uc800\uac83 \ud574\ubcf4\uba70 &lsquo;\uc65c \ub0b4 \uc601\uc0c1\uc740 \ub290\ub08c\uc774 \uad6c\ub9ac\uc9c0?&rsquo; \ud558\uace0 \uace0\ubbfc\ud588\ub294\ub370, \ud53c\ubc14\uc5d0\uc11c \ud575\uc2ec\uc744 \ub2e8\ubc88\uc5d0 \uc7a1\uc558\uc2b5\ub2c8\ub2e4. \uae30\uc220\uc801 \uc811\uadfc\uc774 \uc544\ub2c8\ub77c, \uc601\uc0c1\uc774 \uc65c \uc88b\uac8c \ubcf4\uc774\ub294\uc9c0, \uae30\ud68d\ubd80\ud130 \uc2dc\uc120\uacfc \uac10\uac01\uae4c\uc9c0 &rsquo;\ubcf8\uc9c8&lsquo;\uc744 \uc774\ud574\ud558\uac8c \ud574\uc8fc\ub294 \uc218\uc5c5 \ud504\ub85c\uc138\uc2a4\uc785\ub2c8\ub2e4. \ud655\uc2e4\ud558\uac8c \uc601\uc0c1 \ub54c\uae54\uc774 \ub2ec\ub77c\uc9d1\ub2c8\ub2e4.\n\n\ud2b9\ud788 \ucd2c\uc601/\uc870\uba85 \uc6cc\ud06c\uc20d\uc5d0\uc11c \uace0\uac00 \uc7a5\ube44 \uc9c1\uc811 \ub9cc\uc838\ubcf4\uba74\uc11c \ucd2c\uc601\uac10\uc774 \uc5b4\ub290\uc815\ub3c4 \uc7a1\ud78c \uac83 \uac19\uc544\uc694. \uad6c\ub3c4, \uc0c9\uac10, \uc870\uba85 \ubc29\ud5a5 \ud558\ub098\uc5d0 \ubd84\uc704\uae30\uac00 \uc774\ub807\uac8c \ub2ec\ub77c\uc9c0\ub294\uad6c\ub098&hellip; \uc2e4\uac10\ud588\uc5b4\uc694. \uc608\uc804\uc5d4 \uac10\uc73c\ub85c \ucc0d\uc5c8\ub2e4\uba74 \uc9c0\uae08\uc740 &lsquo;\uc65c \uc774\ub807\uac8c \uc7a1\uc544\uc57c \ud558\ub294\uc9c0&rsquo; \uc774\ud574\ud558\uace0 \ucc0d\uc2b5\ub2c8\ub2e4. \ud63c\uc790\uc11c \ud574\ub9e4\ub358 \uac74 \ub05d! \ud53c\ubc14\uc5d0\uc11c \uc9c4\uc9dc \uc555\ucd95\uc801\uc73c\ub85c \ud575\uc2ec\uc744 \ubc30\uc6e0\uc5b4\uc694.\n\n\ub610, \ucee4\ubba4\ub2c8\ud2f0\uac00 \uc2dc\uc2a4\ud15c\uc774 \ub118 \uc88b\uc544\uc694. \uc601\uc0c1\uc740 \ud63c\uc790 \ud558\ub294\uac8c \uc544\ub2c8\ub77c \ud300 \uad6c\ud560 \ub54c \ub9e8\ub0a0 \ubc1c\ud488 \ud314\uc558\ub294\ub370 \uc5ec\uae30\uc120 \uc218\uc5c5\ub9cc \ub4e3\uace0 \ub05d\uc774 \uc544\ub2c8\ub77c, \uc601\uc0c1\ud558\ub294 \uc0ac\ub78c\ub4e4\ub07c\ub9ac \uc790\uc5f0\uc2a4\ub7fd\uac8c \ud300 \uc9dc\uace0 \uc544\uc774\ub514\uc5b4 \ub098\ub204\uace0 \ucd2c\uc601\ud558\uace0.. \uacf5\ud1b5\ub41c \uad50\uc721\uc744 \ubc1b\uc740 \uc5f4\uc815\uc788\ub294 \uc0ac\ub78c\ub4e4\uacfc \ud568\uaed8 \uc131\uc7a5\ud558\ub294 \ubd84\uc704\uae30\uc5d0\uc694. \n\uc774\ub7f0 \uc0ac\ub78c\ub4e4\uc744 \uc5bb\uc5c8\ub2e4\ub294 \uac83\ub9cc\uc73c\ub85c\ub3c4 \ub108\ubb34 \uac12\uc9c4 \uacbd\ud5d8\uc785\ub2c8\ub2e4. \ucee4\ubba4\ub2c8\ud2f0 \ud30c\ud2f0\ub97c \ube44\ub86f\ud574\uc11c \uc790\uc5f0\uc2a4\ub7fd\uac8c \uc0ac\ub78c\ub4e4\uacfc\uc758 \ucee4\ub125\uc158\uc744 \ub9cc\ub4e4\uc5b4\uc8fc\uc2dc\ub294 \uac10\ub3c5\ub2d8\uc758 \uc138\uc2ec\ud568\uc5d0 \uad49\uc7a5\ud788 \ub180\ub77c\uace0 \uac10\ub3d9\ubc1b\uc558\uc2b5\ub2c8\ub2e4. \uc774\ub7f0 \uc544\uc774\ub514\uc5b4 \uc5b4\ub5bb\uac8c \uc0dd\uac01\ud558\uc2e0\uac74\uc9c0 \uc9c4\uc9dc \uc774\ub9c8\ub97c \ud0c1 \uce58\uace0\uac11\ub2c8\ub2e4.\n\n\ub9c8\uc9c0\ub9c9\uc73c\ub85c \uc815\uc8fc \uac10\ub3c5\ub2d8 \ub118 \uc88b\uc544\uc694. \uc778\uac04\ubbf8 \ucd2c\ucd2c \ub118\uce58\uc2dc\uace0 \uac00\ub054 \ud638\ud1b5(?)\uc744 \uce58\uc2dc\ub294\ub370 \ubb3c\ub860 \uc544\uc8fc \ud569\ub9ac\uc801\uc778 \ud638\ud1b5\uc785\ub2c8\ub2e4..\u314e\u314e \ub204\uad6c\ubcf4\ub2e4 \ud559\uc0dd\ub4e4\uc774 \uc815\ub9d0 \uc798 \ub418\uae38 \ubc14\ub77c\ub294 \ub9c8\uc74c\uc774 \ub9ce\uc774 \ub290\uaef4\uc838\uc694. \ud604\uc5c5\uc5d0 \uacc4\uc2dc\ub294 \uac10\ub3c5\ub2d8\uc774 \uc544\ubb34\uac83\ub3c4 \ubaa8\ub974\ub294 \ube44\uae30\ub108\uc640 \ud559\uc0dd\ub4e4\uc5d0\uac8c \uc2dc\uac04\uacfc \uc815\uc131\uc744 \uc3df\uace0 \uc2e4\uc9c8\uc801 \ub3c4\uc6c0\uc744 \uc8fc\ub294 \uac8c \uc815\ub9d0 \ub300\ub2e8\ud558\uace0 \uac10\uc0ac\ud55c \uac83 \uac19\uc544\uc694. \ubc24\ub0ae\uc5c6\uc774 \uae30\ud68d\uc548 \ubcf4\ub0b4\ub3c4 \uc815\ub9d0 \ube60\ub974\uace0 \uc131\uc2ec\uc131\uc758\uaecf \ud53c\ub4dc\ubc31 \uc8fc\uc2dc\ub294 \uc810 \uc655 \uac10\ub3d9\uc774\uc5c8\uc5b4\uc694. \uc194\uc9c1\ud788 \ucc98\uc74c\uc5d4 \uc0b4\uc9dd \ubb34\uc11c\uc6e0\ub294\ub370, \uc9c0\uae08\uc740 \uadf8\ub0e5 \uce74\uc640\uc774\ud574\ubcf4\uc774\uace0 \ubc30\uc6b8 \uc810 \ub9ce\uc740 \ucc38\ub41c \uba58\ud1a0\ub2d8\uc774\uc138\uc694.\n\n3\uac1c\uc6d4 \ub3d9\uc548\uc758 \uc2dc\uac04, \uc218\uc5c5\ub8cc\ub294 \uc804\ud600 \uc544\uae5d\uc9c0 \uc54a\uc558\uc5b4\uc694. \uc624\ud788\ub824 \ub108\ubb34 \uc798 \uc37c\ub2e4 \uc2f6\uc2b5\ub2c8\ub2e4. \uc601\uc0c1 \uc798\ud558\uace0 \uc2f6\uace0, \uc624\ub7ab\ub3d9\uc548 \uc81c\uc790\ub9ac \ub290\ub08c\uc778 \ubd84\ub4e4, \ube44\uae30\ub108\ubd84\ub4e4 \uc800\ucc98\ub7fc \ud130\ub2dd\ud3ec\uc778\ud2b8 \ub420 \uac70\uc608\uc694. \uc655\ucd94\ud569\ub2c8\ub2e4! \ub4f1\ub85d \uace0\uace0", "reviewer": "heyj********", "date": "2025.11.03"}, {"product": "FVA \ud53c\ubc14\uc544\uce74\ub370\ubbf8", "type": "\ud55c\ub2ec\uc0ac\uc6a9", "rating": 5, "photo": "https://phinf.pstatic.net/checkout.phinf/20251103_27/1762181133480Ched0_JPEG/IMG_0706.jpeg", "content": "\uc800\ub294 \uc601\ud654 \uc804\uacf5\ud558\uace0 \uc788\ub294 \ud559\uc0dd\uc785\ub2c8\ub2e4. \uba4b\uc9c4 \uc601\ud654 \ub9cc\ub4e4 \uc904 \uc54c\uace0 \ud559\uad50\uc5d0 \ub4e4\uc5b4\uac14\ub294\ub370, \ub9c9\uc0c1 \ub9cc\ub4e4\uc5b4\ubcf4\ub2c8 \ub204\uac00 \ubcfc\uae4c\ubd10 \ubb34\uc11c\uc6b4 \uc601\ud654\ub97c \ub9cc\ub4e4\uc5c8\uc5b4\uc694. \ucc98\uc74c\uc774\ub77c \uadf8\ub7f0\uac00 \ubcf4\ub2e4 \ud588\ub294\ub370, \uadf8 \ud6c4\uc5d0 \ucc0d\uc740 \uc601\ud654\ub4e4\ub3c4 \ub300\ubd80\ubd84 \uc601\ud654\uc801\uc778 \ubb38\ubc95\uc740 \ubb3c\ub860\uc774\uace0 \ucef7\uc758 \uc5f0\uacb0, \uc774\uc0c1\ud55c \ud654\uba74 \ubc30\uce58, \uc65c \ub4e4\uc5b4\uac14\ub294\uc9c0 \ubaa8\ub97c \ucef7\ub4e4\uc758 \ub098\uc5f4&hellip; \uacb0\uad6d \ud559\uad50\uc5d0\uc11c \ubc30\uc6b0\ub294 \uac83\ub9cc\uc73c\ub85c\ub294 \ud55c\uacc4\ub97c \ub118\uc744 \uc218 \uc5c6\ub2e4\ub294 \uac78 \ub290\uaf08\uc2b5\ub2c8\ub2e4. \uadf8\ub798\uc11c \ud53c\ubc14\uc5d0 \ub4f1\ub85d\ud558\uac8c \ub418\uc5c8\uc2b5\ub2c8\ub2e4. \n\uc0ac\uc2e4 \uc800\ub294 \uc774\ubbf8 \ub2e4\ub978 \uc601\uc0c1 \ud559\uc6d0\uc744 \ub2e4\ub2cc \uc801\uc774 \uc788\uc9c0\ub9cc, \uc81c \uc2a4\uc2a4\ub85c\ub294 \uc804\ud600 \ub2ec\ub77c\uc9c0\uc9c0 \uc54a\uc558\uc5b4\uc694. \uadf8\ub798\uc11c \ub204\uac00 \uc804\uacf5 \ubb3c\uc5b4\ubcfc \ub54c\ub9c8\ub2e4 \ud56d\uc0c1 \ubd80\ub044\ub7ec\uc6e0\uc2b5\ub2c8\ub2e4.\n\uc815\ub9d0 \uc774\ubc88\uc774 \ub9c8\uc9c0\ub9c9\uc774\ub2e4 \uc0dd\uac01\ud558\uace0 \ud53c\ubc14\ub97c \ucc3e\uc544\uc654\ub294\ub370, \uc218\uc5c5 \ubc29\uc2dd\uc774 \uc0c8\ub85c\uc6e0\uc5b4\uc694. \ub2e8\uc21c\ud788 \uae30\uc220/\uc774\ub860\uc744 \ubc30\uc6b0\ub294 \uac8c \uc544\ub2c8\ub77c, \uc601\uc0c1\uc744 \ub72f\uc5b4\ubcf4\ub294 \uc218\uc5c5\uc774\uc5c8\uc2b5\ub2c8\ub2e4.\u2028 \uc65c \uc5b4\ub5a4 \uc601\uc0c1\uc740 \uc798 \ub9cc\ub4e4\uc5b4\uc84c\uace0, \uc5b4\ub5a4 \uc601\uc0c1\uc740 \ud3c9\uba74\uc801\uc73c\ub85c \ubcf4\uc774\ub294\uc9c0 \uc2a4\uc2a4\ub85c \ucc3e\uc544\ubcf4\uac8c \ub9cc\ub4e4\uc5b4\uc8fc\ub294 \uc218\uc5c5\uc774\uac70\ub4e0\uc694. \uc774\uc804\uc5d4 \uc774\uc57c\uae30\ub9cc \uc0dd\uac01\ud558\uba74\uc11c \uc601\uc0c1\uc744 \uae30\ud68d\ud588\ub2e4\uba74, \uc9c0\uae08\uc740 \ud654\uba74\uc758 \uae4a\uc774\uac10\uc774\ub098 \ub808\uc774\uc5b4\ub97c \uc5b4\ub5bb\uac8c \uc313\uc744\uc9c0, \ubbf8\uc220\uc744 \uc5b4\ub5bb\uac8c \uad6c\uc131\ud560\uc9c0\uae4c\uc9c0 \uace0\ubbfc\ud558\uac8c \ub410\uc2b5\ub2c8\ub2e4. \uc601\uc0c1 \uc804\uccb4\ub97c &lsquo;\ucc44\uc6b0\ub294 \ubc95&rsquo;\uc744 \ubc30\uc6b0\uace0 \uc788\uc5b4\uc694.\n\uac8c\ub2e4\uac00 \ub0b4\uac00 \uc9c1\uc811 \ud558\uace0 \uc2f6\uc740 \uc601\uc0c1 \ud504\ub85c\uc81d\ud2b8\uc5d0 \ucc38\uc5ec\ud560 \uc218 \uc788\ub2e4\ub294 \uac8c \uc815\ub9d0 \ub9e4\ub825\uc801\uc785\ub2c8\ub2e4! \uc5b4\ub5a4 \ud504\ub85c\uc81d\ud2b8\ub4e0 \ub3c4\uc804\ud560 \uc218 \uc788\uace0, \uc5f0\ucd9c, \uc81c\uc791, \ubbf8\uc220 \ub4f1 \ub2e4\uc591\ud55c \ud3ec\uc9c0\uc158\uc5d0\uc11c \uc9c1\uc811 \uacbd\ud5d8\uc744 \uc313\uc744 \uc218 \uc788\ub294 \uae30\ud68c\ub294 \ub9ce\uc9c0 \uc54a\uc73c\ub2c8\uae4c\uc694.\n\ucc98\uc74c\uc5d4 \ud559\uad50 \uac00\uba74 \uc601\ud654, \uc601\uc0c1 \uc774\uc57c\uae30\ub9cc \ud558\uace0 \ub2e4\ub2d0 \uc904 \uc54c\uc558\ub294\ub370, \uc0dd\uac01\ubcf4\ub2e4 \uacfc\uc81c\ud560 \ub54c \uc81c\uc678\ud558\uace4 \ub9ce\uc9c0 \uc54a\ub354\ub77c\uad6c\uc694. \uadf8\ub7f0\ub370 \ud53c\ubc14\uc5d0\uc11c\ub294 \ub2e4\ub4e4 \uc9c4\uc9dc \uc601\uc0c1\uc5d0 &lsquo;\ubbf8\uccd0&rsquo; \uc788\uc2b5\ub2c8\ub2e4. \u2028\uc601\uc0c1\uc5d0 \uac00\uc2b4\uc774 \ub6f0\ub294 \ubd84\uc774\ub77c\uba74, \uc800\ucc98\ub7fc \ub3cc\uc544 \ub3cc\uc544 \uc624\uc9c0 \ub9d0\uace0 \uaf2d \ud53c\ubc14\uc5d0\uc11c \uc81c\ub300\ub85c \ubc30\uc6cc\ubcf4\uc2dc\uae38 \ucd94\ucc9c\ub4dc\ub824\uc694.", "reviewer": "jamp******", "date": "2025.11.03"}, {"product": "FVA \ud53c\ubc14\uc544\uce74\ub370\ubbf8", "type": "\ud55c\ub2ec\uc0ac\uc6a9", "rating": 5, "photo": "https://phinf.pstatic.net/checkout.phinf/20251103_20/17621644491663Q8f0_JPEG/IMG_1847.jpeg", "content": "\uc800\ub294 \uc9c0\ubc29\uc5d0\uc11c \uc601\uc0c1 \uad00\ub828 \uc9c4\ub85c\ub97c \uafc8\uafb8\ub294 \ub300\ud559\uc0dd\uc785\ub2c8\ub2e4! \uc81c\uac00 \uc9c0\ub0b4\ub358 \uacf3\uc5d0\uc120 \uc601\uc0c1\ubbf8\ub514\uc5b4 \uad00\ub828\ud558\uc5ec \uccb4\uacc4\uac00 \uc798 \uc548 \ub418\uc5b4\uc788\uc5c8\uae30\uc5d0 \ub9ce\uc740 \uace0\ubbfc\uc744 \ud558\ub358 \uc911, \uc6b0\uc5f0\uce58 \uc54a\uac8c SNS\uc5d0\uc11c \ud53c\ubc14 \uc544\uce74\ub370\ubbf8\ub97c \uc811\ud558\uac8c \ub418\uc5c8\uc5b4\uc694. \uacf5\uac1c\ub41c \uc601\uc0c1 \uae30\ud68d&bull;\uc81c\uc791 \ucee4\ub9ac\ud058\ub7fc\uacfc \uc120\ubc30 \uae30\uc218\uc758 \uc218\uac15\uc0dd \ubd84\ub4e4\uc758 \uacf5\ubaa8\uc804 \uc218\uc0c1, \uc88b\uc740 \ub9ac\ubdf0\uae4c\uc9c0&bull;&bull;&bull; \uae30\ub300\uc640 \uc124\ub818\uc744 \ud488\uace0 \ub4e4\uc5b4\uac04 \uc544\uce74\ub370\ubbf8\uc5d0 \uc9c0\uae08\uc740 \ud55c \ub2ec \ub0a8\uc9d3 \ud758\ub
